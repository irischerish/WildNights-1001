<title>荒野旅 ─ 互動文字冒險</title><style>@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Ma+Shan+Zheng&family=Cinzel:wght@400;600&display=swap');:root{--bg:#13100c;--paper:#1d1710;--paper2:#161108;--border:#3a2d1e;--border2:#5c4428;--text:#e8ddc8;--dim:#7a6a50;--accent:#d4853a;--accent2:#8fad5a;--danger:#d44040;--c0:#d44040;--c1:#8fad5a;--c2:#5abca0;--c3:#d4853a;--c4:#d4853a;--c5:#d44040;--c6:#e8c86a;--c7:#b080e8;--c8:#5abca0;--c9:#e8906a;--btn-bg:#1a140c;--btn-hover:#241a0e;--btn-border:#4a3520;--gold:#d4853a;--sea:#8fad5a;}*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;font-size:14px;line-height:2;min-height:100vh;background-image:radial-gradient(ellipse 80% 60% at 50% 0%,#2a1a08 0%,transparent 70%),repeating-linear-gradient( 0deg,transparent,transparent 40px,rgba(80,50,20,0.04) 40px,rgba(80,50,20,0.04) 41px );}body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.65) 100%);}#app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 16px 80px;}#title-bar{text-align:center;padding:28px 0 16px;margin-bottom:24px;position:relative;}#title-bar::before{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--border2) 20%,var(--gold) 50%,var(--border2) 80%,transparent);}#title-bar::after{content:'◆';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-size:.6rem;color:var(--gold);background:var(--bg);padding:0 10px;}#title-bar h1{font-family:'Ma Shan Zheng',cursive;font-size:1.5rem;font-weight:400;color:var(--text);letter-spacing:10px;text-indent:10px;text-shadow:0 0 40px rgba(212,133,58,0.5),0 0 80px rgba(143,173,90,0.2),0 2px 4px rgba(0,0,0,0.7);animation:titleDrift 6s ease-in-out infinite;}@keyframes titleDrift{0%,100%{text-shadow:0 0 40px rgba(212,133,58,0.5),0 0 80px rgba(143,173,90,0.2),0 2px 4px rgba(0,0,0,0.7);}50%{text-shadow:0 0 55px rgba(212,133,58,0.7),0 0 100px rgba(143,173,90,0.3),0 2px 4px rgba(0,0,0,0.7);}}#title-bar .sub{font-family:'Cinzel',serif;color:var(--dim);font-size:0.62rem;margin-top:10px;letter-spacing:6px;text-transform:uppercase;opacity:.8;}#stats-bar{display:none;gap:0;font-size:0.72rem;color:var(--dim);padding:0;background:transparent;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:18px;font-variant-numeric:tabular-nums;position:relative;justify-content:center;}#stats-bar .stat{display:flex;gap:5px;align-items:center;padding:6px 14px;border-right:1px solid var(--border);}#stats-bar .stat:last-child{border-right:none;}#stats-bar .stat-val{color:var(--gold);font-weight:700;min-width:2ch;}#scene-display{background:var(--paper);border:1px solid var(--border);padding:32px 28px;min-height:220px;line-height:2.2;margin-bottom:16px;position:relative;color:var(--text);transition:opacity 0.25s ease;box-shadow:inset 0 0 80px rgba(0,0,0,0.4),0 8px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(60,35,10,0.3);display:flex;align-items:center;justify-content:center;}#scene-display::before{content:'';position:absolute;inset:8px;border:1px solid transparent;border-image:linear-gradient(135deg,var(--border2) 0%,transparent 40%,transparent 60%,var(--border2) 100%) 1;pointer-events:none;}#scene-display::after{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4;}.sd-inner{width:100%;}#scene-display img{display:block;max-width:100%;max-height:300px;margin:16px auto;border:1px solid var(--border2);box-shadow:0 4px 20px rgba(0,0,0,0.5);}#scene-display hr{border:none;height:1px;background:linear-gradient(90deg,transparent,var(--border2) 30%,var(--border2) 70%,transparent);margin:18px 0;}#scene-display .dbox{border:1px solid var(--border2);border-left:2px solid var(--gold);padding:12px 16px;margin:12px 0;background:rgba(20,14,6,0.6);}#choices{display:flex;flex-direction:column;gap:8px;margin-top:12px;transition:opacity 0.25s ease;}.btn{background:linear-gradient(135deg,rgba(30,22,14,0.95) 0%,rgba(22,16,10,0.98) 100%);border:1px solid rgba(180,140,80,0.25);color:var(--text);padding:10px 16px;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:0.85rem;text-align:left;transition:all 0.22s ease;position:relative;overflow:hidden;letter-spacing:.05em;border-radius:3px;}.btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold),var(--sea));opacity:0;transition:opacity 0.22s ease;border-radius:2px 0 0 2px;}.btn-arrow{display:inline-block;color:var(--gold);margin-right:9px;font-size:0.78em;opacity:.5;transition:transform 0.22s ease,opacity 0.22s ease;vertical-align:middle;}.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(212,133,58,0.04) 0%,transparent 60%);opacity:0;transition:opacity 0.22s ease;}.btn:hover{background:linear-gradient(135deg,rgba(40,30,18,0.98) 0%,rgba(28,20,12,1) 100%);border-color:rgba(180,140,80,0.5);color:var(--accent);box-shadow:0 2px 16px rgba(0,0,0,0.5),inset 0 1px 0 rgba(212,133,58,0.08);}.btn:hover::before{opacity:1;}.btn:hover .btn-arrow{transform:translateX(3px);opacity:1;color:var(--gold);}.btn:hover::after{opacity:1;}.btn-bag{border-radius:6px;font-weight:600;letter-spacing:.06em;padding:13px 18px;transition:all 0.2s ease;box-shadow:0 3px 12px rgba(0,0,0,0.4);}.btn-bag::before{display:none;}.btn-bag .btn-arrow{display:none;}.btn-bag-white{background:linear-gradient(135deg,#1a1410 0%,#131008 100%);border:1px dashed rgba(180,150,100,0.4);border-top:2px dashed rgba(200,170,120,0.5);color:#a09070;}.btn-bag-white:hover{background:linear-gradient(135deg,#241c14 0%,#1a1410 100%);border-color:rgba(200,170,120,0.7);color:#c0b090;box-shadow:0 4px 20px rgba(150,120,60,0.2);}.btn-bag-blue{background:linear-gradient(135deg,#0c1820 0%,#081014 100%);border:1px solid rgba(60,120,200,0.35);border-top:2px solid rgba(60,120,200,0.7);color:#6090c0;}.btn-bag-blue:hover{background:linear-gradient(135deg,#102030 0%,#0c1820 100%);border-color:rgba(60,120,200,0.7);color:#80b0e0;box-shadow:0 4px 20px rgba(40,100,200,0.2);}.btn-bag-red{background:linear-gradient(135deg,#200a0a 0%,#180808 100%);border:1px solid rgba(180,60,60,0.35);border-top:2px solid rgba(180,60,60,0.7);color:#c06060;}.btn-bag-red:hover{background:linear-gradient(135deg,#2c1010 0%,#200a0a 100%);border-color:rgba(180,60,60,0.7);color:#e08080;box-shadow:0 4px 20px rgba(160,40,40,0.2);}.btn-bag-orange{background:linear-gradient(135deg,#201408 0%,#180e04 100%);border:1px solid rgba(180,100,30,0.35);border-top:2px solid rgba(180,100,30,0.7);color:#c07030;}.btn-bag-orange:hover{background:linear-gradient(135deg,#2c1c0c 0%,#201408 100%);border-color:rgba(180,100,30,0.7);color:#e09040;box-shadow:0 4px 20px rgba(160,90,20,0.2);}.btn-bag-torn{background:linear-gradient(135deg,#180808 0%,#100404 100%);border:1px dashed rgba(100,40,40,0.5);border-top:2px dashed rgba(120,50,50,0.6);color:#806060;opacity:0.85;}.btn-bag-torn:hover{background:linear-gradient(135deg,#200c0c 0%,#180808 100%);border-color:rgba(150,60,60,0.7);color:#a07070;opacity:1;box-shadow:0 4px 20px rgba(120,30,30,0.2);}.c0{color:var(--c0)}.c1{color:var(--c1)}.c2{color:var(--c2)}.c3{color:var(--c3)}.c4{color:var(--c4)}.c5{color:var(--c5)}.c6{color:var(--c6)}.c7{color:var(--c7)}.c8{color:var(--c8)}.c9{color:var(--c9)}.v{font-weight:700;color:var(--gold);}p{margin:4px 0;text-align:center;}.inp{background:var(--paper2);border:1px solid var(--btn-border);border-bottom:2px solid var(--gold);color:var(--text);padding:8px 14px;font-family:'Noto Serif TC',serif;font-size:0.88rem;width:180px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;margin:8px 4px;}.inp:focus{border-bottom-color:var(--sea);box-shadow:0 2px 0 0 rgba(143,173,90,0.3);}::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var( <div id="app">
<div id="title-bar">
<canvas id="fire-canvas" width="64" height="64" style="display:block;margin:0 auto 6px;width:36px;height:36px;image-rendering:pixelated;"></canvas>
<h1>荒野旅</h1>
<div class="sub">互動文字冒險</div>
</div>
<div id="stats-bar">
<div class="stat">第 <span class="stat-val" id="s-day">1</span> 天</div>
<div class="stat">時間 <span class="stat-val" id="s-time">早晨</span></div>
<div class="stat">體力 <span class="stat-val" id="s-hp">60</span></div>
<div class="stat">飽腹 <span class="stat-val" id="s-food">60</span></div>
</div>
<div id="scene-display"><p style="color:var(--dim);font-style:italic;text-align:center">載入中…</p></div>
<div id="choices"></div>
</div>
<div id="ending-overlay" style="display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;">
<canvas id="ending-canvas" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.35;"></canvas>
<div id="ending-inner" style="position:relative;z-index:2;text-align:center;padding:24px 32px;max-width:480px;">
<div id="ending-num" style="font-size:.75rem;letter-spacing:.4em;color:#a09070;margin-bottom:18px;opacity:0;transition:opacity 1.2s;"></div>
<div id="ending-title" style="font-family:'Ma Shan Zheng',cursive;font-size:2rem;color:#e8ddc8;text-shadow:0 0 30px rgba(212,133,58,0.8);letter-spacing:.15em;margin-bottom:28px;opacity:0;transition:opacity 1.6s 0.8s;line-height:1.5;"></div>
<div id="ending-sub" style="font-size:.8rem;color:#7a6a50;letter-spacing:.1em;margin-bottom:32px;opacity:0;transition:opacity 1s 3s;"></div>
<button id="ending-restart" onclick="closeEnding()" style="opacity:0;transition:opacity 1s 3.8s;padding:10px 32px;background:transparent;border:1px solid #5c4428;color:#a09070;font-family:inherit;font-size:.85rem;cursor:pointer;letter-spacing:.15em;">▶ 再次冒險</button>
</div>
</div>

  const parts = [];
  let cur = '', depth = 0, inStr = false, strCh = '';
  for (let i = 0; i < code.length; i++) {
    const c = code[i];

    } else if (c === '"' || c === "'") {
      inStr = true; strCh = c; cur += c;

    else if (')]}'.includes(c)) { depth--; cur += c; }
    else if (c === ',' && depth === 0) {

function parseScene(name) {

  if (raw === undefined) {

  }

  const lines = raw.split('\n');
  const htmlParts = [];
  const choices = [];
  const btnRows = [];
  let jump = null;
  let btnEnabled = true;
  let pendingChoice = null;

  _pendingJump = null;

  for (let i = 0; i < lines.length; i++) {
    const raw_line = lines[i];
    const line = raw_line.trim();
    if (!line) continue;
    if (line.startsWith('=:') || line.startsWith('=：')) {
      execLine(line.slice(2).trim());
      if (_pendingJump) {
        if (pendingChoice !== null) { choices.push(pendingChoice); pendingChoice = null; }
        jump = _pendingJump; _pendingJump = null; break;
      }
      continue;
    }
    if (line.startsWith('等:') || line.startsWith('等：')) {
      const waitStr = line.slice(2).trim();
      const [secPart, ...msgParts] = waitStr.split('|');
      const waitSec = parseFloat(secPart.trim()) || 1;
      const waitMsg = msgParts.join('|').trim();
      if (pendingChoice !== null) { choices.push(pendingChoice); pendingChoice = null; }
      const remainingLines = lines.slice(i + 1).join('\n');
      return { html: htmlParts.join('') + (waitMsg ? `<p style="color:var(--dim);font-style:italic;">${waitMsg}</p>` : ''),
               choices, jump, btnRows, waitSec, waitContinuation: remainingLines, name: undefined };
    }
    if (line.startsWith('跳：') || line.startsWith('跳:')) {
      if (pendingChoice !== null) { choices.push(pendingChoice); pendingChoice = null; }
      jump = line.slice(2).trim();
      break;
    }
    if (line.startsWith('选:') || line.startsWith('选：')) {
      const label = line.slice(2).trim();
      if (pendingChoice !== null) {
        choices.push(pendingChoice);
      }
      pendingChoice = { label: renderLine(label), target: label };
      continue;
    }
    if (line.startsWith('<:')) {
      const code = line.slice(2).trim();
      _pendingJump = null;
      try {
        const result = new Function('MD','random_int','random_choice','game_jumpto', `
          let curBtn = 'active';
          ${code}
          return curBtn;

        if (result === null) pendingChoice = null;
      } catch(e) {}
      if (_pendingJump) { jump = _pendingJump; _pendingJump = null; break; }
      continue;

    const lineNobr = line.replace(/<hr\s*\/?>/, '').trim();
    if (lineNobr && !lineNobr.replace(/\(b\)\d+\(\/b\)/g,'').trim()) {
      const rowCount = (line.match(/\(b\)\d+\(\/b\)/g) || []).length;
      if (rowCount > 0) btnRows.push(rowCount);
      if (/<hr/i.test(line)) htmlParts.push('<hr>');
      continue;
    }
    const rendered = renderLine(line);
    if (rendered) {

function runScene(name) {

      return { ...result, name: cur };
    }
    if (result.jump) {
      if (!result.html.trim() || result.html === '') {
        cur = result.jump;
        continue;
      }
      const stripped = result.html.replace(/<[^>]+>/g, '').trim();
      const isLocationAnnounce = result.choices.length === 0 &&
        /^「[^」]{1,20}」[。.]?$/.test(stripped);
      if (isLocationAnnounce) {
        cur = result.jump;
        continue;
      }
      return { ...result, name: cur };
    }
    const idx = sceneList.indexOf(cur);
    if (idx >= 0 && idx < sceneList.length - 1) {
      const next = sceneList[idx + 1];
      if (!result.html.trim()) {
        cur = next;
        continue;
      }
      return { ...result, name: cur, jump: next };
    }

    return { ...result, name: cur };
  }

    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);

  fileWrap.appendChild(fileInput);

  importWrap.appendChild(fileWrap);
  ch.appendChild(importWrap);
}

      '0000000000000000',

    ],
  ];

  const PX = 4; // 每格像素

function startHeroAnim() {
  const c = document.getElementById('hero-canvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  const W = 96, H = 64;
  let frame = 0;

  // 色盤
  const C = {
    sky1: '#1a2c3a', sky2: '#0e1c28',
    ground: '#1e1408', grass1: '#2a3818', grass2: '#3a4820',
    tree: '#1a2808', trunk: '#2a1808',
    moon: '#d8d0b8',
    skin: '#d4a870', hair: '#3a2010',
    shirt: '#5a6848', pants: '#3a3028',
    boot: '#2a1c10', pack: '#7a5030',
    stick: '#5a3818',
    star: '#e8e0c8',
  };

  // 雲朵位置（慢速飄移）
  let cloudX = 60;
  // 鳥位置
  let birdX = 90, birdY = 12;

  function fillPx(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
  }

  function drawScene(f) {
    ctx.clearRect(0, 0, W, H);

    // 天空
    const sky = ctx.createLinearGradient(0,0,0,H*0.7);
    sky.addColorStop(0, C.sky2); sky.addColorStop(1, C.sky1);
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H*0.7|0);

    // 月亮
    fillPx(W-18, 4, 8, 8, C.moon);
    fillPx(W-17, 3, 6, 10, C.moon);
    fillPx(W-16, 5, 8, 6, C.sky2); // 缺角

    // 星星
    [[8,5],[22,3],[45,7],[70,4],[82,9],[14,14],[55,11]].forEach(([x,y],i)=>{
      if((f+i*7)%20 < 14) fillPx(x, y, 1, 1, C.star);
    });

    // 雲（緩移）
    const cx = Math.floor(cloudX) % (W+20) - 10;
    fillPx(cx, 10, 12, 3, 'rgba(200,190,170,0.18)');
    fillPx(cx+2, 8, 8, 5, 'rgba(200,190,170,0.18)');

    // 地面
    fillPx(0, H-12, W, 12, C.ground);
    // 草
    for(let x=0; x<W; x+=4) {
      fillPx(x, H-13, 2, 2, (x/4)%2===0 ? C.grass1 : C.grass2);
    }

    // 遠處樹（靜態）
    fillPx(4, H-28, 4, 16, C.trunk);
    fillPx(1, H-38, 10, 14, C.tree);
    fillPx(3, H-44, 6, 10, C.tree);
    fillPx(76, H-24, 3, 12, C.trunk);
    fillPx(73, H-32, 9, 12, C.tree);
    fillPx(75, H-38, 5, 8, C.tree);

    // 鳥（振翅）
    const wingUp = (f%8) < 4;
    fillPx(Math.floor(birdX), birdY, 2, 1, C.hair);
    if(wingUp) {
      fillPx(Math.floor(birdX)-2, birdY-1, 2, 1, C.hair);
      fillPx(Math.floor(birdX)+2, birdY-1, 2, 1, C.hair);
    } else {
      fillPx(Math.floor(birdX)-2, birdY+1, 2, 1, C.hair);
      fillPx(Math.floor(birdX)+2, birdY+1, 2, 1, C.hair);
    }

    // 主角（走路循環）
    const hx = 40, hy = H-12;
    const walk = f % 8;
    // 背包
    fillPx(hx+1, hy-16, 5, 8, C.pack);
    // 身體
    fillPx(hx, hy-16, 5, 8, C.shirt);
    // 頭
    fillPx(hx, hy-22, 6, 6, C.skin);
    // 頭髮
    fillPx(hx, hy-23, 6, 2, C.hair);
    fillPx(hx-1, hy-22, 2, 4, C.hair);
    // 眼睛（偶爾眨眼）
    if(f%60 < 3) {
      fillPx(hx+1, hy-20, 1, 1, C.skin); // 眨眼
      fillPx(hx+4, hy-20, 1, 1, C.skin);
    } else {
      fillPx(hx+1, hy-20, 1, 1, '#1a0e04');
      fillPx(hx+4, hy-20, 1, 1, '#1a0e04');
    }
    // 褲子
    fillPx(hx, hy-8, 5, 6, C.pants);
    // 腿（走路）
    if(walk < 4) {
      fillPx(hx, hy-3, 2, 3, C.pants);     // 左腳前
      fillPx(hx+3, hy-5, 2, 5, C.boot);    // 右腳後
    } else {
      fillPx(hx+3, hy-3, 2, 3, C.pants);   // 右腳前
      fillPx(hx, hy-5, 2, 5, C.boot);      // 左腳後
    }
    // 靴子
    if(walk < 4) {
      fillPx(hx-1, hy-1, 3, 2, C.boot);
      fillPx(hx+3, hy-2, 3, 2, C.boot);
    } else {
      fillPx(hx+2, hy-1, 3, 2, C.boot);
      fillPx(hx-1, hy-2, 3, 2, C.boot);
    }
    // 手臂+棍子（走路擺動）
    if(walk < 4) {
      fillPx(hx-1, hy-14, 2, 6, C.skin);   // 左手前擺
      fillPx(hx+5, hy-16, 2, 5, C.skin);   // 右手後擺
      fillPx(hx-2, hy-18, 1, 10, C.stick); // 棍子
    } else {
      fillPx(hx+5, hy-14, 2, 6, C.skin);
      fillPx(hx-1, hy-16, 2, 5, C.skin);
      fillPx(hx-1, hy-18, 1, 10, C.stick);
    }
  }

  let _heroTimer = null;
  function loop() {
    // 若canvas已不在DOM中（切換到遊戲畫面）就停止
    if (!document.getElementById('hero-canvas')) return;
    cloudX += 0.04;
    birdX -= 0.18;
    if (birdX < -6) { birdX = W + 4; birdY = 8 + Math.random()*10|0; }
    drawScene(frame);
    frame++;
    _heroTimer = setTimeout(loop, 100);
  }
  loop();
}

function drawSteam(ctx, cx, cy) {
  for(let i=0;i<3;i++) {

function drawCageBase(ctx, W, H, floorColor, wallColor) {
  // 牆壁
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, wallColor[0]); bg.addColorStop(1, wallColor[1]);
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  // 地板
  ctx.fillStyle = floorColor;
  ctx.fillRect(0, H*0.72, W, H*0.28);
  for(let i=0;i<7;i++){
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(i*(W/6), H*0.72, 2, H*0.28);
  }
  // 鐵欄杆
  ctx.strokeStyle = '#4a5040'; ctx.lineWidth = 3;
  for(let i=0;i<8;i++){
    ctx.beginPath();
    ctx.moveTo(W*0.08+i*(W*0.84/7), H*0.05);
    ctx.lineTo(W*0.08+i*(W*0.84/7), H*0.7);
    ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(W*0.08,H*0.05); ctx.lineTo(W*0.92,H*0.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.08,H*0.35); ctx.lineTo(W*0.92,H*0.35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.08,H*0.7);  ctx.lineTo(W*0.92,H*0.7);  ctx.stroke();
}

// 追兔場景：草原追逐，兔子跳起逃跑
function drawChaseRabbit(ctx, W, H) {
  // 天空
  const sky = ctx.createLinearGradient(0,0,0,H*0.52);
  sky.addColorStop(0,'#181c2a'); sky.addColorStop(1,'#2a3040');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.52|0);
  // 月
  ctx.fillStyle='#d0c8a8'; ctx.fillRect(W*0.75|0,6,8,8); ctx.fillRect(W*0.74|0,7,10,6);
  // 地面
  ctx.fillStyle='#181808'; ctx.fillRect(0,H*0.52|0,W,H*0.48|0);
  for(let x=0;x<W;x+=5){ ctx.fillStyle=x%10<5?'#262810':'#1e2008'; ctx.fillRect(x,H*0.52|0,5,3); }
  // 草叢
  [[0.05,0.48,18,10],[0.55,0.46,22,12],[0.82,0.49,14,8]].forEach(([fx,fy,fw,fh])=>{
    ctx.fillStyle='#2a3810'; ctx.fillRect(W*fx|0,H*fy|0,fw,fh);
    ctx.fillStyle='#3a4818'; ctx.fillRect(W*fx|0+2,H*fy|0-4,fw-4,6);
  });
  // 兔子（跳躍姿，右前方）
  const rx=W*0.6|0, ry=H*0.52|0;
  ctx.fillStyle='#e8e0d8';
  ctx.fillRect(rx,ry-18,14,12); // 身體
  ctx.fillRect(rx+3,ry-26,10,10); // 頭
  ctx.fillRect(rx+4,ry-34,4,10); ctx.fillRect(rx+9,ry-34,4,10); // 耳朵豎
  ctx.fillStyle='#f0b0b0'; ctx.fillRect(rx+5,ry-32,2,8); ctx.fillRect(rx+10,ry-32,2,8); // 耳內
  ctx.fillStyle='#d04080'; ctx.fillRect(rx+5,ry-22,3,3); ctx.fillRect(rx+10,ry-22,3,3); // 眼
  ctx.fillStyle='#e8e0d8';
  // 跳躍腳（後腿蹬出）
  ctx.fillRect(rx-2,ry-10,5,5); ctx.fillRect(rx-4,ry-7,4,4); // 後腳蹬
  ctx.fillRect(rx+12,ry-14,5,8); ctx.fillRect(rx+13,ry-8,4,5); // 前腳落
  ctx.fillStyle='#fff'; ctx.fillRect(rx+12,ry-10,5,5); // 尾
  // 速度線
  ctx.fillStyle='rgba(255,255,255,0.2)';
  [ry-14,ry-10,ry-6].forEach(ly=>{ ctx.fillRect(rx-14,ly,10,1); ctx.fillRect(rx-20,ly+2,7,1); });
  // 主角（奔跑追逐）
  const px=W*0.3|0, py=H*0.62|0;
  ctx.fillStyle='#d4a870'; ctx.fillRect(px,py-24,6,6);
  ctx.fillStyle='#3a2010'; ctx.fillRect(px,py-25,6,2);
  ctx.fillStyle='#5a6848'; ctx.fillRect(px-1,py-18,7,9);
  ctx.fillStyle='#3a3028';
  ctx.fillRect(px-2,py-10,4,7); // 左腿前跨
  ctx.fillRect(px+4,py-14,4,7); // 右腿後蹬
  ctx.fillStyle='#2a1c10';
  ctx.fillRect(px-3,py-4,5,4); ctx.fillRect(px+4,py-8,5,4);
  ctx.fillStyle='#d4a870';
  ctx.fillRect(px+6,py-20,4,7); // 右手前揮
  ctx.fillRect(px-4,py-16,4,6); // 左手後擺
  // 汗珠
  ctx.fillStyle='rgba(100,180,220,0.7)';
  ctx.fillRect(px+8,py-28,2,3); ctx.fillRect(px+12,py-25,2,3);
}

function drawPigeon(ctx, W, H) {
  // 背景：室內木籠
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a1208'); bg.addColorStop(1,'#2e1e0a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // 木地板
  ctx.fillStyle='#3a2008'; ctx.fillRect(0,H*0.75,W,H*0.25);
  for(let i=0;i<6;i++){
    ctx.fillStyle='#2a1505';
    ctx.fillRect(i*(W/5),H*0.75,2,H*0.25);
  }
  // 木籠欄杆
  ctx.strokeStyle='#6a4010'; ctx.lineWidth=3;
  for(let i=0;i<7;i++){
    ctx.beginPath();
    ctx.moveTo(W*0.15+i*(W*0.7/6), H*0.12);
    ctx.lineTo(W*0.15+i*(W*0.7/6), H*0.72);
    ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(W*0.15,H*0.12); ctx.lineTo(W*0.85,H*0.12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.15,H*0.42); ctx.lineTo(W*0.85,H*0.42); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.15,H*0.72); ctx.lineTo(W*0.85,H*0.72); ctx.stroke();
  // 棲木
  ctx.fillStyle='#8a5520'; ctx.fillRect(W*0.25,H*0.55,W*0.5,5);
  // 鴿子身體
  const px=W*0.5, py=H*0.46;
  ctx.fillStyle='#b0a898';
  ctx.beginPath(); ctx.ellipse(px,py,18,13,0,0,Math.PI*2); ctx.fill();
  // 頭
  ctx.fillStyle='#c0b8a8';
  ctx.beginPath(); ctx.arc(px+14,py-10,9,0,Math.PI*2); ctx.fill();
  // 胸羽光澤
  ctx.fillStyle='#a08878';
  ctx.beginPath(); ctx.ellipse(px-2,py+3,10,7,0.3,0,Math.PI*2); ctx.fill();
  // 眼睛
  ctx.fillStyle='#ff8030';
  ctx.beginPath(); ctx.arc(px+18,py-11,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(px+18,py-11,1.5,0,Math.PI*2); ctx.fill();
  // 嘴
  ctx.fillStyle='#d0a040';
  ctx.beginPath(); ctx.moveTo(px+26,py-10); ctx.lineTo(px+32,py-8); ctx.lineTo(px+26,py-6); ctx.fill();
  // 翅膀紋
  ctx.strokeStyle='#888070'; ctx.lineWidth=1.5;
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.moveTo(px-5+i*3,py-5); ctx.lineTo(px-14+i*2,py+8); ctx.stroke();
  }
  // 腳
  ctx.strokeStyle='#c08030'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(px+4,py+13); ctx.lineTo(px+4,H*0.56); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px-4,py+13); ctx.lineTo(px-4,H*0.56); ctx.stroke();
  // 腳環
  ctx.strokeStyle='#d4c040'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(px-4,H*0.565,3,0,Math.PI*2); ctx.stroke();
  // 飼料盆
  ctx.fillStyle='#5a3810'; ctx.fillRect(W*0.62,H*0.65,24,8);
  ctx.fillStyle='#d4c080';
  for(let i=0;i<5;i++) { ctx.beginPath(); ctx.arc(W*0.63+i*4,H*0.655,1.5,0,Math.PI*2); ctx.fill(); }
  // 小愛心（好感度）
  ctx.fillStyle='rgba(220,80,80,0.7)';
  ctx.font='10px serif'; ctx.fillText('♥',px+22,py-22);
}

function makeSceneCanvas(drawFn) {
  const c = document.createElement('canvas');

function drawTimeSky(ctx, W, H, groundY) {
  const tc = getTimeCtx();
  fillRect(ctx, tc.sky1, 0, 0, W, groundY * 0.6 | 0);

  fillRect(ctx, tc.horizon, 0, groundY - 4, W, 3);
  ctx.fillStyle = tc.horizon + '50';
  ctx.fillRect(0, groundY - 8, W, 5);
  ctx.fillStyle = tc.haze;
  ctx.fillRect(0, groundY - 12, W, 10);
  if (tc.stars) {
    [[10,5],[30,9],[55,3],[80,7],[110,5],[140,9],[158,4]].forEach(([x,y]) => fillRect(ctx,'#c8d0d8',x,y,1,1));
  }
  if (tc.sun && tc.sunHigh) { // 艷陽
    fillRect(ctx, tc.sunColor, W-22, 5, 12, 12);
    fillRect(ctx, '#ffffff', W-21, 6, 10, 10);
    [[W-16,1,2,4],[W-16,19,2,4],[W-10,7,4,2],[W-28,7,4,2]].forEach(([x,y,w,h])=>fillRect(ctx,tc.sunColor,x,y,w,h));

  if (tc.moon) {
    fillRect(ctx, '#d8e0e8', W-22, 7, 10, 10);
    fillRect(ctx, tc.sky1, W-20, 7, 6, 6);
  }
}

function drawBase(ctx, W, H) {
  const level = (typeof MD !== 'undefined' && MD.屋 !== undefined) ? Math.max(0, Math.min(4, MD.屋)) : 0;

  }[time] || { top:'#0a1422', bot:'#1a2c44', horizon:'#3a5870' };

  fillRect(ctx, sky.top, 0, 0, W, H*0.45|0);
  fillRect(ctx, sky.bot, 0, H*0.3|0, W, H*0.18|0);

function drawEndingBg(canvas, color) {

    const r = Math.random() * 1.2;

function drawEnding8(canvas) {
  canvas.width = canvas.offsetWidth || 400;
  canvas.height = canvas.offsetHeight || 700;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // 天空漸層：黎明橘金
  const sky = ctx.createLinearGradient(0,0,0,H*0.62);
  sky.addColorStop(0,'#0d1a2e');
  sky.addColorStop(0.35,'#1a3a5c');
  sky.addColorStop(0.65,'#c45a10');
  sky.addColorStop(1,'#e8a030');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H*0.62);

  // 海面漸層
  const sea = ctx.createLinearGradient(0,H*0.6,0,H);
  sea.addColorStop(0,'#1a4a6a');
  sea.addColorStop(0.4,'#0e2a40');
  sea.addColorStop(1,'#060f18');
  ctx.fillStyle = sea; ctx.fillRect(0,H*0.6,W,H*0.4+2);

  // 海平線光暈
  const glow = ctx.createRadialGradient(W*0.5,H*0.61,0,W*0.5,H*0.61,W*0.55);
  glow.addColorStop(0,'rgba(220,120,20,0.55)');
  glow.addColorStop(0.4,'rgba(200,90,10,0.18)');
  glow.addColorStop(1,'transparent');
  ctx.fillStyle = glow; ctx.fillRect(0,H*0.3,W,H*0.5);

  // 海面光柱倒影
  for(let i=0;i<18;i++){
    const x = W*0.5 + (Math.random()-0.5)*W*0.18;
    const ww = 2+Math.random()*5;
    const hh = H*0.04+Math.random()*H*0.1;
    const refG = ctx.createLinearGradient(0,H*0.62,0,H*0.62+hh);
    refG.addColorStop(0,'rgba(230,140,30,0.28)');
    refG.addColorStop(1,'transparent');
    ctx.fillStyle = refG;
    ctx.fillRect(x-ww/2, H*0.62, ww, hh);
  }

  // 星星（夜空殘存）
  [[0.08,0.04],[0.2,0.08],[0.38,0.03],[0.55,0.07],[0.72,0.05],[0.9,0.1],
   [0.15,0.16],[0.45,0.12],[0.82,0.18],[0.62,0.02]].forEach(([rx,ry])=>{
    ctx.fillStyle='rgba(255,240,200,0.7)';
    ctx.beginPath();
    ctx.arc(W*rx,H*ry,1.2,0,Math.PI*2);
    ctx.fill();
  });

  // 遠方島嶼輪廓（要離開的荒島）
  ctx.fillStyle='#0a1820';
  ctx.beginPath();
  ctx.moveTo(W*0.12,H*0.6);
  ctx.bezierCurveTo(W*0.18,H*0.52,W*0.28,H*0.5,W*0.38,H*0.58);
  ctx.bezierCurveTo(W*0.43,H*0.61,W*0.46,H*0.6,W*0.5,H*0.6);
  ctx.lineTo(W*0.12,H*0.6);
  ctx.fill();

  // 輕艇（兩人逃脫中）
  const bx = W*0.52, by = H*0.63;
  // 艇身
  ctx.fillStyle='#6a3a10';
  ctx.beginPath();
  ctx.ellipse(bx, by+6, 38, 9, 0, 0, Math.PI);
  ctx.fill();
  ctx.fillStyle='#8a5020';
  ctx.fillRect(bx-36, by-2, 72, 8);
  // 引擎泡沫
  for(let i=0;i<6;i++){
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(bx-40-i*7,by+8+Math.random()*4,2+Math.random()*2,0,Math.PI*2);
    ctx.fill();
  }

  // 人物剪影：主角
  ctx.fillStyle='#0a0a0a';
  ctx.fillRect(bx+8,by-26,6,24); // 身體
  ctx.beginPath(); ctx.arc(bx+11,by-30,5,0,Math.PI*2); ctx.fill(); // 頭
  // 揮手手臂
  ctx.lineWidth=3; ctx.strokeStyle='#0a0a0a'; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(bx+14,by-22); ctx.lineTo(bx+24,by-34); ctx.stroke();

  // 人物剪影：夥伴
  ctx.fillStyle='#0a0a0a';
  ctx.fillRect(bx-14,by-22,5,20); // 身體
  ctx.beginPath(); ctx.arc(bx-11,by-26,4,0,Math.PI*2); ctx.fill(); // 頭

  // 波浪
  for(let row=0;row<4;row++){
    ctx.strokeStyle='rgba(100,180,220,'+(0.08+row*0.04)+')';
    ctx.lineWidth=1;
    ctx.beginPath();
    const y=H*0.67+row*H*0.06;
    for(let x=0;x<W;x+=2){
      const wave=Math.sin((x+row*40)/30)*3;
      row===0&&x===0?ctx.moveTo(x,y+wave):ctx.lineTo(x,y+wave);
    }
    ctx.stroke();
  }

  // 橘色暖光暈（畫面中央氛圍）
  const warmG = ctx.createRadialGradient(W*0.5,H*0.62,0,W*0.5,H*0.62,W*0.4);
  warmG.addColorStop(0,'rgba(210,100,20,0.12)');
  warmG.addColorStop(1,'transparent');
  ctx.fillStyle=warmG; ctx.fillRect(0,0,W,H);
}

function showEnding(key) {
  const data = ENDING_DATA[key];
  if (!data) return;
  const overlay = document.getElementById('ending-overlay');
  overlay.style.display = 'flex';
  const canvas = document.getElementById('ending-canvas');
  requestAnimationFrame(() => data.goddess ? drawGoddessEnding(canvas) : data.ending8 ? drawEnding8(canvas) : drawEndingBg(canvas, data.color));
  document.getElementById('ending-num').textContent = data.num;
  document.getElementById('ending-title').textContent = data.title;
  document.getElementById('ending-sub').textContent = data.sub;
  document.getElementById('ending-title').style.textShadow = `0 0 30px ${data.color}cc`;
  document.getElementById('ending-restart').style.borderColor = data.color + '80';
  requestAnimationFrame(() => {
    ['ending-num','ending-title','ending-sub','ending-restart'].forEach((id,i) => {
      setTimeout(() => { document.getElementById(id).style.opacity = '1'; }, i * 200);
    });
  });
}

function closeEnding() {
  const overlay = document.getElementById('ending-overlay');
  overlay.style.opacity = '0';
  overlay.style.transition = 'opacity 1s';
  setTimeout(() => {
    overlay.style.display = 'none';
    overlay.style.opacity = '1';
    overlay.style.transition = '';
    ['ending-num','ending-title','ending-sub','ending-restart'].forEach(id => {
      document.getElementById(id).style.opacity = '0';
    });
    goto('重新開始');
  }, 1000);
}
