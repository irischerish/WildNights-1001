<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荒野旅 ─ 互動文字冒險</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Ma+Shan+Zheng&family=Cinzel:wght@400;600&display=swap');

:root {
  /* 電子雞 LCD（保留給 widget 用） */
  --lcd-bg:     #8fa86a;
  --lcd-dark:   #1a2a0a;
  --lcd-mid:    #4a6a2a;
  --lcd-light:  #b8c890;
  --shell-bg:   #2a2438;
  --shell-dark: #1a1628;
  --shell-mid:  #3a3050;
  --shell-rim:  #4a4060;

  /* ── 深夜篝火配色 ── */
  --bg:        #13100c;
  --paper:     #1d1710;
  --paper2:    #161108;
  --border:    #3a2d1e;
  --border2:   #5c4428;
  --text:      #e8ddc8;
  --dim:       #7a6a50;
  --accent:    #d4853a;
  --accent2:   #8fad5a;
  --danger:    #d44040;
  --warn:      #d4853a;
  --c0: #d44040; --c1: #8fad5a; --c2: #5abca0;
  --c3: #d4853a; --c4: #d4853a; --c5: #d44040;
  --c6: #e8c86a; --c7: #b080e8; --c8: #5abca0; --c9: #e8906a;
  --btn-bg:    #1a140c;
  --btn-hover: #241a0e;
  --btn-border: #4a3520;
  --gold: #d4853a;
  --sea:  #8fad5a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  line-height: 2;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%, #2a1a08 0%, transparent 70%),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 40px,
      rgba(80,50,20,0.04) 40px,
      rgba(80,50,20,0.04) 41px
    );
}

body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.65) 100%);
}

#app {
  position: relative; z-index: 1;
  max-width: 700px; margin: 0 auto; padding: 0 16px 80px;
}

/* ── Title ── */
#title-bar {
  text-align: center;
  padding: 40px 0 20px;
  margin-bottom: 24px;
  position: relative;
}
#title-bar::before {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2) 20%, var(--gold) 50%, var(--border2) 80%, transparent);
}
#title-bar::after {
  content: '◆';
  position: absolute;
  bottom: -8px; left: 50%;
  transform: translateX(-50%);
  font-size: .6rem;
  color: var(--gold);
  background: var(--bg);
  padding: 0 10px;
}
#title-bar h1 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 2.8rem;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 14px;
  text-indent: 14px;
  text-shadow:
    0 0 40px rgba(212,133,58,0.5),
    0 0 80px rgba(143,173,90,0.2),
    0 2px 4px rgba(0,0,0,0.7);
  animation: titleDrift 6s ease-in-out infinite;
}
@keyframes titleDrift {
  0%,100% { text-shadow: 0 0 40px rgba(212,133,58,0.5), 0 0 80px rgba(143,173,90,0.2), 0 2px 4px rgba(0,0,0,0.7); }
  50%      { text-shadow: 0 0 55px rgba(212,133,58,0.7), 0 0 100px rgba(143,173,90,0.3), 0 2px 4px rgba(0,0,0,0.7); }
}
#title-bar .sub {
  font-family: 'Cinzel', serif;
  color: var(--dim);
  font-size: 0.62rem;
  margin-top: 10px;
  letter-spacing: 6px;
  text-transform: uppercase;
  opacity: .8;
}

/* ── Stats bar ── */
#stats-bar {
  display: none;
  gap: 0;
  font-size: 0.72rem;
  color: var(--dim);
  padding: 0;
  background: transparent;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
  font-variant-numeric: tabular-nums;
  position: relative;
  justify-content: center;
}
#stats-bar .stat {
  display: flex; gap: 5px; align-items: center;
  padding: 6px 14px;
  border-right: 1px solid var(--border);
}
#stats-bar .stat:last-child { border-right: none; }
#stats-bar .stat-val { color: var(--gold); font-weight: 700; min-width: 2ch; }

/* ── Scene display ── */
#scene-display {
  background: var(--paper);
  border: 1px solid var(--border);
  padding: 32px 28px;
  min-height: 220px;
  line-height: 2.2;
  margin-bottom: 16px;
  position: relative;
  color: var(--text);
  transition: opacity 0.25s ease;
  box-shadow:
    inset 0 0 80px rgba(0,0,0,0.4),
    0 8px 40px rgba(0,0,0,0.4),
    0 0 0 1px rgba(60,35,10,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
}
#scene-display::before {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid transparent;
  border-image: linear-gradient(135deg, var(--border2) 0%, transparent 40%, transparent 60%, var(--border2) 100%) 1;
  pointer-events: none;
}
#scene-display::after {
  content: '';
  position: absolute;
  top: 0; left: 15%; right: 15%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}
.sd-inner { width: 100%; }
#scene-display img {
  display: block; max-width: 100%; max-height: 300px;
  margin: 16px auto;
  border: 1px solid var(--border2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#scene-display hr {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2) 30%, var(--border2) 70%, transparent);
  margin: 18px 0;
}
#scene-display .dbox {
  border: 1px solid var(--border2);
  border-left: 2px solid var(--gold);
  padding: 12px 16px; margin: 12px 0;
  background: rgba(20,14,6,0.6);
}

/* ── Choices ── */
#choices {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 12px;
  transition: opacity 0.25s ease;
}

.btn {
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  color: var(--text);
  padding: 11px 18px;
  cursor: pointer;
  font-family: 'Noto Serif TC', serif;
  font-size: 0.88rem;
  text-align: left;
  transition: all 0.18s ease;
  position: relative;
  overflow: hidden;
  letter-spacing: .03em;
}
.btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--gold) 0%, var(--sea) 100%);
  opacity: 0.5;
  transition: opacity 0.18s ease;
}
.btn-arrow {
  display: inline-block;
  color: var(--gold);
  margin-right: 10px;
  font-size: 0.75em;
  opacity: .7;
  transition: transform 0.18s ease, opacity 0.18s ease;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(212,133,58,0.06) 50%, transparent 60%);
  opacity: 0; transition: opacity 0.18s ease;
}
.btn:hover {
  background: var(--btn-hover);
  border-color: var(--border2);
  color: var(--accent);
  box-shadow: inset 0 0 20px rgba(212,133,58,0.04);
}
.btn:hover::before { opacity: 1; }
.btn:hover .btn-arrow { transform: translateX(4px); opacity: 1; color: var(--sea); }
.btn:hover::after { opacity: 1; }

/* ── 避難袋彩色按鈕 ── */
.btn-bag { border-radius: 6px; font-weight: 600; letter-spacing: .06em; padding: 13px 18px; transition: all 0.2s ease; box-shadow: 0 3px 12px rgba(0,0,0,0.4); }
.btn-bag::before { display: none; }
.btn-bag .btn-arrow { display: none; }
.btn-bag-white { background: linear-gradient(135deg, #1a1410 0%, #131008 100%); border: 1px dashed rgba(180,150,100,0.4); border-top: 2px dashed rgba(200,170,120,0.5); color: #a09070; }
.btn-bag-white:hover { background: linear-gradient(135deg, #241c14 0%, #1a1410 100%); border-color: rgba(200,170,120,0.7); color: #c0b090; box-shadow: 0 4px 20px rgba(150,120,60,0.2); }
.btn-bag-blue { background: linear-gradient(135deg, #0c1820 0%, #081014 100%); border: 1px solid rgba(60,120,200,0.35); border-top: 2px solid rgba(60,120,200,0.7); color: #6090c0; }
.btn-bag-blue:hover { background: linear-gradient(135deg, #102030 0%, #0c1820 100%); border-color: rgba(60,120,200,0.7); color: #80b0e0; box-shadow: 0 4px 20px rgba(40,100,200,0.2); }
.btn-bag-red { background: linear-gradient(135deg, #200a0a 0%, #180808 100%); border: 1px solid rgba(180,60,60,0.35); border-top: 2px solid rgba(180,60,60,0.7); color: #c06060; }
.btn-bag-red:hover { background: linear-gradient(135deg, #2c1010 0%, #200a0a 100%); border-color: rgba(180,60,60,0.7); color: #e08080; box-shadow: 0 4px 20px rgba(160,40,40,0.2); }
.btn-bag-orange { background: linear-gradient(135deg, #201408 0%, #180e04 100%); border: 1px solid rgba(180,100,30,0.35); border-top: 2px solid rgba(180,100,30,0.7); color: #c07030; }
.btn-bag-orange:hover { background: linear-gradient(135deg, #2c1c0c 0%, #201408 100%); border-color: rgba(180,100,30,0.7); color: #e09040; box-shadow: 0 4px 20px rgba(160,90,20,0.2); }
.btn-bag-torn { background: linear-gradient(135deg, #180808 0%, #100404 100%); border: 1px dashed rgba(100,40,40,0.5); border-top: 2px dashed rgba(120,50,50,0.6); color: #806060; opacity: 0.85; }
.btn-bag-torn:hover { background: linear-gradient(135deg, #200c0c 0%, #180808 100%); border-color: rgba(150,60,60,0.7); color: #a07070; opacity: 1; box-shadow: 0 4px 20px rgba(120,30,30,0.2); }

/* ── Color classes ── */
.c0{color:var(--c0)} .c1{color:var(--c1)} .c2{color:var(--c2)} .c3{color:var(--c3)}
.c4{color:var(--c4)} .c5{color:var(--c5)} .c6{color:var(--c6)} .c7{color:var(--c7)}
.c8{color:var(--c8)} .c9{color:var(--c9)}
.v { font-weight: 700; color: var(--gold); }

p { margin: 4px 0; text-align: center; }

/* ── Input ── */
.inp {
  background: var(--paper2);
  border: 1px solid var(--btn-border);
  border-bottom: 2px solid var(--gold);
  color: var(--text);
  padding: 8px 14px;
  font-family: 'Noto Serif TC', serif;
  font-size: 0.88rem;
  width: 180px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin: 8px 4px;
}
.inp:focus { border-bottom-color: var(--sea); box-shadow: 0 2px 0 0 rgba(143,173,90,0.3); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--gold), var(--sea)); border-radius: 3px; }

/* ── Footer ── */
#game-footer {
  border-top: 1px solid var(--border);
  position: relative;
  padding: 18px 0 10px;
  margin-top: 32px;
  text-align: center;
}
#game-footer::before {
  content: '';
  position: absolute; top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2) 50%, transparent);
}
</style>
</head>
<body>
<div id="app">
  <div id="title-bar">
    <canvas id="fire-canvas" width="64" height="64" style="display:block;margin:0 auto 10px;image-rendering:pixelated;"></canvas>
    <h1>荒野旅</h1>
    <div class="sub">互動文字冒險</div>
  </div>
  <div id="stats-bar">
    <div class="stat">第 <span class="stat-val" id="s-day">1</span> 天</div>
    <div class="stat">時間 <span class="stat-val" id="s-time">早晨</span></div>
    <div class="stat">體力 <span class="stat-val" id="s-hp">60</span></div>
    <div class="stat">飽腹 <span class="stat-val" id="s-food">60</span></div>
  </div>
  <div id="scene-display"><p style="color:var(--dim);font-style:italic;text-align:center">載入中…</p></div>
  <div id="choices"></div>
</div>


<!-- 結局畫面 Overlay -->
<div id="ending-overlay" style="display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;">
  <canvas id="ending-canvas" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.35;"></canvas>
  <div id="ending-inner" style="position:relative;z-index:2;text-align:center;padding:24px 32px;max-width:480px;">
    <div id="ending-num" style="font-size:.75rem;letter-spacing:.4em;color:#a09070;margin-bottom:18px;opacity:0;transition:opacity 1.2s;"></div>
    <div id="ending-title" style="font-family:'Ma Shan Zheng',cursive;font-size:2rem;color:#e8ddc8;text-shadow:0 0 30px rgba(212,133,58,0.8);letter-spacing:.15em;margin-bottom:28px;opacity:0;transition:opacity 1.6s 0.8s;line-height:1.5;"></div>
    <div id="ending-img-wrap" style="margin:0 auto 28px;width:260px;height:160px;border:1px solid #5c4428;overflow:hidden;opacity:0;transition:opacity 1.4s 1.8s;">
      <img id="ending-img" style="width:100%;height:100%;object-fit:cover;" src="" alt="">
    </div>
    <div id="ending-sub" style="font-size:.8rem;color:#7a6a50;letter-spacing:.1em;margin-bottom:32px;opacity:0;transition:opacity 1s 3s;"></div>
    <button id="ending-restart" onclick="closeEnding()" style="opacity:0;transition:opacity 1s 3.8s;padding:10px 32px;background:transparent;border:1px solid #5c4428;color:#a09070;font-family:inherit;font-size:.85rem;cursor:pointer;letter-spacing:.15em;">▶ 再次冒險</button>
  </div>
</div>

<!-- 存讀檔 Modal -->
<div id="save-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;">
  <div style="background:var(--paper);border:1px solid var(--border2);border-radius:10px;padding:24px 28px;min-width:300px;max-width:92vw;">
    <div id="save-modal-title" style="font-size:1.1rem;color:var(--accent2);margin-bottom:16px;text-align:center;letter-spacing:.05em;"></div>
    <div id="save-slots" style="display:flex;flex-direction:column;gap:8px;"></div>
    <button onclick="document.getElementById('save-modal').style.display='none'"
      style="margin-top:8px;width:100%;padding:8px;background:var(--btn-bg);border:1px solid var(--border);border-radius:6px;color:var(--dim);cursor:pointer;font-size:.9rem;">✕ 關閉</button>
    <button onclick="document.getElementById('export-textarea').value='';document.getElementById('import-textarea').value='';document.getElementById('export-modal').style.display='flex';document.getElementById('save-modal').style.display='none';" style="margin-top:6px;width:100%;padding:8px;background:var(--btn-bg);border:1px solid var(--border2);border-radius:6px;color:var(--accent2);cursor:pointer;font-size:.85rem;">📥 匯入存檔碼</button>
  </div>
</div>

<!-- 匯出/匯入 Modal -->
<div id="export-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:var(--paper);border:1px solid var(--border2);border-radius:10px;padding:22px 24px;width:90%;max-width:440px;">
    <div style="color:var(--accent2);font-size:.95rem;margin-bottom:10px;text-align:center;letter-spacing:.06em;">📋 存檔碼</div>
    <div style="color:var(--dim);font-size:.76rem;margin-bottom:7px;">複製下方存檔碼並保存，下次貼入「匯入」欄位即可讀取。</div>
    <textarea id="export-textarea" readonly style="width:100%;height:72px;background:var(--paper2);border:1px solid var(--border2);color:var(--text);padding:7px;font-size:.68rem;font-family:monospace;resize:none;border-radius:4px;word-break:break-all;" onclick="this.select();document.execCommand('copy');"></textarea>
    <div style="color:var(--gold);font-size:.72rem;margin:3px 0 10px;text-align:center;">↑ 點一下自動複製</div>
    <div style="color:var(--dim);font-size:.76rem;margin-bottom:6px;">匯入存檔碼：</div>
    <textarea id="import-textarea" placeholder="貼上存檔碼…" style="width:100%;height:56px;background:var(--paper2);border:1px solid var(--border2);color:var(--text);padding:7px;font-size:.68rem;font-family:monospace;resize:none;border-radius:4px;"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button onclick="importSave()" style="flex:1;padding:8px;background:var(--accent);color:#000;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit;">匯入</button>
      <button onclick="document.getElementById('export-modal').style.display='none';document.getElementById('import-textarea').value='';" style="flex:1;padding:8px;background:var(--btn-bg);color:var(--dim);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.85rem;">✕ 關閉</button>
    </div>
  </div>
</div>

<script>
const SCENES = {"__START__": "", "進場": "=:MD.周目=1,MD.智=5,MD.武=5,MD.生存獎勵=0\n=:function获取(){MD.名字=document.getElementById(\"a\").value}\n荒島旅人的名字……\n<inputid=\"a\"size=\"10\"style=\"border-radius:15px\"maxlength=\"10\">\n(b)1(/b)\n选：送出", "送出": "=:获取()\n=:if(MD.名字=='小掌櫃')game_jumpto('測試帳號')\n=:if(MD.名字=='aizawa')game_jumpto('測試帳號2')\n跳：初始生成", "重新開始": "=:MD.周目+=1,MD.智=5,MD.武=5\n第(j)MD.周目(/j)次的冒險。\n=:if(MD.天數>=20)game_jumpto('生存獎勵')\n=:if(MD.天數<20)game_jumpto('清空獎勵')", "生存獎勵": "=:MD.生存獎勵+=1,MD.智+=MD.生存獎勵,MD.武+=MD.生存獎勵\n前一周目存活20天以上，獲得生存獎勵─智力與武力初始值各加(j)MD.生存獎勵(/j)點！（連續多周目活過20天以上，獎勵可疊加。）\n跳：初始生成", "清空獎勵": "=:MD.生存獎勵=0\n前一周目沒能存活20天以上，生存獎勵清空─智力與武力回歸初始值。\n跳：初始生成", "初始生成": "=:MD.熟判=0,MD.熟食獎勵=0,MD.熟1=0,MD.熟2=0,MD.熟3=0,MD.熟4=0,MD.熟5=0,MD.熟6=0,MD.熟7=0,MD.熟8=0,MD.熟9=0,MD.熟10=0\n=:MD.熟11=0,MD.熟12=0,MD.熟13=0,MD.熟14=0,MD.熟15=0,MD.熟16=0,MD.熟17=0,MD.熟18=0,MD.熟19=0,MD.熟20=0\n=:MD.生1=0,MD.生2=0,MD.生3=0,MD.生4=0,MD.生5=0,MD.生6=0,MD.生7=0,MD.生8=0,MD.生9=0,MD.生10=0,MD.生11=0,MD.生12=0,MD.生13=0\n=:MD.生食獎勵=0,MD.生判=0,MD.優養=0,MD.看蜂=0,MD.木筏劇情=0,MD.漂流=0,MD.漂食=0,MD.礦坑=0,MD.豬友=0\n=:MD.止痛霜=0,MD.風邪藥湯=0,MD.療神健胃散=0,MD.傷用針線包=0,MD.消炎滅菌膏=0,MD.麻醉藥=0,MD.藥譜=0,MD.安誘=0,MD.生食數=0\n=:MD.感冒=0,MD.感染=0,MD.疼痛=0,MD.撕裂傷=0,MD.胃潰瘍=0,MD.滿意度=0,MD.麻繩=0,MD.種蕨=0,MD.種菇=0,MD.種果=0,MD.種麥=0\n=:MD.天數=1,MD.魔鍊=0,MD.體=60,MD.腹=60,MD.肉=0,MD.木=0,MD.石=0,MD.草=0,MD.魚=0,MD.書=0,MD.蜜=0,MD.屋=0,MD.容貌=9\n=:MD.鱷魚=0,MD.鯊魚=0,MD.山豬=0,MD.野鳥=0,MD.河豚=0,MD.果酒=0,MD.鮑魚=0,MD.鳳梨=0,MD.人蔘=0\n=:MD.餓肚天=0,MD.遇鯊數=0,MD.遇熊數=0,MD.掉水數=0,MD.遇鱷數=0,MD.遇蜥數=0,MD.皮草=0,MD.鱷皮=0,MD.蜥蜴=0,MD.豢養=0,MD.販賣機=0,MD.魔鍊=0\n=:MD.欠錢=(\"無\"),MD.債人=(\"無\"),MD.珍珠=0,MD.珍珠代數=0,MD.香餌=0,MD.美貌=(\"平平無奇\")\n=:MD.手札=(\"這個人很懶，他什麼都沒寫。\")\n=:MD.食譜1=0,MD.食譜2=0,MD.食譜3=0,MD.食譜4=0,MD.食譜5=0,MD.食譜6=0,MD.食譜7=0,MD.食譜8=0,MD.食譜9=0,MD.食譜10=0\n=:MD.食譜11=0,MD.食譜12=0,MD.食譜13=0,MD.食譜14=0,MD.食譜15=0,MD.食譜16=0,MD.食譜17=0,MD.食譜18=0,MD.食譜19=0,MD.食譜20=0\n=:MD.蕨=0,MD.菇=0,MD.蛋=0,MD.果=0,MD.藻=0,MD.貝=0,MD.章=0,MD.蟹=0,MD.蝦=0,MD.藥=0,MD.薑=0,MD.乳=0\n=:MD.用時=4,MD.藤椅=0,MD.刀具=(\"無\"),MD.心=-1,MD.槌=0,MD.矛=0,MD.鋸=0,MD.麥=0,MD.油=0\n=:MD.釣竿=0,MD.餌=0,MD.刀=0,MD.斧=0,MD.時間=(\"早晨\"),MD.據點=(\"無\"),MD.網=0,MD.誘=0,MD.吹箭=0,MD.陷阱=0,MD.設陷=0\n=:MD.寵肚=0,MD.寵愛=0,MD.熊=0,MD.鹿=0,MD.兔=0,MD.看咕=0,MD.咕愛=0,MD.鴿=0,MD.硬=0,MD.工作台=0,MD.蜂霜藥=0,MD.羅盤=0\n=:MD.壁畫北=0,MD.壁畫西=0,MD.壁畫東=0,MD.壁畫南=0,MD.機密=0,MD.大衣=0,MD.裝備=(\"單薄襯衣\")\n=:MD.電池北=0,MD.電池西=0,MD.電池東=0,MD.電池南=0,MD.電池驗證=0,MD.衣傷=0\n=:MD.菜譜01號=(\"尚未獲得。\"),MD.菜譜02號=(\"尚未獲得。\")\n=:MD.菜譜03號=(\"尚未獲得。\"),MD.菜譜04號=(\"尚未獲得。\")\n=:MD.菜譜05號=(\"尚未獲得。\"),MD.菜譜06號=(\"尚未獲得。\")\n=:MD.菜譜07號=(\"尚未獲得。\"),MD.菜譜08號=(\"尚未獲得。\")\n=:MD.菜譜09號=(\"尚未獲得。\"),MD.菜譜10號=(\"尚未獲得。\")\n=:MD.菜譜11號=(\"尚未獲得。\"),MD.菜譜12號=(\"尚未獲得。\")\n=:MD.菜譜13號=(\"尚未獲得。\"),MD.菜譜14號=(\"尚未獲得。\")\n=:MD.菜譜15號=(\"尚未獲得。\"),MD.菜譜16號=(\"尚未獲得。\")\n=:MD.菜譜17號=(\"尚未獲得。\"),MD.菜譜18號=(\"尚未獲得。\")\n=:MD.菜譜19號=(\"尚未獲得。\"),MD.菜譜20號=(\"尚未獲得。\")\n=:MD.菜譜21號=(\"尚未獲得。\"),MD.菜譜22號=(\"尚未獲得。\")\n=:MD.菜譜23號=(\"尚未獲得。\"),MD.菜譜24號=(\"尚未獲得。\")\n=:MD.菜譜25號=(\"尚未獲得。\"),MD.菜譜26號=(\"尚未獲得。\")\n=:MD.菜譜27號=(\"尚未獲得。\"),MD.菜譜28號=(\"尚未獲得。\")\n=:MD.菜譜29號=(\"尚未獲得。\"),MD.菜譜30號=(\"尚未獲得。\")\n=:MD.理由=random_choice('臨時不想出門','花了太多時間簽收包裹','長得太猥瑣','忙著貪小便宜地殺價','忙著看正妹','掉進洞裡','貪吃','找廁所','迷路','幫助小鳥返巢','追小鴨鴨','被人討厭','睡過頭','不合群')", "繼續開頭": "(j)MD.名字(/j)參加了花狐舉辦的荒野求生之旅，卻因為(j)MD.理由(/j)被夥伴拋下。\n身上只剩一本「野地一千零一夜」旅遊工具書——\n(m)https://i.imgur.com/maVX5RQ.jpg(/m)\n以及一包緊急救難袋。\n<hr/>(b)1(/b)(b)2(/b)(b)3(/b)(b)4(/b)\n选:白色避難袋\n选:藍色避難袋\n选:紅色避難袋\n选:橘色避難袋", "藍色避難袋": "<divstyle=\"BORDER-RIGHT:2pxdashed;BORDER-TOP:2pxdashed;OVERFLOW:auto;BORDER-LEFT:2pxdashed;WIDTH:full;BORDER-BOTTOM:2pxdashed;HEIGHT:full\">\n「打開藍色的避難袋後……」\n獲得小刀一把。\n蛋、果子、香菇各10份。\n=:MD.刀=1,MD.蛋+=10,MD.果+=10,MD.菇+=10\n跳：繼續開頭2", "紅色避難袋": "<divstyle=\"BORDER-RIGHT:2pxdashed;BORDER-TOP:2pxdashed;OVERFLOW:auto;BORDER-LEFT:2pxdashed;WIDTH:full;BORDER-BOTTOM:2pxdashed;HEIGHT:full\">\n「打開紅色的避難袋後……」\n獲得釣竿一把。\n香餌10份、魚餌15份。\n=:MD.釣竿=1,MD.香餌+=10,MD.餌+=15\n跳：繼續開頭2", "橘色避難袋": "<divstyle=\"BORDER-RIGHT:2pxdashed;BORDER-TOP:2pxdashed;OVERFLOW:auto;BORDER-LEFT:2pxdashed;WIDTH:full;BORDER-BOTTOM:2pxdashed;HEIGHT:full\">\n「打開橘色的避難袋後……」\n獲得槌子一把。\n木頭、纖維各20份。\n=:MD.槌=1,MD.木+=20,MD.草+=20\n跳：繼續開頭2", "繼續開頭2": "前方有座破舊木棚。\n(m)https://i.imgur.com/vSj8G9Z.jpg(/m)\n(j)MD.名字(/j)決定先以此為據點，走一步算一步。\n跳：住處", "放棄": "跳：住處", "住處": "=:if(MD.腹>=100)MD.腹=100;if(MD.體>=100)MD.體=100;if(MD.心>=5)MD.心=5;if(MD.心<=-5)MD.心=-5;MD.美貌=(\"平平無奇\")\n=:if(MD.容貌>=10)MD.美貌=(\"伶俐可愛\")\n=:if(MD.容貌>=20)MD.美貌=(\"清麗可人\")\n=:if(MD.容貌>=30)MD.美貌=(\"光彩奪目\")\n=:if(MD.容貌>=40)MD.美貌=(\"超凡出塵\")\n=:if(MD.容貌>=50)MD.美貌=(\"美若天仙\")\n=:if(MD.容貌<=0)MD.美貌=(\"貌不驚人\")\n=:if(MD.容貌<-10)MD.美貌=(\"貌比東施\")\n=:if(MD.容貌<-20)MD.美貌=(\"殘花敗柳\")\n=:if(MD.容貌<-30)MD.美貌=(\"畸形可怖\")\n=:if(MD.心==5)MD.心情=(\"歡欣鼓舞\")\n=:if(MD.心==4)MD.心情=(\"喜上眉梢\")\n=:if(MD.心==3)MD.心情=(\"輕快雀躍\")\n=:if(MD.心==2)MD.心情=(\"如釋重負\")\n=:if(MD.心==1)MD.心情=(\"略顯輕鬆\")\n=:if(MD.心==0)MD.心情=(\"平靜無波\")\n=:if(MD.心==-1)MD.心情=(\"情緒低落\")\n=:if(MD.心==-2)MD.心情=(\"盡顯憂愁\")\n=:if(MD.心==-3)MD.心情=(\"相當負面\")\n=:if(MD.心==-4)MD.心情=(\"愁雲慘霧\")\n=:if(MD.心==-5)MD.心情=(\"心死絕望\")\n=:if(MD.釣竿==1)MD.竿名=(\"持有\")\n=:if(MD.釣竿==0)MD.竿名=(\"尚無\")\n=:if(MD.刀==0)MD.刀具=(\"尚無\")\n=:if(MD.刀==1)MD.刀具=(\"小刀\")\n=:if(MD.刀==2)MD.刀具=(\"石刀\")\n=:if(MD.網==0)MD.網名=(\"尚無\")\n=:if(MD.網==1)MD.網名=(\"持有\")\n=:if(MD.誘==0)MD.誘名=(\"尚無\")\n=:if(MD.誘==1)MD.誘名=(\"持有\")\n=:if(MD.槌==0)MD.槌名=(\"尚無\")\n=:if(MD.槌==1)MD.槌名=(\"持有\")\n=:if(MD.斧==0)MD.斧名=(\"尚無\")\n=:if(MD.斧==1)MD.斧名=(\"持有\")\n=:if(MD.矛==0)MD.矛名=(\"尚無\")\n=:if(MD.矛==1)MD.矛名=(\"持有\")\n=:if(MD.吹箭==0)MD.箭名=(\"尚無\")\n=:if(MD.吹箭==1)MD.箭名=(\"持有\")\n=:if(MD.陷阱==0)MD.陷名=(\"尚無\")\n=:if(MD.陷阱==1)MD.陷名=(\"持有\")\n=:if(MD.大衣==0)MD.裝備=(\"單薄襯衣\")\n=:if(MD.大衣==1)MD.裝備=(\"皮草外套\")\n=:if(MD.鋸==0)MD.鋸名=(\"尚無\")\n=:if(MD.鋸==1)MD.鋸名=(\"持有\")\n=:if(MD.體<=0)game_jumpto(\"累死\")\n=:if(MD.腹<=-50)game_jumpto(\"餓死\")\n=:if(MD.屋==0)MD.據點=(\"破舊的木棚\")\n=:if(MD.屋==1)MD.據點=(\"樸實的木屋\")\n=:if(MD.屋==2)MD.據點=(\"堅固的磚屋\")\n=:if(MD.屋==3)MD.據點=(\"溫馨的小屋\")\n=:if(MD.屋==4)MD.據點=(\"奢華的豪墅\")\n=:if(MD.用時==0)game_jumpto(\"日間歸零\")\n=:if(MD.用時==4)game_jumpto(\"早屋\");if(MD.用時==3)game_jumpto(\"午屋\");if(MD.用時==2)game_jumpto(\"傍屋\");if(MD.用時==1)game_jumpto(\"夜屋\")", "日間歸零": "<divstyle=\"BORDER-RIGHT:2pxdashed;BORDER-TOP:2pxdashed;OVERFLOW:auto;BORDER-LEFT:2pxdashed;WIDTH:full;BORDER-BOTTOM:2pxdashed;HEIGHT:full\"><marquee>夜已深，(j)MD.名字(/j)返回(j)MD.據點(/j)休息。</marquee></div>\n=:MD.用時=4,MD.天數+=1,MD.探望作物-=1,MD.寵肚-=1,MD.寵愛-=5,MD.看蜂=0,MD.看咕=0\n=:MD.ran=random_int(1,30)\n=:if(MD.ran==9)game_jumpto(\"夜襲\")\n=:if(MD.ran==15)game_jumpto(\"豬訪\")\n跳：日間歸零2", "豬訪": "=:if(MD.豬友==0)game_jumpto('日間歸零2')\n入夜，屋外傳來悉悉簌簌的聲響。\n(j)MD.名字(/j)被噪音擾醒，聽著聲音感覺不像惡獸入侵，便大膽的開門檢查。\n=:if(MD.豬友<-10)game_jumpto('豬襲')\n(m)https://i.imgur.com/Ode5e5y.jpg(/m)\n一隻野豬張大眼睛看著(j)MD.名字(/j)，腿前還有一些香菇。\n看樣子，這隻野豬風塵僕僕的叼著禮物來給(j)MD.名字(/j)呢。\n(j)MD.名字(/j)開心的蹲下身摸摸小豬的頭，也招待牠進屋裡，在草團上舒舒服服的睡了一晚。\n獲得5朵香菇。\n=:MD.心+=3,MD.菇+=5,MD.豬友-=1\n跳：日間歸零2", "豬襲": "(m)https://i.imgur.com/n5gpbIt.jpg(/m)\n一隻野豬正在屋外搗蛋！\n等等！那是什麼！\n野豬居然撞下了一個蜂窩，噢不、蜜蜂們把(j)MD.名字(/j)誤認為仇人，怒氣沖沖的飛過來了！\n(j)MD.名字(/j)在千鈞一髮之際把門關上，但免不了被螫了幾個包。\n那些憤怒蜜蜂叮的腫包又紅又癢，讓(j)MD.名字(/j)開始疼痛了。\n可惡，這就是豬的報復嗎……\n=:MD.心=-3,MD.疼痛=1,MD.豬友+=1\n=:MD.ran=random_int(0,3)\n=:if(MD.ran==3)game_jumpto(\"抓山豬\")\n跳：日間歸零2", "抓山豬": "=:if(MD.矛==0)game_jumpto(\"日間歸零2\")\n被憤怒的蜜蜂叮了後憤怒起來的(j)MD.名字(/j)越想越氣，他手握長矛，咬著牙開門追上了山豬。\n山豬沒想到人類會突然發難，沒來得及逃就被一矛戳倒，發出慘叫後沒了氣息。\n(j)MD.名字(/j)成功獵到了山豬！\n得到一塊山豬肉。\n=:MD.山豬+=1\n跳：日間歸零2", "夜襲": "=:if(MD.蛋<1&&MD.肉<1&&MD.蜜<1&&MD.果<1)game_jumpto('日間歸零2')\n……\n入夜，棲息所外傳來野獸的吼聲。\n(j)MD.名字(/j)被噪音吵醒，立刻拿起厚重的嚮導書當護盾，蜷縮在室內一角。\n(m)https://i.imgur.com/iseWgPJ.jpg(/m)\n是熊，一隻極具威脅性的熊在屋外徘徊。\n(j)MD.名字(/j)驚懼不已，心臟都要跳出來了。\n=:if(MD.屋>=2)game_jumpto(\"不夜襲\")", "夜襲成功": "狡猾的熊似乎嗅到屋內的寶藏，鼻子頂開不牢靠的木板門鑽了進來，大肆搜刮。\n腎上腺素爆發的(j)MD.名字(/j)迅速爬上了屋頂，在食物強烈的氣味遮掩下，熊沒有注意到躲藏起來的(j)MD.名字(/j)。\n過了一會，饜足的大熊離去了。\n失去了一部分的物資。\n住在這樣的地方真的太危險了。\n=:MD.ran=random_int(0,3)\n=:MD.果-=MD.ran\n=:MD.ran=random_int(0,3)\n=:MD.肉-=MD.ran\n=:MD.ran=random_int(0,3)\n=:MD.蛋-=MD.ran\n=:MD.ran=random_int(0,3)\n=:MD.蜜-=MD.ran\n=:MD.ran=random_int(0,3)\n=:MD.木-=MD.ran\n=:if(MD.木<0)MD.木=0\n=:if(MD.果<0)MD.果=0\n=:if(MD.肉<0)MD.肉=0\n=:if(MD.蛋<0)MD.蛋=0\n=:if(MD.蜜<0)MD.蜜=0\n跳：日間歸零2", "不夜襲": "好在，(j)MD.據點(/j)防禦工程做的足夠牢固，熊在外頭徘徊了幾分鐘無果，終於離去。\n跳：日間歸零2", "日間歸零2": "=:MD.欠錢=random_choice('15萬','6百','10','2千','1')\n=:MD.債人=random_choice('阿公','父母','同學','朋友','老家的流氓')\n=:MD.夜食=random_choice('葡式蛋塔','豚骨拉麵','香雞排','雪花冰','爆漿乳酪球','鐵板燒')\n=:MD.夜間趣事=random_choice('心情愉悅的時候去海邊走走吧。','日落月升，月歸日出，循環反覆。','至少要活過20天，來生才能頭好壯壯。','吃點沙拉可以獲取BUFF。','這裡會不會有鬼啊。','(j)MD.名字(/j)想起(j)MD.債人(/j)還欠自己(j)MD.欠錢(/j)塊沒還。','(j)MD.名字(/j)詛咒著無情的夥伴。','真的……還有點餓。','(j)MD.名字(/j)夢見了木頭神的神諭。','一隻蚱蜢趁夜深跳進了(j)MD.名字(/j)的被窩。','(j)MD.名字(/j)的打鼾聲震耳欲聾。','想起(j)MD.夜食(/j)有多好吃的(j)MD.名字(/j)偷偷哭泣了。')\n=:MD.ran=random_int(1,3)\n=:if(MD.體<=15)MD.夜間趣事=random_choice('(j)MD.名字(/j)渾身酸痛，翻來覆去睡不著。','今天的體力消耗殆盡，才剛躺下就失去了意識。','身體已經到了極限，連做夢的力氣都沒有。')\n=:if(MD.腹<=10)MD.夜間趣事=random_choice('肚子咕嚕咕嚕叫個不停，今晚大概要餓著肚子睡了。','飢餓像一隻手緊緊攥著胃，(j)MD.名字(/j)蜷縮著身子入睡。','昨天、今天，肚子裡空空的，不知道明天能找到什麼吃的。')\n=:if(MD.心==-5)MD.夜間趣事=random_choice('今天發生了太多糟糕的事。(j)MD.名字(/j)盯著黑暗的天花板，久久無法入眠。','心情跌到谷底，連呼吸都覺得費力。','(j)MD.名字(/j)悄悄哭了一場，才終於睡著。')\n=:if(MD.心==5)MD.夜間趣事=random_choice('今天過得出奇地順利，嘴角不自覺地上揚。','帶著愉快的心情沉沉睡去，連夢都是甜的。','(j)MD.名字(/j)哼著不成調的歌，心滿意足地閉上了眼。')\n=:if(MD.天數<=3)MD.夜間趣事=random_choice('才來第(j)MD.天數(/j)天，感覺還沒適應這裡的一切。','夜風帶著陌生的氣味，提醒著(j)MD.名字(/j)這不是家。','不知道有沒有人在找自己……大概沒有吧。')\n=:if(MD.天數>=20&&MD.ran==1)MD.夜間趣事=random_choice('第(j)MD.天數(/j)天了，也許這裡才是真正的家。','活了這麼久，連蚊子都認識(j)MD.名字(/j)了。','(j)MD.名字(/j)數著星星，數到一半就睡著了。')\n=:if(MD.寵物!=\"\"&&MD.ran<=2)MD.夜間趣事=random_choice('(j)MD.寵物(/j)蜷縮在身旁，傳來微弱的體溫，今晚不那麼孤單了。','輕輕摸了摸(j)MD.寵物(/j)的腦袋，感覺心情平靜了不少。','(j)MD.寵物(/j)也累了，比(j)MD.名字(/j)更早沉入夢鄉。')\n=:if(MD.魔鍊==1&&MD.ran==1)MD.夜間趣事=('脖子上的項鍊在月光下微微發光，(j)MD.名字(/j)想起了那個金髮的人魚少年。')\n=:if(MD.屋==0&&MD.ran<=2)MD.夜間趣事=random_choice('木棚的縫隙透著冷風，(j)MD.名字(/j)把自己裹得更緊了。','頭頂的木板嘎吱作響，也不知道什麼時候會塌下來。')\n=:if(MD.屋>=3&&MD.ran==1)MD.夜間趣事=random_choice('躺在寬敞的床上，(j)MD.名字(/j)有那麼一瞬間忘記了自己在荒島上。','這棟房子是用雙手一磚一瓦蓋起來的，每次看都覺得驕傲。')\n=:if(MD.鴿==1&&MD.ran<=2)MD.夜間趣事=random_choice('灰咕咕在窗沿咕咕叫，(j)MD.名字(/j)迷迷糊糊地應了一聲。','不知道是灰咕咕先睡著，還是(j)MD.名字(/j)先睡著。')\n<i>折騰了一天，(j)MD.名字(/j)疲憊地睡著了。</i>\n<b>(j)MD.夜間趣事(/j)</b>\n(ヽ´ω`)……zZZ\n——\n=:if(MD.天數==365)game_jumpto(\"365\")\n=:if(MD.鴿==3)game_jumpto(\"鴿子結局機率\")\n=:if(MD.感冒==1)game_jumpto(\"早晨感冒\")\n= ": "=:MD.ran=random_int(1,3)\n真幸運，蜂房今天產出了(j)MD.ran(/j)份野蜂蜜。\n體力減少10點。\n=:MD.蜜+=MD.ran,MD.體-=5,MD.看蜂=1\n跳：住處", "蜂箱無蜜": "蜂房空空如也，真是一群不勤勞的蜜蜂。\n體力減少5點。\n=:MD.體-=5,MD.看蜂=1\n跳：住處", "蜂箱螫手": "=:MD.ran=random_int(3,6)\n哎呀！好痛。\n(j)MD.名字(/j)被(j)MD.ran(/j)隻叛逆的蜜蜂給攻擊了。\n體力減少(j)MD.ran(/j)點。\n=:MD.體-=MD.ran,MD.看蜂=1\n跳：住處", "看過蜂箱": "(j)MD.名字(/j)今天已經檢查過蜂箱了，再翻弄也許會嚇著蜜蜂，得不償失。\n跳：住處", "籠屋": "一間約四坪大的籠屋，雖以木石建造，卻也足夠牢固。\n(m)https://i.imgur.com/q9eIANl.jpg(/m)\n=:if(MD.熊==1)game_jumpto(\"熊屋\")\n=:if(MD.鹿==1)game_jumpto(\"鹿屋\")\n=:if(MD.兔==1)game_jumpto(\"兔屋\")\n=:if(MD.鴿==1)game_jumpto(\"鴿屋\")\n飼育屋裡面沒有住客，得到野外捕獲動物才行。\n跳：住處", "鴿屋": "(j)MD.名字(/j)將(j)MD.寵物(/j)養在木籠裡，仔細照顧。\n=:if(MD.寵肚<0)game_jumpto(\"寵餓死\")\n(m)https://i.imgur.com/vDeVElu.jpg(/m)\n(j)MD.寵物(/j)現在的肚子是(j)MD.寵肚(/j)分飽。\n(j)MD.寵物(/j)對(j)MD.名字(/j)的好感是(j)MD.咕愛(/j)分。\n(b)1(/b)(b)2(/b)(b)3(/b)\n选：食療\n选：復健\n选：送信", "送信": "=:if(MD.咕愛<10)game_jumpto(\"翅膀未好\")\n=:if(MD.寵肚<8)game_jumpto(\"咕咕會累\")\n終於到了這一天。\n(j)MD.名字(/j)朝(j)MD.寵物(/j)招手，讓他飛過來停在手上。\n接著，(j)MD.名字(/j)將早已準備好、寫著求救資訊的木片綁在(j)MD.寵物(/j)的腳環上。\n(j)MD.寵物(/j)在(j)MD.名字(/j)耳邊發出咕咕聲，抬起腳用喙啄了一下腳環，顯然不明白用意。\n(j)MD.名字(/j)將(j)MD.寵物(/j)帶到了海邊，今日的風很大，(j)MD.寵物(/j)正好能順風啟航。\n(j)MD.名字(/j)將(j)MD.寵物(/j)捧在雙掌上，在最後低下頭親了一下溫暖的(j)MD.寵物(/j)。\n「對不起，要和你說再見了，也要拜託你幫我送信了喔。」\n這是給這隻郵差的第一個也是最後一個任務。\n(j)MD.寵物(/j)看著(j)MD.名字(/j)的眼神好像改變了，他似乎能和(j)MD.名字(/j)心靈相通。\n帶著不捨，(j)MD.名字(/j)深呼了一口氣，接著使勁將(j)MD.寵物(/j)往天空一拋──\n「一路順風、(j)MD.寵物(/j)！」\n鳥兒順應本能，在海風氣流的護送下，揮動翅膀振臂高飛！\n(j)MD.名字(/j)盯著(j)MD.寵物(/j)逐漸遠去的身影，一直看、一直看，直到(j)MD.寵物(/j)消失在視線之中。\n接下來，就只能祈禱了吧。\n=:MD.體-=5,MD.用時-=1,MD.鴿=3\n跳：住處", "翅膀未好": "(j)MD.寵物(/j)的傷還沒有好全。\n這一趟旅途將是一場大考驗，(j)MD.名字(/j)實在無法狠心強迫一隻受傷的鴿子送信啊。\n跳：住處", "咕咕會累": "(j)MD.寵物(/j)看起來還未吃飽。\n這一趟旅途將是一場大考驗，要是不讓(j)MD.寵物(/j)吃飽，先別說能否成功送信，萬一餓昏了該怎麼辦。\n(j)MD.名字(/j)決定多餵(j)MD.寵物(/j)幾餐。\n跳：住處", "食療": "餵養(j)MD.寵物(/j)需要5束小麥、1顆生蛋、1份藥草。\n=:if(MD.麥<5||MD.蛋<1||MD.藥<1)game_jumpto(\"飼料不足\")\n(j)MD.名字(/j)將調配好的營養穀物放進餵食槽。\n=:if(MD.咕愛<3)game_jumpto(\"鴿不進食\")\n=:if(MD.咕愛<6)game_jumpto(\"鴿緊張吃\")\n=:if(MD.咕愛<8)game_jumpto(\"鴿安心吃\")\n(j)MD.寵物(/j)跳到(j)MD.名字(/j)手上，這裡是他的特等席。\n不停的咕咕咕咕咕叫，非常有元氣。\n(j)MD.名字(/j)看他這麼活潑，心情十分複雜。\n(j)MD.寵物(/j)恢復得越好，離別的時間就越近。\n……雖然想離開荒野，卻不想和(j)MD.寵物(/j)分別呢。\n體力減少5點，失去5束小麥、1顆生蛋、1份藥草。\n(j)MD.寵物(/j)的飽食度增加3點。\n=:MD.麥-=5,MD.蛋-=1,MD.藥-=1,MD.體-=5,MD.用時-=1,MD.寵肚+=3\n=:if(MD.寵肚>=10)MD.寵肚=10\n跳：住處", "鴿安心吃": "(j)MD.寵物(/j)仰身躺倒在餵食槽前。\n就是這麼逗比才會被同伴欺負吧？(j)MD.名字(/j)伸出食指，戳了戳小小的鳥嘴。\n被戳後(j)MD.寵物(/j)咕咕叫了起來，在地上翻滾了一圈，才慢條斯理的啄起飼料。\n體力減少5點，失去5束小麥、1顆生蛋、1份藥草。\n(j)MD.寵物(/j)的飽食度增加3點。\n=:MD.麥-=5,MD.蛋-=1,MD.藥-=1,MD.體-=5,MD.用時-=1,MD.寵肚+=3\n=:if(MD.寵肚>=10)MD.寵肚=10\n跳：住處", "鴿緊張吃": "(j)MD.寵物(/j)歪著腦袋，好像在懷疑這是食物還是毒藥。\n終於，(j)MD.寵物(/j)看似要進食了，小腳丫卻一個箭步踏進餵食盆，接著把整個身體泡在飼料中，享受起美食浴。\n……這個奢侈的小搗蛋，清潔可是很麻煩的啊。\n體力減少5點，失去5束小麥、1顆生蛋、1份藥草。\n(j)MD.寵物(/j)的飽食度增加3點。\n=:MD.麥-=5,MD.蛋-=1,MD.藥-=1,MD.體-=5,MD.用時-=1,MD.寵肚+=3\n=:if(MD.寵肚>=10)MD.寵肚=10\n跳：住處", "鴿不進食": "貪玩的(j)MD.寵物(/j)對著(j)MD.名字(/j)的手啄啊啄，一下子又跳到架子上搖屁股。\n傷口明明還沒恢復，撞到了可怎麼辦，真是讓人不省心的小鳥。\n(j)MD.名字(/j)把(j)MD.寵物(/j)輕握在掌中，用湯匙強迫餵食。\n體力減少5點，失去5束小麥、1顆生蛋、1份藥草。\n(j)MD.寵物(/j)的飽食度增加3點。\n=:MD.麥-=5,MD.蛋-=1,MD.藥-=1,MD.體-=5,MD.用時-=1,MD.寵肚+=3\n=:if(MD.寵肚>=10)MD.寵肚=10\n跳：住處", "復健": "(j)MD.名字(/j)把木籠打開，帶著(j)MD.寵物(/j)外出放風。\n=:if(MD.看咕==1)game_jumpto(\"看過咕咕\")\n=:MD.咕愛+=1\n=:if(MD.咕愛<=1)game_jumpto(\"灰咕咕1\")\n=:if(MD.咕愛==2)game_jumpto(\"灰咕咕2\")\n=:if(MD.咕愛==3)game_jumpto(\"灰咕咕3\")\n=:if(MD.咕愛==4)game_jumpto(\"灰咕咕4\")\n=:if(MD.咕愛==5)game_jumpto(\"灰咕咕5\")\n=:if(MD.咕愛==6)game_jumpto(\"灰咕咕6\")\n=:if(MD.咕愛==7)game_jumpto(\"灰咕咕7\")\n=:if(MD.咕愛==8)game_jumpto(\"灰咕咕8\")\n=:if(MD.咕愛==9)game_jumpto(\"灰咕咕9\")\n(j)MD.寵物(/j)的身體已經達到最佳狀態。\n是時候考慮將求救信綁在(j)MD.寵物(/j)的腳環上，讓(j)MD.寵物(/j)幫忙送信了。\n(j)MD.寵物(/j)本來在草地上試著拍翅，對(j)MD.名字(/j)慢下來的腳步感到疑惑，於是又朝(j)MD.名字(/j)跑來。\n(m)https://i.imgur.com/VyyseSS.jpg(/m)\n……道理都知道，就是捨不得啊。\n體力減少5點。\n(j)MD.寵物(/j)很愛(j)MD.名字(/j)。\n=:MD.體-=5,MD.用時-=1,MD.咕愛=10,MD.心+=1,MD.看咕+=1\n跳：住處", "灰咕咕1": "撿到(j)MD.寵物(/j)後第一次帶他出門復健。\n(j)MD.寵物(/j)一側的翅膀似乎還會痛，無法展開羽翼。\n(j)MD.名字(/j)帶著他在草地上緩緩散步，享受片刻時光。\n體力減少5點。\n(j)MD.寵物(/j)對(j)MD.名字(/j)的好感上升了。\n=:MD.體-=5,MD.用時-=1,MD.看咕+=1\n跳：住處", "灰咕咕2": "(j)MD.寵物(/j)今天好像有點慵懶。\n一邊走一邊垂著頭，在草地上找蟲子當零食。\n(j)MD.名字(/j)學著(j)MD.寵物(/j)
