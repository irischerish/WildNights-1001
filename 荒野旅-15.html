function evalExpr(code) {
  try {
    return new Function('MD','random_int','random_choice','game_jumpto','获取',
      `return (${code})`
    )(MD, rInt, rChoice, game_jumpto, _获取);
  } catch(e) { return undefined; }
}

// ── code executor ──
function execLine(code) {
  _pendingJump = null;
  code = code.trim();
  if (!code) return;

  // Handle inline function definition: function获取(){...}
  const funcMatch = code.match(/^function\s*(获取)\s*\(\s*\)\s*\{([\s\S]*)\}$/);
  if (funcMatch) {
    try {
      // Use closure over global MD so DOM reads go into the real MD object
      _获取 = new Function(funcMatch[2]);
      // Bind to window scope where MD is accessible
      const body = funcMatch[2];
      _获取 = function() {
        // Replace MD.xxx = ... with direct assignment to global MD
        try { new Function('MD', body)(MD); } catch(e) { console.warn('获取 err:', e.message); }
      };
    } catch(e) {}
    return;
  }

  // Split multiple assignments by comma (careful with strings/parens)
  const parts = splitAssignments(code);
  for (const part of parts) {
    _pendingJump = null;
    try {
      new Function('MD','random_int','random_choice','game_jumpto','获取',
        part
      )(MD, rInt, rChoice, game_jumpto, _获取 ? () => _获取() : function(){});
    } catch(e) {
      console.warn('exec err:', e.message, '|', part.slice(0,80));
    }
    if (_pendingJump) break;
  }
}

function splitAssignments(code) {
  // Split comma-separated assignments, respecting strings and parens
  const parts = [];
  let cur = '', depth = 0, inStr = false, strCh = '';
  for (let i = 0; i < code.length; i++) {
    const c = code[i];
    if (inStr) {
      cur += c;
      if (c === strCh && (i === 0 || code[i-1] !== '\\')) inStr = false;
    } else if (c === '"' || c === "'") {
      inStr = true; strCh = c; cur += c;
    } else if ('([{'.includes(c)) { depth++; cur += c; }
    else if (')]}'.includes(c)) { depth--; cur += c; }
    else if (c === ',' && depth === 0) {
      if (cur.trim()) parts.push(cur.trim());
      cur = '';
    } else cur += c;
  }
  if (cur.trim()) parts.push(cur.trim());
  return parts;
}

// ── text renderer ──
const CMAP = {0:'c0',1:'c1',2:'c2',3:'c3',4:'c4',5:'c5',6:'c6',7:'c7',8:'c8',9:'c9'};

function renderLine(text) {
  if (!text) return '';
  // 若第一次替換後結果仍含 (j)，代表變數值本身含有 (j)expr(/j)，需再跑一次
  const _renderOnce = (t) => _renderLineCore(t);
  text = _renderOnce(text);
  if (text.includes('(j)')) text = _renderOnce(text);
  return text;
}
function _renderLineCore(text) {
  if (!text) return '';

  // (j)expr(/j) → evaluate expression (variable, conditional, function call)
  text = text.replace(/\(j\)([\s\S]+?)\(\/j\)/g, (m, expr) => {
    expr = expr.trim();
    try {
      // Pattern: if(cond)'text' → show text if condition true, else empty
      const ifMatch = expr.match(/^if\s*\((.+?)\)\s*'([^']*)'$/s) ||
                      expr.match(/^if\s*\((.+?)\)\s*"([^"]*)"$/s);
      if (ifMatch) {
        const cond = evalExpr(ifMatch[1]);
        if (!cond) return '';
        let val = ifMatch[2];
        // Convert broken <imgsrc="url" alt="..." title="name"> to styled badge
        const badgeMatch = val.match(/<imgsrc="[^"]*"[^>]*title="([^"]*)"[^>]*>/) ||
                           val.match(/<imgsrc="[^"]*"[^>]*alt="([^"]*)"[^>]*>/);
        if (badgeMatch) {
          return `<span style="display:inline-block;background:linear-gradient(135deg,#5a3e1b,#3a2810);border:2px solid var(--c4);border-radius:6px;padding:4px 10px;margin:3px;font-size:0.85rem;color:var(--c6)">🏅 ${badgeMatch[1]}</span>`;
        }
        return val;
      }
      // Pattern: (MD.varname) - extra parens
      const parenMatch = expr.match(/^\(?(MD\.[^)]+)\)?$/);
      if (parenMatch) {
        const val = evalExpr(parenMatch[1].trim());
        return `<span class="v">${val !== undefined && val !== null ? val : ''}</span>`;
      }
      // game_createmsg → ignore/suppress
      if (expr.startsWith('game_createmsg')) return '';
      // General expression
      const val = evalExpr(expr);
      return val !== undefined && val !== null ? `<span class="v">${val}</span>` : '';
    } catch(e) { return ''; }
  });

  // Color tags (N)...(/N) - process outer to inner for nesting
  for (let i = 0; i <= 9; i++) {
    text = text.replace(new RegExp(`\\(${i}\\)(.*?)\\(\\/${i}\\)`, 'gs'),
      (m, inner) => `<span class="${CMAP[i]}">${inner}</span>`);
  }

  // (m)url(/m) → image
  text = text.replace(/\(m\)(https?:\/\/\S+?)\(\/m\)/g,
    (m, url) => ``);

  // (b)N(/b) → remove (layout hints)
  text = text.replace(/\(b\)\d+\(\/b\)/g, '');

  // <input...> → styled input (handle no-spaces version)
  text = text.replace(/<input([^>]*)>/gi, (m, attrs) => {
    // normalize attrs (might have no spaces)
    attrs = attrs.replace(/([a-zA-Z-]+)=/g, ' $1=').trim();
    const id = (attrs.match(/id="?(\w+)"?/) || [])[1] || 'inp';
    const max = (attrs.match(/maxlength="?(\d+)"?/) || [])[1] || '20';
    return `<input class="inp" id="${id}" maxlength="${max}" placeholder="請輸入…">`;
  });

  // Fix no-space HTML tags (e.g. <tableborder="2"> → <table border="2">)
  // Only match full known tag names that are immediately followed by an attribute (no space)
  text = text.replace(/<(table|span|thead|tbody|tr|th|td)((?:[a-zA-Z][^>]*))>/gi, (m, tag, rest) => {
    return '<' + tag + ' ' + rest + '>';
  });
  // Clean up <spanclass="close">...</span> (close button - not needed)
  text = text.replace(/<span\s+class\s*=\s*"close"[^>]*>.*?<\/span>/gi, '');
  // Style the table nicely
  text = text.replace(/<table[^>]*>/gi, '<table style="border-collapse:collapse;margin:10px auto;width:100%">');
  text = text.replace(/<td[^>]*>/gi, '<td style="border:1px solid var(--border);padding:5px 10px;text-align:center">');
  text = text.replace(/<tr[^>]*>/gi, '<tr>');
  // Remove stray </center> and <center> inside table cells
  text = text.replace(/<\/?center>/gi, '');
  // Remove stray </div> only when unmatched (count open vs close divs)
  // Simple fix: only strip </div> if no matching <div class="dbox"> was opened
  if (!text.includes('<div')) text = text.replace(/<\/div>/gi, '');

  // <FIELDSET> → styled section box
  text = text.replace(/<FIELDSET[^>]*>/gi, '<fieldset style="border:1px solid var(--border);border-radius:4px;padding:10px 14px;margin:8px 0">');
  text = text.replace(/<\/FIELDSET>/gi, '</fieldset>');

  // div dashed box
  text = text.replace(/<div[^>]*BORDER[^>]*>/gi, '<div class="dbox">');


  // marquee → styled div
  text = text.replace(/<marquee[^>]*>(.*?)<\/marquee>/gs,
    (m, inner) => `<div style="text-align:center;font-style:italic;color:var(--c4)">${inner}</div>`);

  // Basic inline formatting
  text = text.replace(/<i>(.*?)<\/i>/gi, '<em>$1</em>');
  text = text.replace(/<b>(.*?)<\/b>/gi, '<strong>$1</strong>');
  text = text.replace(/<u>(.*?)<\/u>/gi, '<u>$1</u>');

  // <center> → centered paragraph (handled in renderScene wrapping)
  text = text.replace(/<\/?center>/gi, '');
  text = text.replace(/<hr\s*\/?>/gi, '<hr>');

  return text;
}

// ── scene parser ──
function parseScene(name) {
  const raw = SCENES[name];
  if (raw === undefined) {
    return { html: `<p style="color:var(--c5)">場景「${name}」未找到。</p>`, choices: [], jump: null, btnRows: [] };
  }

  const lines = raw.split('\n');
  const htmlParts = [];
  const choices = [];
  const btnRows = [];
  let jump = null;
  let btnEnabled = true;
  let pendingChoice = null;

  _pendingJump = null;

  for (let i = 0; i < lines.length; i++) {
    const raw_line = lines[i];
    const line = raw_line.trim();
    if (!line) continue;

    // =: code
    if (line.startsWith('=:') || line.startsWith('=：')) {
      execLine(line.slice(2).trim());
      if (_pendingJump) {
        if (pendingChoice !== null) { choices.push(pendingChoice); pendingChoice = null; }
        jump = _pendingJump; _pendingJump = null; break;
      }
      continue;
    }

    // 等: wait — 記錄延遲秒數和提示文字
    if (line.startsWith('等:') || line.startsWith('等：')) {
      const waitStr = line.slice(2).trim();
      const [secPart, ...msgParts] = waitStr.split('|');
      const waitSec = parseFloat(secPart.trim()) || 1;
      const waitMsg = msgParts.join('|').trim();
      if (pendingChoice !== null) { choices.push(pendingChoice); pendingChoice = null; }
      // 把後續行打包成 continuation scene
      const remainingLines = lines.slice(i + 1).join('\n');
      return { html: htmlParts.join('') + (waitMsg ? `<p style="color:var(--dim);font-style:italic;">${waitMsg}</p>` : ''),
               choices, jump, btnRows, waitSec, waitContinuation: remainingLines, name: undefined };
    }

    // 讀: load trigger
    if (line.startsWith('讀:') || line.startsWith('讀：')) {
      if (pendingChoice !== null) { choices.push(pendingChoice); pendingChoice = null; }
      jump = '__LOAD__';
      break;
    }

    // 存: save trigger
    if (line.startsWith('存:') || line.startsWith('存：')) {
      if (pendingChoice !== null) { choices.push(pendingChoice); pendingChoice = null; }
      jump = '__SAVE__';
      break;
    }

    // 跳：jump
    if (line.startsWith('跳：') || line.startsWith('跳:')) {
      if (pendingChoice !== null) { choices.push(pendingChoice); pendingChoice = null; }
      jump = line.slice(2).trim();
      break;
    }

    // 选: choice — add to pending, will be committed or dropped by following <:
    if (line.startsWith('选:') || line.startsWith('选：')) {
      const label = line.slice(2).trim();
      // Commit any previously pending choice
      if (pendingChoice !== null) {
        choices.push(pendingChoice);
      }
      pendingChoice = { label: renderLine(label), target: label };
      continue;
    }

    // <: conditional — applies to the PRECEDING 选 (pendingChoice)
    if (line.startsWith('<:')) {
      const code = line.slice(2).trim();
      _pendingJump = null;
      try {
        const result = new Function('MD','random_int','random_choice','game_jumpto', `
          let curBtn = 'active';
          ${code}
          return curBtn;
        `)(MD, rInt, rChoice, game_jumpto);
        if (result === null) pendingChoice = null;
      } catch(e) {}
      if (_pendingJump) { jump = _pendingJump; _pendingJump = null; break; }
      continue;
    }

    // Capture (b) row layout: (b)1(/b)(b)2(/b) = defines button row grouping
    const lineNobr = line.replace(/<hr\s*\/?>/, '').trim();
    if (lineNobr && !lineNobr.replace(/\(b\)\d+\(\/b\)/g,'').trim()) {
      const rowCount = (line.match(/\(b\)\d+\(\/b\)/g) || []).length;
      if (rowCount > 0) btnRows.push(rowCount);
      if (/<hr/i.test(line)) htmlParts.push('<hr>');
      continue;
    }

    // Regular text/html line
    const rendered = renderLine(line);
    if (rendered) {
      htmlParts.push(`<p>${rendered}</p>`);
    }
  }

  if (pendingChoice !== null) choices.push(pendingChoice);
  return { html: htmlParts.join(''), choices, jump, btnRows };
}

// ── scene runner (auto-jump through pure-code scenes) ──
function runScene(name) {
  let cur = name;
  const sceneList = Object.keys(SCENES);
  let hops = 0;

  while (hops++ < 300) {
    const result = parseScene(cur);

    // If there are choices or input fields, stop here
    if (result.choices.length > 0 || result.html.includes('<input')) { // stop if interactive
      return { ...result, name: cur };
    }

    // If there's a jump and no displayable content, auto-follow
    if (result.jump) {
      if (!result.html.trim() || result.html === '') {
        cur = result.jump;
        continue;
      }
      // If only content is a location announcement 「xxx」with no choices, auto-follow
      const stripped = result.html.replace(/<[^>]+>/g, '').trim();
      const isLocationAnnounce = result.choices.length === 0 &&
        /^「[^」]{1,20}」[。.]?$/.test(stripped);
      if (isLocationAnnounce) {
        cur = result.jump;
        continue;
      }
      // Has meaningful content + jump → show content with continue button
      return { ...result, name: cur };
    }

    // No jump, no choices → fall through to next scene
    const idx = sceneList.indexOf(cur);
    if (idx >= 0 && idx < sceneList.length - 1) {
      const next = sceneList[idx + 1];
      // If this scene has no displayable content, auto-follow
      if (!result.html.trim()) {
        cur = next;
        continue;
      }
      return { ...result, name: cur, jump: next };
    }

    return { ...result, name: cur };
  }

  return { html: '<p style="color:var(--c5)">發生迴圈錯誤。</p>', choices: [], jump: null, btnRows: [], name: cur };
}

// ── display ──
function display(result, instant) {
  if (!instant) {
    const sd = document.getElementById('scene-display');
    const ch = document.getElementById('choices');
    sd.style.opacity = '0';
    ch.style.opacity = '0';
    setTimeout(() => _doDisplay(result), 260);
    return;
  }
  _doDisplay(result);
}

function _doDisplay(result) {
  // 電子雞模式下攔截畫面更新
  if (_tamaActive) { tamaUpdateBars(); return; }
  // Stats bar
  if (MD.天數 !== undefined) {
    const sb = document.getElementById('stats-bar');
    sb.style.display = 'flex';
    document.getElementById('s-day').textContent = MD.天數 || 1;
    document.getElementById('s-time').textContent = MD.時間 || '';
    const hp = MD.體 || 0;
    const hpEl = document.getElementById('s-hp');
    hpEl.textContent = hp;
    hpEl.style.color = hp <= 15 ? 'var(--c0)' : hp <= 30 ? 'var(--c4)' : 'var(--c3)';
    const food = MD.腹 || 0;
    const foodEl = document.getElementById('s-food');
    foodEl.textContent = food;
    foodEl.style.color = food <= -20 ? 'var(--c0)' : food <= 0 ? 'var(--c4)' : 'var(--c3)';


  }

  const sd = document.getElementById('scene-display');
  const ch = document.getElementById('choices');
  sd.innerHTML = '<div class="sd-inner">' + result.html + '</div>';
  ch.innerHTML = '';

  // 像素場景插圖
  const inner2 = sd.querySelector('.sd-inner');
  if (inner2) {
    const existing2 = inner2.querySelector('.pixel-scene-canvas');
    if (existing2) existing2.remove();
    let pcanvas = null;
    if (typeof PIXEL_SCENES !== 'undefined' && _currentScene && PIXEL_SCENES[_currentScene]) {
      pcanvas = makeSceneCanvas(PIXEL_SCENES[_currentScene]);
    } else if (typeof BASE_SCENES !== 'undefined' && BASE_SCENES.includes(_currentScene)) {
      const lvl = Math.min(4, Math.max(0, MD['屋'] || 0));
      pcanvas = makeSceneCanvas((ctx, W, H) => drawBase(ctx, W, H, lvl));
    }
    if (pcanvas) {
      pcanvas.className = 'pixel-scene-canvas';
      inner2.prepend(pcanvas);
    }
  }

  // Choices — respect (b) row layout if present
  if (result.choices.length > 0) {
    const rows = result.btnRows || [];
    if (rows.length > 0) {
      // Layout buttons in rows as specified by (b) tags
      let idx = 0;
      for (const rowSize of rows) {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:6px;margin-bottom:6px';
        for (let r = 0; r < rowSize && idx < result.choices.length; r++, idx++) {
          const c = result.choices[idx];
          const btn = document.createElement('button');
          btn.className = 'btn';
          btn.style.flex = '1';
          btn.innerHTML = '<span class="btn-arrow">▶</span>' + c.label;
          btn.onclick = () => { readInputs(sd); goto(c.target); };
          row.appendChild(btn);
        }
        ch.appendChild(row);
      }
      // Remaining choices (not in any row) go as normal vertical list
      for (; idx < result.choices.length; idx++) {
        const c = result.choices[idx];
        const btn = document.createElement('button');
        btn.className = 'btn';
        // 避難袋彩色按鈕
        const _bagMap = {
          '白色避難袋': 'btn btn-bag btn-bag-torn',
          '藍色避難袋': 'btn btn-bag btn-bag-blue',
          '紅色避難袋': 'btn btn-bag btn-bag-red',
          '橘色避難袋': 'btn btn-bag btn-bag-orange',
        };
        if (_bagMap[c.label]) btn.className = _bagMap[c.label];
        const _showArrow = !_bagMap[c.label];
        btn.innerHTML = (_showArrow ? '<span class="btn-arrow">▶</span>' : '') + c.label;
        btn.onclick = () => { readInputs(sd); goto(c.target); };
        ch.appendChild(btn);
      }
    } else {
      for (const c of result.choices) {
        const btn = document.createElement('button');
        btn.className = 'btn';
        // 避難袋彩色按鈕
        const _bagMap = {
          '白色避難袋': 'btn btn-bag btn-bag-torn',
          '藍色避難袋': 'btn btn-bag btn-bag-blue',
          '紅色避難袋': 'btn btn-bag btn-bag-red',
          '橘色避難袋': 'btn btn-bag btn-bag-orange',
        };
        if (_bagMap[c.label]) btn.className = _bagMap[c.label];
        const _showArrow = !_bagMap[c.label];
        btn.innerHTML = (_showArrow ? '<span class="btn-arrow">▶</span>' : '') + c.label;
        btn.onclick = () => { readInputs(sd); goto(c.target); };
        ch.appendChild(btn);
      }
    }
  } else if (result.jump) {
    // Continue button
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.innerHTML = '<span class="btn-arrow">▶</span>繼續';
    btn.onclick = () => {
      readInputs(sd);
      goto(result.jump);
    };
    ch.appendChild(btn);
  }

  sd.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // 住處：加存讀檔快捷按鈕
  if (result.name === '住處' || result.name === '起床') {
    const saveBar = document.createElement('div');
    saveBar.style.cssText = 'display:flex;gap:6px;margin-top:4px;';
    const btnSave = document.createElement('button');
    btnSave.className = 'btn';
    btnSave.style.cssText = 'flex:1;font-size:.8rem;padding:6px;opacity:.75;';
    btnSave.innerHTML = '💾 存檔';
    btnSave.onclick = () => openSaveModal('save');
    const btnLoad = document.createElement('button');
    btnLoad.className = 'btn';
    btnLoad.style.cssText = 'flex:1;font-size:.8rem;padding:6px;opacity:.75;';
    btnLoad.innerHTML = '📂 讀檔';
    btnLoad.onclick = () => openSaveModal('load');
    saveBar.appendChild(btnSave);
    saveBar.appendChild(btnLoad);
    ch.appendChild(saveBar);
  }

  // Fade back in
  requestAnimationFrame(() => {
    sd.style.opacity = '1';
    ch.style.opacity = '1';
  });
}

function readInputs(container) {
  container.querySelectorAll('input.inp').forEach(inp => {
    if (inp.id === 'a') MD['名字'] = inp.value || '旅人';
    else if (inp.id === 'z') { /* 获取 will handle */ }
    else if (inp.id === 'j') { /* 获取 will handle */ }
    else if (inp.id === 'y') { /* 获取 will handle */ }
  });
}

// Scene name lookup cache
const _sceneCache = {};

function goto(name) {
  // Resolve (j) in scene name (e.g. 殺害(j)MD.寵物(/j))
  name = name.replace(/\(j\)(MD\.[^(/]+?)\(\/j\)/g, (m, path) => {
    try { return String(evalExpr(path.trim()) || ''); } catch(e) { return m; }
  });
  // Strip color tags from scene name
  name = name.replace(/\(\d+\)(.*?)\(\/\d+\)/g, '$1').trim();

  if (name === '__SAVE__') { openSaveModal('save'); return; }
  if (name === '__LOAD__') { openSaveModal('load'); return; }
  _currentScene = name;  // 追蹤當前場景
  const _ekm = {'結局1':'結局1','結局2':'結局2','結局3':'結局3','離開櫥櫃':'結局4','繼續躲藏':'結局5','我一定會幫你完成使命。':'結局6','我們一定要一起走。':'結局7'};
  if (_ekm[name]) _lastEndingKey = _ekm[name];

  // Find actual scene key (with cache)
  if (SCENES[name] === undefined) {
    if (_sceneCache[name]) {
      name = _sceneCache[name];
    } else {
      const orig = name;
      const found = Object.keys(SCENES).find(k => {
        const stripped = k.replace(/\(\d+\)(.*?)\(\/\d+\)/g,'$1')
                          .replace(/\(j\)(.*?)\(\/j\)/g,'$1').trim();
        return stripped === name;
      });
      if (found) { _sceneCache[orig] = found; name = found; }
    }
  }

  // 結局畫面攔截
  if (name === '荒野．旅《完》' && typeof showEnding === 'function' && _lastEndingKey) {
    showEnding(_lastEndingKey);
    _lastEndingKey = null;
    return;
  }

  // 電子雞場景攔截
  if (typeof TAMA_SCENES !== 'undefined' && TAMA_SCENES[name]) {
    const t = TAMA_SCENES[name];
    const lblA = document.getElementById('tama-lbl-a');
    const lblB = document.getElementById('tama-lbl-b');
    if (lblA) lblA.textContent = t.lbl[0];
    if (lblB) lblB.textContent = t.lbl[1];
    // 先跑 parseScene 觸發 =: 初始化（如飽肚檢查）
    const preCheck = parseScene(name);
    if (preCheck.jump) { goto(preCheck.jump); return; }
    openTama(t.feed, t.play);
    return;
  }

  const result = runScene(name);
  if (result.waitSec) {
    // 先顯示等待提示，停用按鈕
    display({ ...result, waitSec: 0, choices: [], jump: null });
    const sd = document.getElementById('scene-display');
    const ch = document.getElementById('choices');
    // 加進度條
    const bar = document.createElement('div');
    bar.style.cssText = `height:2px;background:linear-gradient(90deg,var(--gold),var(--sea));border-radius:1px;margin-top:12px;width:0;transition:width ${result.waitSec}s linear;`;
    if (sd.querySelector('.sd-inner')) sd.querySelector('.sd-inner').appendChild(bar);
    else sd.appendChild(bar);
    requestAnimationFrame(() => requestAnimationFrame(() => { bar.style.width = '100%'; }));
    setTimeout(() => {
      // 繼續執行剩餘場景內容
      if (result.waitContinuation) {
        const tmpName = '__wait_cont__';
        SCENES[tmpName] = result.waitContinuation;
        goto(tmpName);
        delete SCENES[tmpName];
      } else if (result.jump) {
        goto(result.jump);
      }
    }, result.waitSec * 1000);
    return;
  }
  display(result);
}

// ── 存讀檔系統 ──
const SAVE_KEY = 'wildtravel_save_';
const SAVE_SLOTS = 3;

function getSaveData(slot) {
  try {
    const raw = sessionStorage.getItem(SAVE_KEY + slot);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function saveGame(slot) {
  const data = {
    md: JSON.parse(JSON.stringify(MD)),
    scene: _currentScene || '住處',
    ts: Date.now()
  };
  sessionStorage.setItem(SAVE_KEY + slot, JSON.stringify(data));
  showToast(`✓ 存至欄位 ${slot}`);
  document.getElementById('save-modal').style.display = 'none';
}

function loadGame(slot) {
  const data = getSaveData(slot);
  if (!data) return;
  MD = data.md;
  document.getElementById('save-modal').style.display = 'none';
  goto(data.scene || '住處');
}

function deleteSave(slot) {
  if (!confirm(`確定要刪除欄位 ${slot} 的存檔嗎？`)) return;
  sessionStorage.removeItem(SAVE_KEY + slot);
  openSaveModal(document.getElementById('save-modal').dataset.mode);
}

function exportSave(slot) {
  const data = getSaveData(slot);
  if (!data) { alert('此欄位沒有存檔'); return; }
  try {
    const str = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    document.getElementById('export-textarea').value = str;
    document.getElementById('import-textarea').value = '';
    document.getElementById('export-modal').style.display = 'flex';
  } catch(e) { alert('匯出失敗'); }
}

function importSave() {
  const str = document.getElementById('import-textarea').value.trim();
  if (!str) { alert('請貼上存檔碼'); return; }
  try {
    const data = JSON.parse(decodeURIComponent(escape(atob(str))));
    if (!data.md) throw new Error('格式錯誤');
    // 找空欄位
    let slot = 1;
    for (let s = 1; s <= SAVE_SLOTS; s++) { if (!getSaveData(s)) { slot = s; break; } }
    sessionStorage.setItem(SAVE_KEY + slot, JSON.stringify(data));
    document.getElementById('export-modal').style.display = 'none';
    document.getElementById('import-textarea').value = '';
    showToast(`✓ 已匯入至欄位 ${slot}`);
    openSaveModal('load');
  } catch(e) { alert('匯入失敗，請確認存檔碼是否正確。'); }
}

function fmtTs(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function openSaveModal(mode) {
  // mode = 'save' | 'load'
  const modal = document.getElementById('save-modal');
  modal.dataset.mode = mode;
  document.getElementById('save-modal-title').textContent = mode === 'save' ? '💾 選擇存檔欄位' : '📂 選擇讀取欄位';
  const container = document.getElementById('save-slots');
  container.innerHTML = '';
  for (let s = 1; s <= SAVE_SLOTS; s++) {
    const data = getSaveData(s);
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;background:var(--paper2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;';
    const slotNum = `<span style="color:var(--dim);min-width:1.4em;text-align:center;font-size:.85rem;">${s}</span>`;
    let info, mainBtn, delBtn = '';
    if (data) {
      const md = data.md;
      const name = md.名字 || '旅人';
      const day = md.天數 || 1;
      const hp = md.體 || 0;
      info = `<div style="flex:1;"><div style="color:var(--text);font-size:.9rem;">${name} · 第${day}天 · 體力${hp}</div><div style="color:var(--dim);font-size:.75rem;">${fmtTs(data.ts)}</div></div>`;
      if (mode === 'save') {
        mainBtn = `<button onclick="saveGame(${s})" style="padding:5px 12px;background:var(--accent);color:#000;border:none;border-radius:5px;cursor:pointer;font-size:.85rem;white-space:nowrap;">覆蓋</button>`;
      } else {
        mainBtn = `<button onclick="loadGame(${s})" style="padding:5px 12px;background:var(--accent);color:#000;border:none;border-radius:5px;cursor:pointer;font-size:.85rem;white-space:nowrap;">讀取</button>`;
      }
      delBtn = `<button onclick="deleteSave(${s})" style="padding:5px 8px;background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:5px;cursor:pointer;font-size:.8rem;">✕</button>`;
    } else {
      info = `<div style="flex:1;color:var(--dim);font-size:.85rem;">── 空欄位 ──</div>`;
      if (mode === 'save') {
        mainBtn = `<button onclick="saveGame(${s})" style="padding:5px 12px;background:var(--btn-bg);color:var(--accent2);border:1px solid var(--btn-border);border-radius:5px;cursor:pointer;font-size:.85rem;white-space:nowrap;">存入</button>`;
      } else {
        mainBtn = `<button disabled style="padding:5px 12px;background:var(--paper2);color:var(--dim);border:1px solid var(--border);border-radius:5px;font-size:.85rem;white-space:nowrap;">空</button>`;
      }
    }
    row.innerHTML = slotNum + info + mainBtn + delBtn;
    container.appendChild(row);
  }
  modal.style.display = 'flex';
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:8px 20px;border-radius:20px;font-size:.9rem;z-index:9999;pointer-events:none;transition:opacity .4s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 1800);
}

// 追蹤當前場景
let _currentScene = '進場';
let _lastEndingKey = null;

// ── 開場選單：有存檔則顯示繼續/新遊戲 ──
function showStartMenu() {
  const hasSave = Array.from({length: SAVE_SLOTS}, (_, i) => getSaveData(i+1)).some(Boolean);
  const sd = document.getElementById('scene-display');
  const ch = document.getElementById('choices');

  sd.innerHTML = `
    <div style="text-align:center;padding:16px 0;color:var(--dim);font-size:.85rem;line-height:2.6;letter-spacing:.08em;">
      <div style="color:var(--border2);font-size:1.2rem;margin-bottom:8px;">⁕</div>
      在荒野中，每一天都是新的考驗。<br>
      你能在這座島上，活過一千零一夜嗎？
      <div style="color:var(--border2);font-size:1.2rem;margin-top:8px;">⁕</div>
    </div>`;

  ch.innerHTML = '';

  if (hasSave) {
    const btnLoad = document.createElement('button');
    btnLoad.className = 'btn';
    btnLoad.innerHTML = '📂 繼續遊戲';
    btnLoad.onclick = () => openSaveModal('load');
    ch.appendChild(btnLoad);
  }

  const btnNew = document.createElement('button');
  btnNew.className = 'btn';
  btnNew.innerHTML = hasSave ? '✦ 新遊戲' : '✦ 開始遊戲';
  btnNew.onclick = () => {
    if (hasSave && !confirm('確定要開始新遊戲嗎？目前存檔不會被刪除。')) return;
    MD = {};
    goto('進場');
  };
  ch.appendChild(btnNew);
}

window.onload = () => showStartMenu();
</script>

<script>
// ══════ 電子雞系統 ══════
const TAMA_PETS = {
  '熊': {
    color: '#8B6914',
    draw(ctx, frame) {
      const f = frame % 2;
      ctx.fillStyle = '#8B6914';
      // 身體
      ctx.fillRect(12, 20, 24, 20);
      // 頭
      ctx.fillRect(10, 8, 28, 18);
      // 耳朵
      ctx.fillRect(10, 4, 8, 8);
      ctx.fillRect(30, 4, 8, 8);
      // 耳朵內
      ctx.fillStyle = '#c4956a';
      ctx.fillRect(12, 6, 4, 4);
      ctx.fillRect(32, 6, 4, 4);
      // 眼睛
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(14, 13, 4, 4);
      ctx.fillRect(30, 13, 4, 4);
      // 鼻子
      ctx.fillStyle = '#4a2a0a';
      ctx.fillRect(20, 19, 8, 4);
      // 腿
      ctx.fillStyle = '#8B6914';
      if (f === 0) {
        ctx.fillRect(12, 38, 8, 8);
        ctx.fillRect(28, 38, 8, 8);
      } else {
        ctx.fillRect(14, 38, 8, 8);
        ctx.fillRect(26, 38, 8, 8);
      }
    }
  },
  '鹿': {
    color: '#c8844a',
    draw(ctx, frame) {
      const f = frame % 2;
      ctx.fillStyle = '#c8844a';
      // 身體
      ctx.fillRect(14, 24, 20, 16);
      // 頸
      ctx.fillRect(18, 14, 12, 12);
      // 頭
      ctx.fillRect(14, 6, 20, 12);
      // 鹿角
      ctx.fillStyle = '#8B5a2a';
      ctx.fillRect(14, 2, 2, 8); ctx.fillRect(12, 2, 6, 2);
      ctx.fillRect(32, 2, 2, 8); ctx.fillRect(30, 2, 6, 2);
      // 眼睛
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(16, 10, 4, 4);
      ctx.fillRect(28, 10, 4, 4);
      // 腿
      ctx.fillStyle = '#c8844a';
      if (f === 0) {
        ctx.fillRect(14, 38, 4, 8); ctx.fillRect(20, 38, 4, 8);
        ctx.fillRect(26, 38, 4, 8); ctx.fillRect(32, 38, 4, 8);
      } else {
        ctx.fillRect(12, 38, 4, 8); ctx.fillRect(22, 38, 4, 8);
        ctx.fillRect(24, 38, 4, 8); ctx.fillRect(34, 38, 4, 8);
      }
    }
  },
  '兔': {
    color: '#e8e0d8',
    draw(ctx, frame) {
      const f = frame % 2;
      ctx.fillStyle = '#e8e0d8';
      // 身體
      ctx.fillRect(12, 24, 24, 18);
      // 頭
      ctx.fillRect(14, 10, 20, 16);
      // 長耳朵
      ctx.fillRect(16, 0, 6, 14);
      ctx.fillRect(26, 0, 6, 14);
      // 耳朵內
      ctx.fillStyle = '#f0b0b0';
      ctx.fillRect(17, 2, 4, 10);
      ctx.fillRect(27, 2, 4, 10);
      // 眼睛
      ctx.fillStyle = '#d04080';
      ctx.fillRect(17, 14, 4, 4);
      ctx.fillRect(27, 14, 4, 4);
      // 尾巴
      ctx.fillStyle = '#fff';
      ctx.fillRect(32, 28, 6, 6);
      // 腿
      ctx.fillStyle = '#e8e0d8';
      if (f === 0) {
        ctx.fillRect(12, 40, 10, 6); ctx.fillRect(26, 40, 10, 6);
      } else {
        ctx.fillRect(10, 40, 10, 6); ctx.fillRect(28, 40, 10, 6);
      }
    }
  },
  '鴿': {
    color: '#9090a8',
    draw(ctx, frame) {
      const f = frame % 2;
      ctx.fillStyle = '#9090a8';
      // 身體橢圓
      ctx.fillRect(10, 20, 28, 18);
      ctx.fillRect(12, 16, 24, 24);
      // 頭
      ctx.fillRect(16, 8, 16, 14);
      // 嘴
      ctx.fillStyle = '#e8a030';
      ctx.fillRect(12, 14, 8, 4);
      // 眼睛
      ctx.fillStyle = '#ff4040';
      ctx.fillRect(17, 10, 4, 4);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(18, 11, 2, 2);
      // 翅膀
      ctx.fillStyle = '#7070a0';
      if (f === 0) {
        ctx.fillRect(8, 20, 6, 14);
        ctx.fillRect(34, 20, 6, 14);
      } else {
        ctx.fillRect(6, 16, 6, 14);
        ctx.fillRect(36, 16, 6, 14);
      }
      // 腳
      ctx.fillStyle = '#e8a030';
      ctx.fillRect(18, 40, 4, 8); ctx.fillRect(26, 40, 4, 8);
    }
  }
};

let _tamaActive = false;
let _tamaFrame = 0;
let _tamaTimer = null;
let _tamaFeedTarget = null;
let _tamaPlayTarget = null;

function tamaAnimate() {
  const canvas = document.getElementById('tama-canvas');
  if (!canvas || !_tamaActive) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 48, 48);
  const petType = Object.keys(TAMA_PETS).find(k => MD['寵物'] && MD['寵物'].includes(k)) || '熊';
  const pet = TAMA_PETS[petType] || TAMA_PETS['熊'];
  pet.draw(ctx, _tamaFrame);
  _tamaFrame++;
}

function tamaMsg(msg, duration = 1800) {
  const el = document.getElementById('tama-msg');
  if (el) { el.textContent = msg; setTimeout(() => { if(el.textContent===msg) el.textContent=''; }, duration); }
}

function tamaHeart() {
  const screen = document.querySelector('.tama-screen');
  if (!screen) return;
  const h = document.createElement('div');
  h.className = 'tama-heart';
  h.textContent = '♥';
  screen.appendChild(h);
  setTimeout(() => h.remove(), 1000);
}

function tamaUpdateBars() {
  const love = Math.min(100, Math.max(0, (MD['寵愛'] || 0)));
  const food = Math.min(100, Math.max(0, ((MD['寵肚'] || 0) / 10) * 100));
  const lb = document.getElementById('tama-love-bar');
  const fb = document.getElementById('tama-food-bar');
  const ln = document.getElementById('tama-love-num');
  const fn = document.getElementById('tama-food-num');
  if (lb) lb.style.width = love + '%';
  if (fb) fb.style.width = food + '%';
  if (ln) ln.textContent = MD['寵愛'] || 0;
  if (fn) fn.textContent = MD['寵肚'] || 0;
  const nm = document.getElementById('tama-name-lbl');
  if (nm) nm.textContent = MD['寵物'] || '';
}

function tamaRunScene(sceneName, animFn, initMsg) {
  // 在電子雞框內執行場景，不跳出
  tamaMsg(initMsg);
  if (animFn) animFn();

  // 用 runScene 跑邏輯（含 =: 計算），但攔截最終跳轉
  const prevScene = _currentScene;
  const result = runScene(sceneName);

  // 更新狀態條
  tamaUpdateBars();

  // 從 result.html 提取純文字當訊息（去掉 HTML 標籤）
  const raw = (result.html || '').replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
  // 取前 24 個字
  const msg = raw.slice(0, 24) || initMsg;
  tamaMsg(msg, 3000);

  // 若場景最終跳回住處，留在電子雞框就好
  // 若場景跳到錯誤場景（材料不足等），顯示訊息後不跳出
  if (result.jump && result.jump !== '住處' && !TAMA_SCENES[result.jump]) {
    // 執行中途跳轉場景（如「飼料不足」）取文字
    const r2 = runScene(result.jump);
    const msg2 = (r2.html || '').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim().slice(0,24);
    tamaMsg(msg2 || '材料不足', 3000);
    tamaUpdateBars();
  }
}

function openTama(feedScene, playScene) {
  _tamaFeedTarget = feedScene;
  _tamaPlayTarget = playScene;
  _tamaActive = true;
  document.getElementById('tama-overlay').classList.add('active');
  tamaUpdateBars();
  tamaAnimate();
  if (_tamaTimer) clearInterval(_tamaTimer);
  _tamaTimer = setInterval(() => { tamaAnimate(); }, 600);

  const btnA = document.getElementById('tama-btn-a');
  const btnB = document.getElementById('tama-btn-b');
  const btnC = document.getElementById('tama-btn-c');

  btnA.onclick = () => {
    const canvas = document.getElementById('tama-canvas');
    if (canvas) { canvas.classList.add('tama-munching'); setTimeout(()=>canvas.classList.remove('tama-munching'),900); }
    tamaRunScene(feedScene, null, '餵食中……');
  };
  btnB.onclick = () => {
    tamaHeart(); setTimeout(tamaHeart, 300);
    tamaRunScene(playScene, null, '一起玩！');
  };
  btnC.onclick = () => { closeTama(); goto('住處'); };
}

function closeTama() {
  _tamaActive = false;
  if (_tamaTimer) { clearInterval(_tamaTimer); _tamaTimer = null; }
  document.getElementById('tama-overlay').classList.remove('active');
}

// 寵物場景對應表
const TAMA_SCENES = {
  '熊屋':  { feed: '餵熊',  play: '玩耍',  lbl: ['餵蜂蜜', '丟球', '離開'] },
  '鹿屋':  { feed: '餵鹿',  play: '撫摸',  lbl: ['餵食', '撫摸', '離開'] },
  '兔屋':  { feed: '餵兔',  play: '陪伴',  lbl: ['餵食', '陪伴', '離開'] },
  '鴿屋':  { feed: '餵鴿',  play: '逗鴿',  lbl: ['餵食', '互動', '離開'] },
};
</script>

  const PAL = [

<script>
// ══════ 像素場景插圖 ══════
const PIXEL_SCENES = {
  '河邊': drawRiver,
  '原野': drawGrassland,
  '草原': drawGrassland,
  '草原': drawGrassland,
  '海邊': drawBeach,
  '山區': drawMountain,
  '深山': drawMountain,
};
// 基地場景動態繪圖
const BASE_SCENES = ['早屋','午屋','傍屋','夜屋','屋內'];

function makeSceneCanvas(drawFn) {
  const c = document.createElement('canvas');
  c.width = 160; c.height = 80;
  c.style.cssText = 'display:block;margin:12px auto 16px;image-rendering:pixelated;width:min(320px,90%);height:auto;aspect-ratio:2/1;border:1px solid var(--border2);';
  const ctx = c.getContext('2d');
  drawFn(ctx, c.width, c.height);
  return c;
}

function fillRect(ctx, color, x, y, w, h) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}


function getTimeCtx() {
  const t = (typeof MD !== 'undefined' && MD.用時 !== undefined) ? +MD.用時 : 4;
  // 4=清晨 3=艷陽 2=黃昏 1=午夜
  return {
    4: { sky1:'#1a2c44', sky2:'#2a4060', horizon:'#e8b870', haze:'rgba(232,180,100,0.15)',
         sun:true, sunHigh:false, moon:false, stars:false, sunColor:'#f0d060' },
    3: { sky1:'#0a1828', sky2:'#1a3a60', horizon:'#6090c0', haze:'rgba(80,130,200,0.08)',
         sun:true, sunHigh:true,  moon:false, stars:false, sunColor:'#f8f0a0' },
    2: { sky1:'#180c14', sky2:'#2e1c28', horizon:'#c05830', haze:'rgba(180,70,30,0.20)',
         sun:true, sunHigh:false, moon:false, stars:false, sunColor:'#e06020', sunset:true },
    1: { sky1:'#04080e', sky2:'#0a1422', horizon:'#101c2e', haze:'rgba(10,20,50,0.12)',
         sun:false, moon:true,  stars:true },
  }[t] || { sky1:'#0a1422', sky2:'#1a2c44', horizon:'#3a5870', sun:false, moon:false, stars:false };
}

function drawTimeSky(ctx, W, H, groundY) {
  const tc = getTimeCtx();
  fillRect(ctx, tc.sky1, 0, 0, W, groundY * 0.6 | 0);
  fillRect(ctx, tc.sky2, 0, groundY * 0.4 | 0, W, groundY * 0.4 | 0);
  // 地平線光暈
  fillRect(ctx, tc.horizon, 0, groundY - 4, W, 3);
  ctx.fillStyle = tc.horizon + '50';
  ctx.fillRect(0, groundY - 8, W, 5);
  // 霧霾
  ctx.fillStyle = tc.haze;
  ctx.fillRect(0, groundY - 12, W, 10);
  // 天體
  if (tc.stars) {
    [[10,5],[30,9],[55,3],[80,7],[110,5],[140,9],[158,4]].forEach(([x,y]) => fillRect(ctx,'#c8d0d8',x,y,1,1));
  }
  if (tc.sun && tc.sunHigh) { // 艷陽
    fillRect(ctx, tc.sunColor, W-22, 5, 12, 12);
    fillRect(ctx, '#ffffff', W-21, 6, 10, 10);
    [[W-16,1,2,4],[W-16,19,2,4],[W-10,7,4,2],[W-28,7,4,2]].forEach(([x,y,w,h])=>fillRect(ctx,tc.sunColor,x,y,w,h));
  } else if (tc.sun && tc.sunset) { // 黃昏大夕陽
    fillRect(ctx, '#d05018', 8, groundY*0.55|0, 14, 14);
    fillRect(ctx, '#e87030', 10, groundY*0.56|0, 10, 10);
    fillRect(ctx, '#c04010', 0, groundY-4, W, 2);
  } else if (tc.sun) { // 清晨低太陽
    fillRect(ctx, tc.sunColor, W-26, groundY*0.5|0, 10, 10);
    fillRect(ctx, '#f8e880', W-25, groundY*0.5|0-1, 8, 8);
  }
  if (tc.moon) {
    fillRect(ctx, '#d8e0e8', W-22, 7, 10, 10);
    fillRect(ctx, tc.sky1, W-20, 7, 6, 6);
  }
}

function drawRiver(ctx, W, H) {
  const groundY = 46;
  drawTimeSky(ctx, W, H, groundY);
  // 遠山輪廓
  fillRect(ctx, '#162030', 0, 28, 40, groundY-28); fillRect(ctx, '#162030', 30, 24, 30, groundY-24);
  fillRect(ctx, '#162030', 55, 30, 30, groundY-30); fillRect(ctx, '#162030', 80, 26, 25, groundY-26);
  fillRect(ctx, '#162030', 100, 30, 60, groundY-30);
  // 草地
  fillRect(ctx, '#1a3020', 0, groundY-8, W, 6); fillRect(ctx, '#243828', 0, groundY-4, W, 4);
  // 河水
  fillRect(ctx, '#1a3050', 0, groundY, W, 20);
  fillRect(ctx, '#2a4870', 10, groundY+2, 30, 2); fillRect(ctx, '#2a4870', 60, groundY+6, 20, 2);
  fillRect(ctx, '#2a4870', 100, groundY+3, 40, 2);
  fillRect(ctx, '#3a5880', 20, groundY+9, 15, 1); fillRect(ctx, '#3a5880', 80, groundY+12, 25, 1);
  // 月/夕陽水面倒影
  const tc = getTimeCtx();
  if (tc.moon) { fillRect(ctx,'#c8a840',W-24,groundY+4,4,1); fillRect(ctx,'#c8a840',W-26,groundY+6,6,1); fillRect(ctx,'#c8a840',W-24,groundY+8,4,1); }
  if (tc.sunset) { fillRect(ctx,'#b04010',0,groundY,60,2); fillRect(ctx,'#903010',60,groundY,40,1); }
  // 近岸
  fillRect(ctx, '#1a3020', 0, groundY+20, W, H-groundY-20);
  [[5,groundY-8],[8,groundY-12],[12,groundY-6],[25,groundY-10],[90,groundY-7],[150,groundY-9]].forEach(([x,y]) => {
    fillRect(ctx,'#4a6030',x,y,1,groundY+20-y); fillRect(ctx,'#6a8040',x-1,y,1,3); fillRect(ctx,'#6a8040',x+1,y,1,3);
  });
  fillRect(ctx,'#3a3428',40,H-16,8,4); fillRect(ctx,'#4a4438',42,H-18,6,3);
}

function drawGrassland(ctx, W, H) {
  const groundY = 42;
  drawTimeSky(ctx, W, H, groundY);
  // 遠山
  fillRect(ctx,'#162028',0,30,50,groundY-30); fillRect(ctx,'#1a2430',40,26,40,groundY-26);
  fillRect(ctx,'#162028',75,32,35,groundY-32); fillRect(ctx,'#1a2430',105,28,30,groundY-28); fillRect(ctx,'#162028',130,34,30,groundY-34);
  // 草原
  fillRect(ctx,'#1a3020',0,groundY,W,6); fillRect(ctx,'#223828',0,groundY+6,W,8);
  fillRect(ctx,'#1e3424',0,groundY+14,W,8); fillRect(ctx,'#182e20',0,groundY+22,W,H-groundY-22);
  for (let x=0;x<W;x+=4) { fillRect(ctx,'#2a4a30',x,groundY-2,1,(x%8===0)?3:2); fillRect(ctx,'#243e28',x+2,groundY+5,1,2); }
  // 樹
  fillRect(ctx,'#1a2820',20,28,8,groundY-28); fillRect(ctx,'#243a28',18,22,12,10); fillRect(ctx,'#1e3424',20,18,8,6);
  fillRect(ctx,'#1a2820',120,30,6,groundY-30); fillRect(ctx,'#243a28',118,24,10,8); fillRect(ctx,'#1e3424',120,20,6,6);
  // 螢火蟲（夜晚才顯示）
  const tc = getTimeCtx();
  if (tc.moon) [[50,35],[70,28],[100,38],[130,30]].forEach(([x,y])=>fillRect(ctx,'#c8e870',x,y,1,1));
  // 黃昏橙光草地
  if (tc.sunset) fillRect(ctx,'rgba(180,80,20,0.15)',0,groundY,W,20);
}

function drawBeach(ctx, W, H) {
  const groundY = 34;
  drawTimeSky(ctx, W, H, groundY);
  // 海
  fillRect(ctx,'#1a3050',0,groundY,W,22); fillRect(ctx,'#142840',0,groundY+4,W,18);
  fillRect(ctx,'#2a4870',0,groundY,W,2);
  fillRect(ctx,'#3a5880',5,groundY-1,20,1); fillRect(ctx,'#3a5880',50,groundY,30,1); fillRect(ctx,'#3a5880',110,groundY-1,25,1);
  // 倒影
  const tc = getTimeCtx();
  if (tc.moon) for(let i=0;i<5;i++) fillRect(ctx,'#c8b870',W-26+i*2,groundY+2+i,8-i,1);
  if (tc.sunset) { for(let i=0;i<5;i++) fillRect(ctx,'#b04010',8+i*3,groundY+i,14-i,1); }
  if (tc.sunHigh) fillRect(ctx,'rgba(100,160,220,0.15)',0,groundY,W,10);
  // 沙灘
  fillRect(ctx,'#3a3020',0,groundY+22,W,H-groundY-22); fillRect(ctx,'#4a4030',0,groundY+24,W,4);
  for(let x=0;x<W;x+=12){fillRect(ctx,'#3e3428',x+2,groundY+26,6,1);fillRect(ctx,'#3e3428',x+4,groundY+31,4,1);}
  fillRect(ctx,'#2a4060',0,groundY+21,W,3); fillRect(ctx,'#1e3050',0,groundY+20,60,2);
  fillRect(ctx,'#d4c8b0',30,groundY+26,3,2); fillRect(ctx,'#c8b8a0',75,groundY+28,2,2); fillRect(ctx,'#d4c8b0',130,groundY+25,3,2);
  // 椰子樹
  fillRect(ctx,'#3a2818',10,groundY+4,3,H-groundY-4);
  fillRect(ctx,'#3a4828',2,groundY,12,2); fillRect(ctx,'#2e3c20',4,groundY-2,10,4);
  fillRect(ctx,'#3a4828',0,groundY+2,8,2); fillRect(ctx,'#3a4828',8,groundY-4,10,2);
  fillRect(ctx,'#5a3820',9,groundY+2,3,3);
}

function drawMountain(ctx, W, H) {
  const groundY = 36;
  drawTimeSky(ctx, W, H, groundY);
  // 遠山
  [[0,45,50],[30,35,40],[65,40,45],[100,32,50],[130,42,30]].forEach(([x,top,w]) => {
    fillRect(ctx,'#1e2838',x,top,w,H-top); fillRect(ctx,'#283040',x+w/4|0,top-4,w/2|0,4);
  });
  // 主峰
  fillRect(ctx,'#141c28',40,20,80,H-20); fillRect(ctx,'#1a2430',50,15,60,10);
  fillRect(ctx,'#141c28',60,10,40,8); fillRect(ctx,'#1a2430',72,6,16,6); fillRect(ctx,'#141c28',78,3,4,4);
  // 積雪
  fillRect(ctx,'#c8d4e0',78,3,4,2); fillRect(ctx,'#b8c8d8',76,5,6,2); fillRect(ctx,'#a8b8c8',74,7,8,2);
  // 岩石紋
  fillRect(ctx,'#1e2c3c',55,25,20,2); fillRect(ctx,'#1e2c3c',85,30,15,2); fillRect(ctx,'#1e2c3c',65,38,25,2);
  // 山腳
  fillRect(ctx,'#0e1c14',0,60,W,H-60);
  for(let x=0;x<W;x+=8){ const h=8+(x%16===0?4:0); fillRect(ctx,'#142018',x,60-h,6,h); fillRect(ctx,'#0e1a12',x+1,58-h,4,4); }
  // 晨霧/夕霞
  const tc = getTimeCtx();
  if (tc.moon) fillRect(ctx,'rgba(30,40,60,0.45)',0,55,W,8);
  else if (tc.sunset) fillRect(ctx,'rgba(160,60,20,0.25)',0,55,W,8);
  else fillRect(ctx,'rgba(30,40,60,0.25)',0,55,W,8);
}


function drawBase(ctx, W, H) {
  const level = (typeof MD !== 'undefined' && MD.屋 !== undefined) ? Math.max(0, Math.min(4, MD.屋)) : 0;
  const time  = (typeof MD !== 'undefined' && MD.用時 !== undefined) ? +MD.用時 : 4;
  // 先畫天空底色（依時段）
  // 用時: 4=早晨 3=艷陽 2=夕陽 1=午夜
  const SKY = {
    4: { top:'#1a2c4a', bot:'#3a5878', horizon:'#e8b870', fog:'rgba(232,184,112,0.18)' }, // 清晨
    3: { top:'#0a1828', bot:'#1a3a60', horizon:'#4a80c0', fog:'rgba(74,128,192,0.10)' }, // 深夜→艷陽（用時3=艷陽）
    2: { top:'#1a1828', bot:'#3a2840', horizon:'#c05830', fog:'rgba(192,88,48,0.22)'  }, // 黃昏
    1: { top:'#040810', bot:'#0c1828', horizon:'#1a2840', fog:'rgba(20,40,80,0.15)'  }, // 午夜
  };
  // 用時3 = 艷陽
  const skyDef = {
    4: { top:'#1a2c4a', bot:'#3a5878', horizon:'#e8c870', sun:'#f0e060', sunColor:true  },
    3: { top:'#0d2040', bot:'#1a4070', horizon:'#60a0d8', sun:'#f8f0a0', sunColor:true  },
    2: { top:'#1a0e18', bot:'#3a2030', horizon:'#d06030', sun:'#e88040', sunColor:true  },
    1: { top:'#04080e', bot:'#0a1422', horizon:'#101c30', sun:null,       sunColor:false },
  }[time] || { top:'#0a1422', bot:'#1a2c44', horizon:'#3a5870', sun:null, sunColor:false };

  // 天空
  fillRect(ctx, skyDef.top, 0, 0, W, H*0.45|0);
  fillRect(ctx, skyDef.bot, 0, H*0.3|0, W, H*0.2|0);

  // 地平線漸層（簡單兩格）
  fillRect(ctx, skyDef.horizon, 0, H*0.44|0, W, 3);
  ctx.fillStyle = skyDef.horizon + '60';
  ctx.fillRect(0, H*0.42, W, 4);

  // 太陽或月亮
  if (time === 4) { // 清晨：低太陽
    fillRect(ctx, '#f0d060', W-24, H*0.35|0, 10, 10);
    fillRect(ctx, '#f8e880', W-23, H*0.35|0-1, 8, 8);
  } else if (time === 3) { // 艷陽：高太陽
    fillRect(ctx, '#f8f0a0', W-20, 6, 12, 12);
    fillRect(ctx, '#ffffff', W-19, 7, 10, 10);
    // 光芒
    [[W-14,2,2,4],[W-14,20,2,4],[W-8,8,4,2],[W-26,8,4,2]].forEach(([x,y,w,h])=>fillRect(ctx,'#f8f0a0',x,y,w,h));
  } else if (time === 2) { // 黃昏：大夕陽
    fillRect(ctx, '#e06020', 8, H*0.38|0, 14, 14);
    fillRect(ctx, '#f08040', 10, H*0.38|0+1, 10, 10);
    // 夕陽倒影在地面
    fillRect(ctx, '#c05020', 0, H*0.45|0, W, 2);
  } else { // 午夜：月亮
    fillRect(ctx, '#d8e0e8', W-22, 8, 10, 10);
    fillRect(ctx, skyDef.top, W-20, 8, 6, 6); // 月牙缺口
    // 星星
    [[10,6],[35,10],[60,4],[95,8],[130,5],[155,9]].forEach(([x,y])=>fillRect(ctx,'#c8d0d8',x,y,1,1));
  }

  // 霧/大氣
  ctx.fillStyle = (time===4?'rgba(232,200,120,0.12)':time===2?'rgba(180,80,30,0.10)':time===1?'rgba(10,20,50,0.15)':'rgba(60,100,160,0.08)');
  ctx.fillRect(0, H*0.38, W, H*0.1);

  BASE_DRAW[level](ctx, W, H);
}

function drawGround(ctx, W, H) {
  fillRect(ctx, '#1a1408', 0, H-14, W, 14);
  for (let x = 0; x < W; x += 6) fillRect(ctx, '#2a2010', x, H-16, 3, 3);
}

// 0: 破舊木棚
function drawHut(ctx, W, H) {
  drawGround(ctx,W,H);
  const cx=W/2|0, base=H-14;
  // 歪斜屋頂
  ctx.fillStyle='#4a3018';
  ctx.beginPath(); ctx.moveTo(cx-22,base-28); ctx.lineTo(cx+22,base-28); ctx.lineTo(cx+28,base-14); ctx.lineTo(cx-28,base-14); ctx.fill();
  ctx.fillStyle='#3a2010';
  ctx.beginPath(); ctx.moveTo(cx-10,base-40); ctx.lineTo(cx+8,base-40); ctx.lineTo(cx+22,base-28); ctx.lineTo(cx-22,base-28); ctx.fill();
  // 木牆（稀疏）
  fillRect(ctx,'#5a3a18',cx-28,base-28,56,14);
  for(let i=0;i<5;i++) fillRect(ctx,'#3a2010',cx-28+i*12,base-28,2,14);
  // 破洞
  fillRect(ctx,'#0e1520',cx+10,base-24,6,4);
  // 門（粗糙）
  fillRect(ctx,'#2a1808',cx-6,base-20,12,20);
  fillRect(ctx,'#3a2010',cx-5,base-19,4,8);
}

// 1: 樸實木屋
function drawWoodHouse(ctx, W, H) {

  drawGround(ctx,W,H);
  const cx=W/2|0, base=H-14;
  // 屋頂
  ctx.fillStyle='#5a3820'; ctx.beginPath();
  ctx.moveTo(cx,base-50); ctx.lineTo(cx+35,base-26); ctx.lineTo(cx-35,base-26); ctx.fill();
  fillRect(ctx,'#4a2c18',cx-35,base-26,70,2);
  // 木牆
  fillRect(ctx,'#6a4828',cx-30,base-26,60,26);
  for(let i=0;i<6;i++) fillRect(ctx,'#4a3018',cx-30,base-26+i*4,60,1);
  // 窗
  fillRect(ctx,'#1a3050',cx-22,base-22,10,8); fillRect(ctx,'#2a4870',cx-21,base-21,8,6);
  fillRect(ctx,'#1a3050',cx+12,base-22,10,8); fillRect(ctx,'#2a4870',cx+13,base-21,8,6);
  // 門
  fillRect(ctx,'#3a2010',cx-7,base-20,14,20); fillRect(ctx,'#e8c86a',cx+3,base-12,2,2);
  // 煙囪
  fillRect(ctx,'#5a3820',cx+18,base-52,6,26); fillRect(ctx,'#808080',cx+17,base-56,8,4);
}

// 2: 堅固磚屋
function drawBrickHouse(ctx, W, H) {

  drawGround(ctx,W,H);
  const cx=W/2|0, base=H-14;
  // 瓦片屋頂
  fillRect(ctx,'#6a2818',cx-38,base-30,76,16);
  for(let x=cx-38;x<cx+38;x+=8) { fillRect(ctx,'#5a2010',x,base-30,7,8); fillRect(ctx,'#5a2010',x+4,base-22,7,8); }
  ctx.fillStyle='#7a3020'; ctx.beginPath();
  ctx.moveTo(cx,base-50); ctx.lineTo(cx+38,base-30); ctx.lineTo(cx-38,base-30); ctx.fill();
  // 磚牆
  fillRect(ctx,'#8a5040',cx-34,base-30,68,30);
  for(let row=0;row<4;row++) for(let col=0;col<5;col++) {
    const ox = (row%2)*8;
    fillRect(ctx,'#6a3828',cx-34+col*14+ox,base-30+row*7,13,6);
  }
  // 窗（帶窗台）
  fillRect(ctx,'#1a3050',cx-24,base-24,12,10); fillRect(ctx,'#2a4870',cx-23,base-23,10,8);
  fillRect(ctx,'#8a5040',cx-26,base-15,16,2);
  fillRect(ctx,'#1a3050',cx+12,base-24,12,10); fillRect(ctx,'#2a4870',cx+13,base-23,10,8);
  fillRect(ctx,'#8a5040',cx+10,base-15,16,2);
  // 門（拱形）
  fillRect(ctx,'#3a2010',cx-8,base-22,16,22);
  ctx.fillStyle='#3a2010'; ctx.beginPath(); ctx.arc(cx,base-22,8,Math.PI,0); ctx.fill();
  fillRect(ctx,'#e8c86a',cx+2,base-14,3,3);
}

// 3: 溫馨小屋
function drawCozyHouse(ctx, W, H) {

  drawGround(ctx,W,H);
  const cx=W/2|0, base=H-14;
  // 主屋
  fillRect(ctx,'#8a5040',cx-36,base-34,72,34);
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) fillRect(ctx,'#6a3828',cx-36+c*15+(r%2)*7,base-34+r*7,14,6);
  // 斜屋頂（雙坡）
  ctx.fillStyle='#7a3020'; ctx.beginPath();
  ctx.moveTo(cx,base-58); ctx.lineTo(cx+40,base-34); ctx.lineTo(cx-40,base-34); ctx.fill();
  fillRect(ctx,'#5a2010',cx-40,base-34,80,3);
  // 煙囪+煙
  fillRect(ctx,'#6a3820',cx-24,base-62,7,28); fillRect(ctx,'#505050',cx-25,base-66,9,4);
  fillRect(ctx,'rgba(80,80,80,0.5)',cx-24,base-74,7,8);
  // 發光窗
  fillRect(ctx,'#e8c050',cx-26,base-26,14,12); fillRect(ctx,'#f0d060',cx-25,base-25,12,10);
  fillRect(ctx,'#c8a030',cx-24,base-20,5,4); fillRect(ctx,'#c8a030',cx-19,base-20,5,4);
  fillRect(ctx,'#e8c050',cx+12,base-26,14,12); fillRect(ctx,'#f0d060',cx+13,base-25,12,10);
  // 門
  fillRect(ctx,'#4a2c10',cx-8,base-24,16,24); ctx.fillStyle='#4a2c10'; ctx.beginPath(); ctx.arc(cx,base-24,8,Math.PI,0); ctx.fill();
  fillRect(ctx,'#e8c86a',cx+2,base-16,3,3);
  // 花圃
  [[cx-32,base-2,'#d04060'],[cx-28,base-4,'#e8c050'],[cx+26,base-2,'#c04080'],[cx+30,base-4,'#e8a030']].forEach(([x,y,c])=>{ fillRect(ctx,'#2a4020',x,y,4,4); fillRect(ctx,c,x,y-2,4,3); });
}

// 4: 奢華豪墅
function drawMansion(ctx, W, H) {

  // 湖泊倒影（背景）
  fillRect(ctx,'#101c30',0,H-26,W,12);
  for(let x=0;x<W;x+=10) fillRect(ctx,'#182840',x,H-22,6,2);
  drawGround(ctx,W,H);
  const cx=W/2|0, base=H-20;
  // 主樓
  fillRect(ctx,'#9a6050',cx-40,base-50,80,50);
  for(let r=0;r<7;r++) for(let c=0;c<5;c++) fillRect(ctx,'#7a4030',cx-40+c*16+(r%2)*8,base-50+r*7,15,6);
  // 側翼
  fillRect(ctx,'#8a5040',cx-60,base-36,22,36); fillRect(ctx,'#8a5040',cx+38,base-36,22,36);
  // 主屋頂
  ctx.fillStyle='#5a2818'; ctx.beginPath();
  ctx.moveTo(cx,base-72); ctx.lineTo(cx+44,base-50); ctx.lineTo(cx-44,base-50); ctx.fill();
  // 側翼屋頂
  ctx.fillStyle='#4a2010'; ctx.beginPath();
  ctx.moveTo(cx-49,base-48); ctx.lineTo(cx-38,base-36); ctx.lineTo(cx-60,base-36); ctx.fill();
  ctx.fillStyle='#4a2010'; ctx.beginPath();
  ctx.moveTo(cx+49,base-48); ctx.lineTo(cx+60,base-36); ctx.lineTo(cx+38,base-36); ctx.fill();
  // 多扇窗（發光）
  [[cx-28,base-44],[cx-10,base-44],[cx+8,base-44],[cx+26,base-44],
   [cx-20,base-28],[cx+18,base-28]].forEach(([x,y])=>{ fillRect(ctx,'#e8d060',x,y,10,8); fillRect(ctx,'#f0e080',x+1,y+1,8,6); });
  // 柱廊
  for(let i=0;i<5;i++) { fillRect(ctx,'#c0a878',cx-24+i*12,base-22,4,22); }
  // 大門
  fillRect(ctx,'#3a1c08',cx-10,base-26,20,26); ctx.fillStyle='#3a1c08'; ctx.beginPath(); ctx.arc(cx,base-26,10,Math.PI,0); ctx.fill();
  fillRect(ctx,'#e8c050',cx-2,base-16,4,4);
  // 門前小池
  fillRect(ctx,'#1a3050',cx-16,base,32,6); fillRect(ctx,'#2a4870',cx-14,base+1,28,3);
}

// 住處場景顯示基地 icon
if (!PIXEL_SCENES['住處']) {
  PIXEL_SCENES['住處'] = drawBase;
  PIXEL_SCENES['早屋'] = drawBase;
  PIXEL_SCENES['午屋'] = drawBase;
  PIXEL_SCENES['傍屋'] = drawBase;
  PIXEL_SCENES['夜屋'] = drawBase;
}

<script>
// ══════ 結局畫面 ══════
const ENDING_DATA = {
  '結局1': { num:'結局一', title:'我的鳥兒，餘生請多指教', sub:'憑藉一隻信鴿，終於等到了救援的到來。', img:'https://i.imgur.com/KjLRGB5.jpg', color:'#8fad5a' },
  '結局2': { num:'結局二', title:'從一而終的冒險家', sub:'在汪洋中漂流，以木筏換得了歸途。', img:'https://i.imgur.com/o7v3GUO.jpg', color:'#4a90c0' },
  '結局3': { num:'結局三', title:'未知的紀錄簿', sub:'透過礦業通訊台，將聲音傳往了世界的角落。', img:'https://i.imgur.com/1ZLy0lD.jpg', color:'#c0a030' },
  '結局4': { num:'結局四', title:'無法逃脫', sub:'在最後的關頭，力竭倒下。', img:'https://i.imgur.com/If6N3Eq.jpg', color:'#904040' },
  '結局5': { num:'結局五', title:'泰坦礦業，至誠用心', sub:'蜷縮在黑暗中等待，卻換來了意想不到的救援。', img:'https://i.imgur.com/Y7S5zQo.jpg', color:'#7060a0' },
  '結局6': { num:'結局六', title:'日常生活', sub:'選擇了留下，荒野成了新的日常。', img:'https://i.imgur.com/mQJJS5S.jpg', color:'#a07050' },
  '結局7': { num:'真實結局', title:'荒島生存、成功！', sub:'帶著新的夥伴，終於離開了這座島。', img:'https://i.imgur.com/4podZCD.png', color:'#d4853a' },
};

// 偵測結局場景
const ENDING_SCENE_MAP = {
  '結局1': '結局1', '結局2': '結局2', '結局3': '結局3',
};

// 繪製結局背景星空
function drawEndingBg(canvas, color) {
  canvas.width = canvas.offsetWidth || 400;
  canvas.height = canvas.offsetHeight || 700;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#04080e';
  ctx.fillRect(0, 0, W, H);
  // 星星
  for (let i = 0; i < 120; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const r = Math.random() * 1.2;
    const a = Math.random() * 0.8 + 0.2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,210,190,${a})`;
    ctx.fill();
  }
  // 光暈
  const grad = ctx.createRadialGradient(W/2, H*0.4, 0, W/2, H*0.4, W*0.6);
  grad.addColorStop(0, color + '22');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function showEnding(key) {
  const data = ENDING_DATA[key];
  if (!data) return;
  const overlay = document.getElementById('ending-overlay');
  overlay.style.display = 'flex';

  // 背景
  const canvas = document.getElementById('ending-canvas');
  requestAnimationFrame(() => drawEndingBg(canvas, data.color));

  // 填入內容
  document.getElementById('ending-num').textContent = data.num;
  document.getElementById('ending-title').textContent = data.title;
  document.getElementById('ending-sub').textContent = data.sub;
  document.getElementById('ending-img').src = data.img;

  // 主色調
  document.getElementById('ending-title').style.textShadow = `0 0 30px ${data.color}cc`;
  document.getElementById('ending-restart').style.borderColor = data.color + '80';

  // 逐步顯示
  requestAnimationFrame(() => {
    ['ending-num','ending-title','ending-img-wrap','ending-sub','ending-restart'].forEach((id,i) => {
      setTimeout(() => { document.getElementById(id).style.opacity = '1'; }, i * 200);
    });
  });
}

function closeEnding() {
  const overlay = document.getElementById('ending-overlay');
  overlay.style.opacity = '0';
  overlay.style.transition = 'opacity 1s';
  setTimeout(() => {
    overlay.style.display = 'none';
    overlay.style.opacity = '1';
    overlay.style.transition = '';
    // 重置所有元素
    ['ending-num','ending-title','ending-img-wrap','ending-sub','ending-restart'].forEach(id => {
      document.getElementById(id).style.opacity = '0';
    });
    goto('重新開始');
  }, 1000);
}

// 攔截 荒野．旅《完》 場景，顯示結局畫面
const _origRunScene = runScene;
</script>
