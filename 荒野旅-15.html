if(MD.草<2)game_jumpto(\"飼料不足\")\n(j)MD.名字(/j)將曬過的乾草放進餵食盆。\n=:if(MD.寵愛<50)game_jumpto(\"兔普通吃\")\n(j)MD.寵物(/j)一蹦一蹦地跳了過來，小兔球窩在飼料盆中，大口開吃。\n(j)MD.名字(/j)用手指揉捏著(j)MD.寵物(/j)的尾巴毛，享受難得的悠閒。\n體力減少5點，失去2株纖維。\n(j)MD.寵物(/j)的飽食度增加2點。\n=:MD.草-=2,MD.體-=5,MD.用時-=1,MD.寵肚+=2\n=:if(MD.寵肚>=10)MD.寵肚=10\n跳：住處", "兔普通吃": "(j)MD.寵物(/j)鼻子嗅了嗅，吃起盆裡的食物。\n(j)MD.名字(/j)一想要摸他，(j)MD.寵物(/j)就挪動屁股。\n看起來不怎麼想被打擾用餐。\n體力減少5點，失去2株纖維。\n(j)MD.寵物(/j)的飽食度增加2點。\n=:MD.草-=2,MD.體-=5,MD.用時-=1,MD.寵肚+=2\n=:if(MD.寵肚>=10)MD.寵肚=10\n跳：住處", "陪伴": "(j)MD.名字(/j)偷閒進了木籠，想陪陪可愛的(j)MD.寵物(/j)。\n=:if(MD.寵愛<60)game_jumpto(\"兔警戒你\")\n=:if(MD.寵愛<90)game_jumpto(\"兔好奇你\")\n(j)MD.寵物(/j)看起來心情不錯，遠遠的看見了(j)MD.名字(/j)的身影，便開始大跳兔子舞。\n(j)MD.名字(/j)享受著隆重的歡迎，小兔球在身邊蹦蹦跳的樣子，極大的安慰了孤單的自己。\n體力減少5點。\n(j)MD.寵物(/j)很愛(j)MD.名字(/j)。\n=:MD.體-=5,MD.用時-=1,MD.寵愛+=10,MD.心=5\n跳：住處", "兔好奇你": "(j)MD.寵物(/j)往(j)MD.名字(/j)靠近，甚至大膽的爬上了(j)MD.名字(/j)的腳踝。\n(j)MD.名字(/j)任由對方把自己當成兔窩，雖然沒一會兒就被尿了一腳。\n(j)MD.名字(/j)依然很高興。\n體力減少5點。\n(j)MD.寵物(/j)對主人的好感度似乎上升了。\n=:MD.體-=5,MD.用時-=1,MD.寵愛+=10\n跳：住處", "兔警戒你": "(j)MD.寵物(/j)在木籠裡睡著覺，聽見(j)MD.名字(/j)靠近，連眼皮都沒動一下。\n(j)MD.名字(/j)摸了兔球半天，(j)MD.名字(/j)就像把主人當空氣，盡職的當自己的鹹魚。\n體力減少5點。\n(j)MD.寵物(/j)對主人的好感若有似無的上升了。\n=:MD.體-=5,MD.用時-=1,MD.寵愛+=10\n跳：住處", "其他": "(b)1(/b)(b)2(/b)(b)3(/b)\n选：殺害(j)MD.寵物(/j)\n选：檢查(j)MD.寵物(/j)\n选：放生(j)MD.寵物(/j)", "殺害(j)MD.寵物(/j)": "=:if(MD.寵肚<5||MD.寵愛<50)game_jumpto(\"不能獵殺\")\n萬物皆有靈，但在荒野這種貧瘠困苦的環境下，人終究要做出取捨。\n(j)MD.寵物(/j)看著你，明亮的大眼睛仍未查覺到危險。\n(j)MD.名字(/j)把心一橫，高舉手中的木棒，朝(j)MD.寵物(/j)的腦袋狠狠砸下──\n=:if(MD.寵愛>=90)game_jumpto(\"悲痛寵死\")\n=:if(MD.寵愛>=60)game_jumpto(\"心疼寵死\")\n=:if(MD.寵愛>=30)game_jumpto(\"寵物死亡\")", "寵物死亡": "碰的一聲，(j)MD.寵物(/j)的生命結束了。\n=:MD.心=-4\n跳：獵殺產物", "心疼寵死": "(j)MD.名字(/j)幾乎不敢去看眼前的畫面，只知道一條生命就這樣消逝了。\n=:MD.心=-5\n跳：獵殺產物", "悲痛寵死": "還沒看到結果，(j)MD.名字(/j)覺得自己的心似乎被撕裂開來，他扔開手中的凶器，伏倒在地。\n=:MD.心=-8\n跳：獵殺產物", "不能獵殺": "(j)MD.寵物(/j)的狀態還不夠好，現在殺掉他會血本無歸。\n再努力一點吧，也給彼此一個轉機。\n=:MD.心-=2\n跳：住處", "獵殺產物": "=:if(MD.熊==1)game_jumpto(\"殺熊產物\")\n=:if(MD.鹿==1)game_jumpto(\"殺鹿產物\")\n=:if(MD.兔==1)game_jumpto(\"殺兔產物\")", "殺熊產物": "殺掉(j)MD.寵物(/j)後，獲得了5條皮草，2塊生肉，2塊油脂。\n體力減少五點。\n=:MD.體-=5,MD.用時-=1,MD.熊=0,MD.皮草+=5,MD.肉+=2,MD.油+=2\n跳：住處", "殺鹿產物": "殺掉(j)MD.寵物(/j)後，獲得了3條皮草，2塊生肉，1塊油脂。\n體力減少五點。\n=:MD.體-=5,MD.用時-=1,MD.鹿=0,MD.皮草+=3,MD.肉+=2,MD.油+=1\n跳：住處", "殺兔產物": "殺掉(j)MD.寵物(/j)後，獲得了1條皮草，1塊生肉，1塊油脂。\n體力減少五點。\n=:MD.體-=5,MD.用時-=1,MD.兔=0,MD.皮草+=1,MD.肉+=1,MD.油+=1\n跳：住處", "放生(j)MD.寵物(/j)": "=:if(MD.熊==1)game_jumpto(\"放生熊\")", "順利放生": "待在自己身邊，(j)MD.寵物(/j)不能得到最好的照顧，不如將它放歸山林。\n(j)MD.名字(/j)打開了籠屋的門，將(j)MD.寵物(/j)帶了出來，回到當初帶走他的地方。\n=:if(MD.寵愛<=50)game_jumpto(\"無留戀放生\")\n=:if(MD.寵愛<=70)game_jumpto(\"留戀放生\")\n(j)MD.寵物(/j)重獲自由，似乎知道了現在的狀況，他發出了低鳴，輕拱著(j)MD.名字(/j)。\n再不捨也要放手，(j)MD.名字(/j)將(j)MD.寵物(/j)抱在懷裡，忘了人與動物的隔閡，把所有的愛都投注給像自己孩子般的(j)MD.寵物(/j)。\n難過的道別後，(j)MD.名字(/j)轉身就走，卻發現身後的(j)MD.寵物(/j)亦步亦趨的跟著。\n不能留情，否則(j)MD.寵物(/j)再也不能回歸原屬於他的地方。\n(j)MD.名字(/j)狠下心的回頭驅趕，(j)MD.寵物(/j)不能理解(j)MD.名字(/j)的心情，卻讀懂了驅逐的意思。\n(j)MD.寵物(/j)腦袋低垂，停在原地。\n「……再見了啊。」\n體力減少五點。\n與(j)MD.寵物(/j)永別了。\n=:MD.體-=5,MD.用時-=1,MD.心-=5\n=:MD.熊=0,MD.鹿=0,MD.兔=0\n跳：住處", "留戀放生": "(j)MD.寵物(/j)重獲自由，眨著雙眼，注視著(j)MD.名字(/j)，似乎很是疑惑。\n(j)MD.名字(/j)拍了拍寵物的屁股，最後一次撫摸他的腦袋。\n「快走吧。」\n(j)MD.名字(/j)怕自己後悔，趁(j)MD.寵物(/j)還未反應過來時轉身離開了。\n體力減少五點。\n=:MD.體-=5,MD.用時-=1,MD.心-=3\n=:MD.熊=0,MD.鹿=0,MD.兔=0\n跳：住處", "無留戀放生": "(j)MD.寵物(/j)重獲自由，並未再看主人一眼，頭也不回的跳著走了。\n說實在的，心裡有點酸澀。\n體力減少五點。\n=:MD.體-=5,MD.用時-=1,MD.心-=2\n=:MD.熊=0,MD.鹿=0,MD.兔=0\n跳：住處", "放生熊": "=:if(MD.寵愛<70)game_jumpto(\"不能放熊\")\n跳：順利放生", "不能放熊": "(j)MD.寵物(/j)仍保有強烈的攻擊性，在這種狀態下放生不是明智之舉。\n跳：住處", "檢查(j)MD.寵物(/j)": "(j)MD.寵物(/j)現在的肚子是(j)MD.寵肚(/j)分飽。\n(j)MD.寵物(/j)對主人的好感是(j)MD.寵愛(/j)分。\n=:if(MD.寵愛>80)game_jumpto(\"寵物優\")\n=:if(MD.寵愛<30)game_jumpto(\"寵物不優\")\n(j)MD.寵物(/j)看起來狀態還不錯，仍需更妥善的照顧。\n跳：籠屋", "寵物優": "(j)MD.寵物(/j)的狀態非常好，皮毛亮澤，且非常依賴你。\n跳：籠屋", "寵物不優": "(j)MD.寵物(/j)的狀態非常糟糕，簡直是被虐待了，皮毛黯淡無光，更敵視著你。\n跳：籠屋", "寵餓死": "=:if(MD.鴿==1)game_jumpto(\"咕咕死\")\n……往籠子一看，(j)MD.寵物(/j)已經餓死了。\n=:MD.熊=0,MD.鹿=0,MD.兔=0,MD.心-=5\n跳：住處", "咕咕死": "……往籠子一看，(j)MD.寵物(/j)已經餓死了。\n=:MD.鴿=2\n跳：住處", "飼料不足": "沒有足夠的食物給(j)MD.寵物(/j)吃，還是出外探險吧。\n跳：住處", "魚池": "=:if(MD.優養>15)game_jumpto('優養魚池')\n(j)MD.名字(/j)來到別墅外，看著澄清的魚池。\n(m)https://i.imgur.com/2CZY9on.jpg(/m)\n(b)1(/b)(b)2(/b)(b)3(/b)\n选:水池撈魚\n选:淘找大蚌\n选:返回住處", "水池釣魚": "=:if(MD.網<1)game_jumpto('釣網無')", "釣網有": "=:MD.用時-=1\n(j)MD.名字(/j)舉起蟲網，豪氣地捲起褲管邁入水中。\n<marqueedirection=\"center\"scrollamount=\"7\">魚兒魚兒，你在哪裡。</marquee>\n等:2|撈魚中。\n=:MD.ran=random_int(1,3)\n=:if(MD.ran==2)game_jumpto('撈魚失敗')\n嘿嘿，寶刀未老！\n一陣眼疾手快的操作，(j)MD.名字(/j)的網子裡已經盛滿魚兒，真是太棒了。\n=:MD.ran=random_int(2,3)\n=:MD.魚+=MD.ran,MD.心+=3,MD.體-=5,MD.優養+=3\n獲得鮮魚(j)MD.ran(/j)條。\n體力減少5點。\n跳：住處", "釣網無": "=:MD.心-=1,MD.體-=5\n(j)MD.名字(/j)沒有撈網，只能乾巴巴的在岸上看著魚兒悠遊，熱得滿頭大汗。\n體力減少5點。\n跳：住處", "撈魚失敗": "=:MD.心-=1,MD.體-=5\n哎呀，動作太大了，魚被(j)MD.名字(/j)嚇得四處亂竄，池裡攪成一團濁水，什麼也看不清。\n體力減少5點。\n跳：住處", "淘找大蚌": "=:MD.用時-=1\n(j)MD.名字(/j)捲起褲管邁入水中，彎腰摸索起池中物。\n=:MD.ran=random_int(1,10)\n<marqueedirection=\"center\"scrollamount=\"7\">尋寶中。</marquee>\n等:2|真令人期待。\n=:if(MD.ran==4)game_jumpto('撈到池蚌')\n=:if(MD.ran==7)game_jumpto('撈到池蚌')\n=:if(MD.ran==9)game_jumpto('撈到池蚌')\n=:MD.心-=2,MD.體-=5\n好像摸到了什麼……\n啊，居然是池底的垃圾！怎麼會有這種東西！\n體力減少5點。\n跳：住處", "撈到池蚌": "好像摸到了什麼……\n手中傳來堅硬的觸感，(j)MD.名字(/j)從水中舉起戰利品。\n(m)https://i.imgur.com/KugP37Z.png(/m)\n=:MD.ran=random_int(1,3)\n=:MD.心+=2,MD.體-=5,MD.優養+=2,MD.貝+=MD.ran\n是(j)MD.ran(/j)個超大的河蚌，裡面肯定會有珍珠吧？\n體力減少5點。\n跳：住處", "優養魚池": "(j)MD.名字(/j)來到別墅外，卻發現魚池變得十分汙濁。\n許是池裡藻類太過氾濫？得放幾條生魚進池內做生態養護了。\n(b)1(/b)(b)2(/b)\n选:放入生魚\n选:返回住處", "放入生魚": "=:MD.用時-=1\n=:if(MD.魚<10)game_jumpto('生魚不足')\n=:MD.體-=5,MD.魚-=10,MD.優養=0\n(j)MD.名字(/j)將10尾生魚放入魚池，接著等魚池慢慢變乾淨就行了。\n體力減少5點。\n跳：住處", "生魚不足": "要有效改善水質問題，看來必須準備10尾以上的生魚才夠。\n(j)MD.名字(/j)沒有那麼多的魚。\n跳：住處", "農田": "蓋於屋外，一塊被籬笆保護著的農田。\n(m)https://i.imgur.com/6gwJVR8.jpg(/m)\n(b)1(/b)(b)2(/b)(b)3(/b)(b)4(/b)(b)5(/b)\n选:種植作物\n<:if(MD.種蕨===1){curBtn=null};if(MD.種蕨===2){curBtn=null};if(MD.種菇===1){curBtn=null};if(MD.種菇===2){curBtn=null};if(MD.種果===1){curBtn=null};if(MD.種果===2){curBtn=null};if(MD.種麥===1){curBtn=null};if(MD.種麥===2){curBtn=null}\n选:培育野蕨\n<:if(MD.種蕨===0){curBtn=null}\n选:培育野菇\n<:if(MD.種菇===0){curBtn=null}\n选:培育野果\n<:if(MD.種果===0){curBtn=null}\n选:培育小麥\n<:if(MD.種麥===0){curBtn=null}", "種植作物": "只要把種子種下，仔細照料並耐心等待，就能收穫豐碩的結實。\n(b)1(/b)(b)2(/b)(b)3(/b)(b)4(/b)\n(b)5(/b)(b)6(/b)\n选:種植野蕨\n<:if(MD.蕨===0){curBtn=null}\n选:種植野菇\n<:if(MD.菇===0){curBtn=null}\n选:種植野果\n<:if(MD.果===0){curBtn=null}\n选:種植小麥\n<:if(MD.麥===0){curBtn=null}\n选:沒有種子\n<:if(MD.蕨>=1){curBtn=null};if(MD.菇>=1){curBtn=null};if(MD.果>=1){curBtn=null};if(MD.麥>=1){curBtn=null}\n选:返回住處", "種植野蕨": "=:MD.體-=10,MD.蕨-=1,MD.種蕨=1,MD.探望作物=1\n(j)MD.名字(/j)將一株採到的野生蕨類移植到農場裡。\n種植中……\n大功告成，接下來只要別忘了照料就行了。\n花費10點體力。\n跳：住處", "培育野蕨": "=:if(MD.探望作物===1)game_jumpto(\"作物操心警告\")\n=:if(MD.種蕨===1)game_jumpto(\"蕨類澆水\")\n=:MD.ran=random_int(1,2)\n=:if(MD.ran==2)game_jumpto('收穫野蕨')\n=:MD.體-=10,MD.探望作物=1\n野蕨和昨天的樣子並沒有什麼不同。\n把淨水澆下了，還得耐心等候。\n花費10點體力。\n跳：住處", "蕨類澆水": "=:MD.體-=10,MD.種蕨=2,MD.探望作物=1\n野蕨發了新芽，(j)MD.名字(/j)取來淨水為它澆灌。\n要乖乖長大哦。\n花費10點體力。\n跳：住處", "收穫野蕨": "=:MD.體-=10,MD.種蕨=0,MD.探望作物=0\n野蕨長成了！\n(j)MD.名字(/j)興奮地在農田裡忙進忙出。\n=:MD.ran=random_int(3,6)\n採收了(j)MD.ran(/j)株野蕨。\n=:MD.蕨+=MD.ran\n花費10點體力。\n跳：住處", "種植野菇": "=:MD.體-=10,MD.菇-=1,MD.種菇=1,MD.探望作物=1\n(j)MD.名字(/j)將一塊採到的野菇腐木移植到農場裡。\n移植中……\n沒問題，接下來只要別忘了照料就行了。\n花費10點體力。\n跳：住處", "培育野菇": "=:if(MD.探望作物===1)game_jumpto(\"作物操心警告\")\n=:if(MD.種菇===1)game_jumpto(\"菇類澆水\")\n=:MD.ran=random_int(1,3)\n=:if(MD.ran==2)game_jumpto('收穫野菇')\n=:MD.體-=10,MD.探望作物=1\n野菇長得比想像的慢。\n把棲木挪到更陰涼的地方，希望他快快生長。\n花費10點體力。\n跳：住處", "菇類澆水": "=:MD.體-=10,MD.種菇=2,MD.探望作物=1\n野菇從棲木中冒出了小腦袋，(j)MD.名字(/j)細心為它除去一旁雜質。\n(m)https://i.imgur.com/ZWB2izf.jpg(/m)\n長得白淨又可愛。\n花費10點體力。\n跳：住處", "收穫野菇": "=:MD.體-=10,MD.種菇=0,MD.探望作物=0\n野菇長成了！\n(j)MD.名字(/j)把野菇當作孩子似的輕柔摘下。\n=:MD.ran=random_int(3,6)\n採收了(j)MD.ran(/j)株野菇。\n=:MD.菇+=MD.ran\n花費10點體力。\n跳：住處", "種植野果": "=:MD.體-=10,MD.果-=1,MD.種果=1,MD.探望作物=1\n(j)MD.名字(/j)將採到的野果枝條移植到農場裡。\n嫁接中……\n大功告成，接下來只要別忘了照料就行了。\n花費10點體力。\n跳：住處", "培育野果": "=:if(MD.探望作物===1)game_jumpto(\"作物操心警告\")\n=:if(MD.種果===1)game_jumpto(\"野果澆水\")\n=:MD.ran=random_int(1,3)\n=:if(MD.ran==2)game_jumpto('收穫野果')\n=:MD.體-=10,MD.探望作物=1\n野果還是很疲憊的樣子。\n把僅有的廚餘撒在植物根部，祈禱他快點結果。\n花費10點體力。\n跳：住處", "野果澆水": "=:MD.體-=10,MD.種果=2,MD.探望作物=1\n從花中結出了小小的幼果，(j)MD.名字(/j)把植物旁的雜草都拔乾淨了。\n這樣幼果就可以吃到更多養分了吧。\n花費10點體力。\n跳：住處", "收穫野果": "=:MD.體-=10,MD.種果=0,MD.探望作物=0\n野果長成了！\n(j)MD.名字(/j)看著累累碩果，滿足感難以言喻。\n=:MD.ran=random_int(4,6)\n採收了(j)MD.ran(/j)株野果。\n=:MD.果+=MD.ran\n花費10點體力。\n跳：住處", "種植小麥": "=:MD.體-=10,MD.麥-=1,MD.種麥=1,MD.探望作物=1\n(j)MD.名字(/j)將採到的麥桿移植到農場裡培育。\n播種中……\n大功告成，接下來只要別忘了照料就行了。\n花費10點體力。\n跳：住處", "培育小麥": "=:if(MD.探望作物===1)game_jumpto(\"作物操心警告\")\n=:if(MD.種麥===1)game_jumpto(\"小麥澆水\")\n=:MD.ran=random_int(1,3)\n=:if(MD.ran==2)game_jumpto('收穫小麥')\n=:MD.體-=10,MD.探望作物=1\n小麥沒有增加的趨勢。\n除完雜草後也只能耐心等待了。\n花費10點體力。\n跳：住處", "小麥澆水": "=:MD.體-=10,MD.種麥=2,MD.探望作物=1\n麥子很健碩的樣子，真希望明天也天氣晴朗。\n快快長大哦。\n花費10點體力。\n跳：住處", "收穫小麥": "=:MD.體-=10,MD.種麥=0,MD.探望作物=0\n小麥長成了！\n(j)MD.名字(/j)歡樂的收割了一大把的穗子。\n=:MD.ran=random_int(5,7)\n採收了(j)MD.ran(/j)株小麥。\n=:MD.麥+=MD.ran\n花費10點體力。\n跳：住處", "沒有種子": "每種作物至少需要一株本體來培養。\n跳：住處", "作物操心警告": "你今天已經培養過作物了，不能揠苗助長，明天再來吧。\n跳：住處", "深山": "=:MD.ran=random_int(1,100)\n=:if(MD.ran<=8)game_jumpto(\"找到巨木\")\n=:if(MD.ran==38)game_jumpto(\"迷途靈魂\")\n=:if(MD.ran>=91)game_jumpto(\"初遇礦洞\")", "山區": "=:MD.冒險=random_int(1,9)\n=:if(MD.冒險==1)game_jumpto(\"採集木材\")\n=:if(MD.冒險==2)game_jumpto(\"發現蜂巢\")\n=:if(MD.冒險==3)game_jumpto(\"鍛鍊體能\")\n=:if(MD.冒險==4)game_jumpto(\"遭遇棕熊\")\n=:if(MD.冒險==5)game_jumpto(\"遇見野鹿\")\n=:if(MD.冒險==6)game_jumpto(\"發現藥草\")\n=:if(MD.冒險==7)game_jumpto(\"採集小麥\")\n=:if(MD.冒險==8)game_jumpto(\"遭遇野豬\")\n=:if(MD.冒險==9)game_jumpto(\"機組室\")\n跳：住處", "河邊": "=:MD.ran=random_int(1,100)\n=:if(MD.ran==83)game_jumpto(\"迷途靈魂\")\n=:if(MD.ran==23)game_jumpto(\"神秘彈珠台\")\n=:MD.冒險=random_int(1,6)\n=:if(MD.冒險==1)game_jumpto(\"發現生薑\")\n=:if(MD.冒險==2)game_jumpto(\"發現鳥蛋\")\n=:if(MD.冒險==3)game_jumpto(\"河邊釣魚\")\n=:if(MD.冒險==4)game_jumpto(\"採集石頭\")\n=:if(MD.冒險==5)game_jumpto(\"發現野蕨\")\n=:if(MD.冒險==6)game_jumpto(\"採集野草\")\n跳：住處", "草原": "=:MD.ran=random_int(1,100)\n=:if(MD.ran==83)game_jumpto(\"迷途靈魂\")\n=:if(MD.ran==45)game_jumpto(\"初遇珍珠商店\")\n=:if(MD.ran==28)game_jumpto(\"撿拾小刀\")\n=:if(MD.屋>=3)game_jumpto(\"發現鴿子\")", "原野": "=:MD.冒險=random_int(1,8)\n=:if(MD.冒險==1)game_jumpto(\"發現野菇\")\n=:if(MD.冒險==2)game_jumpto(\"採集野草\")\n=:if(MD.冒險==3)game_jumpto(\"食用野果\")\n=:if(MD.冒險==4)game_jumpto(\"採集木材\")\n=:if(MD.冒險==5)game_jumpto(\"發現野兔\")\n=:if(MD.冒險==6)game_jumpto(\"採集木材\")\n=:if(MD.冒險==7)game_jumpto(\"蜥蜴咬傷\")\n=:if(MD.冒險==8)game_jumpto(\"花香秘境\")\n跳：住處", "海邊": "=:MD.ran=random_int(1,100)\n=:if(MD.ran==76)game_jumpto(\"發現羅盤\")\n=:if(MD.心>=5)game_jumpto(\"海洋蚌殼\")\n=:if(MD.ran==23)game_jumpto(\"神秘彈珠台\")\n=:if(MD.智<100||MD.羅盤<1||MD.木筏劇情==1)game_jumpto('海洋')\n=:if(MD.木筏劇情==0)game_jumpto('發現木筏')", "海洋": "=:MD.冒險=random_int(1,7)\n=:if(MD.冒險==1)game_jumpto(\"發現螃蟹\")\n=:if(MD.冒險==2)game_jumpto(\"採集海草\")\n=:if(MD.冒險==3)game_jumpto(\"海邊釣魚\")\n=:if(MD.冒險==4)game_jumpto(\"放置誘籠\")\n=:if(MD.冒險==5)game_jumpto(\"發現龜蛋\")\n=:if(MD.冒險==6)game_jumpto(\"維修木筏\")\n=:if(MD.冒險==7)game_jumpto(\"吹進海裡\")\n跳：住處", "發現羅盤": "=:if(MD.羅盤>=1)game_jumpto(\"海洋\")\n走著走著，在沙灘上發現了一個小巧玲瓏的物件。\n(m)https://i.imgur.com/DaJMmP0.jpg(/m)\n看這造型，竟是只在圖畫書中看過的航海羅盤！\n太幸運了，一定能派上用場吧。\n(j)MD.名字(/j)把航海羅盤放入口袋，繼續前進。\n=:MD.羅盤+=1\n前行中……\n等:1\n跳：海洋", "發現木筏": "(j)MD.名字(/j)發現了之前沒來過的偏僻海灣。\n在靜謐的淺灘上，一座破損的木筏正波瀾不驚的擱淺著。\n(m)https://i.imgur.com/3cf7PAJ.jpg(/m)\n木筏尚存前人細心編織的脈絡，極幸運的是，載具能浮在水面上的關鍵──好幾組的人造空瓶，並沒有損壞。\n(j)MD.名字(/j)想起先前撿到的羅盤，將其拿出，在手裡掂了掂。\n有這艘木筏，就能出海自救了。\n但、眼下破舊的筏體明顯乘載不了一個人，隨時都會散架。\n若能得到加固的建材……對了，山上巨木所鋸出來的硬木，不就是最好的材料嗎？\n再加些耐磨的皮件、纖維，在木筏上造個簡單的遮蔽棚和船帆，要在海上過上幾日也不成問題。\n是啊，乍現的點子即便胡亂大膽，卻不是毫無可能呢。\n先返回住所，好好規劃和籌齊物資吧。\n=:MD.體-=5,MD.用時-=1,MD.心+=1,MD.木筏劇情=1\n體力減少5點。\n跳：住處", "維修木筏": "=:if(MD.木筏劇情<1)game_jumpto(\"海洋\")\n=:if(MD.木筏劇情==2)game_jumpto(\"木筏儲備\")\n又回到了這個靜謐、美麗的海灣。\n要維修破損的木筏，需要20塊硬木和10塊鱷皮，以及50個纖維。\n=:if(MD.硬<20||MD.鱷皮<10||MD.草<50)game_jumpto('木筏不足')\n(b)1(/b)(b)2(/b)\n选:維修破損的木筏\n选:海邊", "維修破損的木筏": "(j)MD.名字(/j)備齊了所有資源，在他巧手下，破爛木筏很快就變得煥然一新。\n從口袋拿出當時撿到的羅盤，安裝在木筏上的操控桿上，用以觀察航線。\n萬事俱備，只欠東風……但自己真的準備好了嗎？\n(j)MD.名字(/j)陷入沉思，就這樣出發未免太有勇無謀了，只要食物不足，恐怕就要葬身海底。\n得帶上足夠的糧食，確保在飄流時不會因為飢餓死去。\n(j)MD.名字(/j)將這件事記錄下來，回頭做最終的整備。\n出航最終儲備任務──「任何一種生食數量達到40個以上」。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.木筏劇情=2\n跳：住處", "木筏儲備": "又回到了這個靜謐、美麗的海灣。\n若要出航──「任何一種生食數量必須達到40個以上」。\n=:if(MD.菇>=40||MD.蛋>=40||MD.肉>=40||MD.魚>=40||MD.蕨>=40||MD.藻>=40||MD.蟹>=40||MD.蝦>=40||MD.章>=40||MD.蜜>=40||MD.乳>=40||MD.蜥蜴>=40||MD.果>=40)game_jumpto(\"出航\")\n跳：木筏不足", "出航": "(j)MD.名字(/j)成功蒐羅到所有物資，將食物用纖維結實的捆好，放在木筏上不受曝曬的遮蔽物下。\n終於要出發了。\n(j)MD.名字(/j)興奮的跳上木筏，用事先準備好的木槳往岸邊一撐，想將木筏推離石灘。\n這動作並不容易，(j)MD.名字(/j)氣喘吁吁，被浪打回了好幾次，才終於讓木筏吃了水。\n而接下來……才是真正的考驗。\n=:MD.漂流=1,MD.漂食=10\n(j)game_createmsg(\"在廣闊的大海中漂流著。\",\"3\",\"left\",5)(/j)", "漂流中": "(m)https://i.imgur.com/X6tIqfJ.jpg(/m)\n漂流的第(j)MD.漂流(/j)天。\n=:MD.ran=random_int(1,10)\n=:if(MD.ran==4)game_jumpto(\"有救援\")", "無救援": "海面一片風平浪靜。什麼也沒發現。\n……\n=:if(MD.漂流==11)game_jumpto(\"餓死\")\n(j)MD.名字(/j)熬到夜深，才因為飢餓吃掉了十分之一的存糧。\n=:MD.漂流+=1,MD.漂食-=1\n=:if(MD.漂食<0)game_jumpto(\"餓死\")\n還剩(j)MD.漂食(/j)份存糧。\n=:if(MD.漂食<=3)game_jumpto(\"漂食警告\")\n跳：漂流中", "漂食警告": "再這樣下去，(j)MD.名字(/j)一定會餓死在海上。\n跳：漂流中", "有救援": "=:if(MD.漂流<=3)game_jumpto(\"無救援\")\n……那是什麼？\n在海上漂流曬得昏沉沉的(j)MD.名字(/j)將自己的身子撐起，瞪大雙眼，不敢置信的瞪著遠方出現的龐然大物。\n(m)https://i.imgur.com/a2QCzZv.jpg(/m)\n是船！自己終於能得救了！\n跳：結局2", "木筏不足": "目前沒收集到足夠的資源，在島上多搜查一陣子吧。\n=:MD.體-=5,MD.用時-=1\n體力減少5點。\n跳：住處", "海洋蚌殼": "=:MD.ran=random_int(1,5)\n=:if(MD.ran==3)game_jumpto(\"幸運蚌殼\")\n跳：海洋", "幸運蚌殼": "(j)MD.名字(/j)心情極佳的走在沿海的沙灘上。\n他有預感，今天一定會很幸運。\n噢！\n走路分心的(j)MD.名字(/j)意外踢到了一個沉甸甸的物體。\n咦，是一個蚌？\n(m)https://i.imgur.com/KugP37Z.png(/m)\n體力減少5點，(j)MD.名字(/j)得到了一個蚌。\n=:MD.體-=5,MD.用時-=1,MD.心-=1,MD.貝+=1\n跳：住處", "神秘彈珠台": "這片荒野的神祕之物實在不少。\n這不，(j)MD.名字(/j)在探索中找到了一台遊戲機。\n(m)https://i.imgur.com/c2FjnIg.jpg(/m)\n這台珍珠遊戲機十分破舊，隨時都會壞的樣子。", "重新下注": "是否要運行神秘的珍珠彈珠台？\n(b)1(/b)(b)2(/b)(b)3(/b)\n(b)4(/b)\n选:使用1顆\n选:使用5顆\n选:使用10顆\n选:取消投注", "使用1顆": "中獎率1/4，贏了得到5顆珍珠，輸了失去1顆珍珠。\n是否確定遊玩？\n(b)1(/b)(b)2(/b)\n选:投注1顆\n选:重新下注", "投注1顆": "=:if(MD.珍珠<1)game_jumpto(\"籌碼不足\")\n(j)MD.名字(/j)將1顆珍珠投入彈珠台中，按下按鈕……\n匡啷！\n=:MD.ran=random_int(1,4)\n=:if(MD.ran==3)game_jumpto('贏得五顆珍珠')\n太遺憾了，珍珠沒有落在中獎的格子裡！\n失去了1顆珍珠。\n彈珠台壞了。\n=:MD.珍珠-=1\n跳：投注收尾", "贏得五顆珍珠": "太棒了！珍珠落在中獎的格子裡！\n(j)MD.名字(/j)為自己贏得了5顆珍珠。\n彈珠台壞了。\n=:MD.珍珠+=5\n跳：投注收尾", "使用5顆": "中獎率1/5，贏了得到15顆珍珠，輸了失去5顆珍珠。\n是否確定遊玩？\n(b)1(/b)(b)2(/b)\n选:投注5顆\n选:重新下注", "投注5顆": "=:if(MD.珍珠<5)game_jumpto(\"籌碼不足\")\n(j)MD.名字(/j)將5顆珍珠投入彈珠台中，按下按鈕……\n匡啷！\n=:MD.ran=random_int(1,5)\n=:if(MD.ran==3)game_jumpto('贏得十五顆珍珠')\n太遺憾了，珍珠沒有落在中獎的格子裡！\n失去了5顆珍珠。\n彈珠台壞了。\n=:MD.珍珠-=5\n跳：投注收尾", "贏得十五顆珍珠": "太棒了！珍珠落在中獎的格子裡！\n(j)MD.名字(/j)為自己贏得了15顆珍珠。\n彈珠台壞了。\n=:MD.珍珠+=15\n跳：投注收尾", "使用10顆": "中獎率1/6，贏了得到30顆珍珠，輸了失去10顆珍珠。\n是否確定遊玩？\n(b)1(/b)(b)2(/b)\n选:投注10顆\n选:重新下注", "投注10顆": "=:if(MD.珍珠<10)game_jumpto(\"籌碼不足\")\n(j)MD.名字(/j)將10顆珍珠投入彈珠台中，按下按鈕……\n匡啷！\n=:MD.ran=random_int(1,6)\n=:if(MD.ran==3)game_jumpto('贏得三十顆珍珠')\n太遺憾了，珍珠沒有落在中獎的格子裡！\n失去了10顆珍珠。\n彈珠台壞了。\n=:MD.珍珠-=10\n跳：投注收尾", "贏得三十顆珍珠": "太棒了！珍珠落在中獎的格子裡！\n(j)MD.名字(/j)為自己贏得了30顆珍珠。\n彈珠台壞了。\n=:MD.珍珠+=30\n跳：投注收尾", "籌碼不足": "(j)MD.名字(/j)沒有足夠的珍珠來下注，便放下遊戲機離開了。\n跳：投注收尾", "取消投注": "(j)MD.名字(/j)哪有那個台灣時間，便放下遊戲機離開了。\n跳：投注收尾", "投注收尾": "=:MD.體-=5,MD.用時-=1\n體力減少5點。\n目前持有(j)MD.珍珠(/j)顆珍珠。\n跳：住處", "初遇礦洞": "=:if(MD.礦坑==2)game_jumpto(\"礦坑\")\n=:if(MD.礦坑==1)game_jumpto(\"下礦\")\n=:if(MD.麻繩<1||MD.武<100)game_jumpto(\"山區\")\n(j)MD.名字(/j)走在一處平坦的山間林道上。\n突然之間，(j)MD.名字(/j)腳下的土石崩塌了！\n(m)https://i.imgur.com/4uV4XHk.jpg(/m)\n(j)MD.名字(/j)腦袋一片空白，瞬間與崩落的石塊一起往下掉。\n「哇──」\n慘叫聲和回音迴盪了整個地下空間，(j)MD.名字(/j)重重摔落在土堆上，模樣極為狼狽。\n「咳咳咳、嘔噁……」撲鼻而來的潮濕臭氣與粉塵讓(j)MD.名字(/j)劇烈的咳嗽著。\n從土堆上撐起身子，花了幾秒才意識到自己剛才被腳下的土地碰瓷了。\n不會吧，這也太衰了點，這下要怎麼回到地表啊。\n(j)MD.名字(/j)揉著屁股，盯著天花板上離自己有三四米的大破洞，摔下來沒受重傷是不幸中的萬幸。\n多虧了屁股下的這堆土……不對，這不是土啊！\n(m)https://i.imgur.com/uTIH6W9.jpg(/m)\n(j)MD.名字(/j)驚恐地看著被屁股原地坐化的白骨骷髏，發出了比剛才更劇烈的慘叫。\n骨骨骨──骨骸？\n還不只一具，至少三人以上的完整白骨彼此堆疊，正好給(j)MD.名字(/j)當了緩衝。\n「對不起對不起，抱歉啊抱歉，真的不是我把你們坐死的，對不起……」\n(j)MD.名字(/j)緊閉雙眼，雙手用力合掌，對著骨骸焦慮地道歉。\n太嚇人了，這座荒島怎麼會有這種詭異的地方，除了食物少了點，還有點野獸之外，島上不是挺平和的嗎。\n耐不住內心好奇，(j)MD.名字(/j)在猶豫中睜開眼，直視那堆白骨。\n三位先人身上穿著厚重的工作服，頭上戴著鑲有燈泡的施工帽──看這一身行頭，這三個人應該是礦工。\n所以說……這裡是礦洞囉？\n(j)MD.名字(/j)在震驚過後，不由得感到一絲好奇。\n在這個幽深的礦洞中，到底發生過什麼？\n是礦洞坍方的當下求生之路被阻絕了，這三個人才會餓死或病死在礦洞裡，或者是遇到了什麼不可抗力的恐怖之事？\n(j)MD.名字(/j)吞了下口水，決定先別自己嚇自己。\n眼下要緊的是逃離這個礦坑，其他的事，逃出這後再想也不遲。\n好在自己身上帶著先前撿到的麻繩，不知道有沒有什麼工具能拿來輔助……。\n(j)MD.名字(/j)再次雙掌合十，對白骨拜了拜，接著極為彆扭的去翻動白骨身上的遺物。\n吃完乾糧後遺留的包裝紙、喝空的鋼製水瓶……不行，這些都沒有用。\n啊！壓在最下方的人手中緊抓著一把十字鎬！\n(j)MD.名字(/j)忍著罪惡感把十字鎬強抽出來，把它和麻繩綁在一起。\n（完成了簡易的逃生索。）\n(j)MD.名字(/j)握著繩索一端，另一手持著十字鎬，迅速瞄準後，使盡吃奶的力氣把十字鎬往空中投出──\n忽哧！\n十字鎬嵌進了上方的樹幹，勉強成了逃生索的支點。\n(j)MD.名字(/j)拉緊麻繩，後退一步再助跑往前衝，利用踢牆時的反作用力，將自己往上送。\n哎啊啊啊！\n說是拚盡老命也不為過，(j)MD.名字(/j)一鼓作氣攀爬到了洞口，抓住地面的突起物將自己撐了起來。\n「好累……」\n好在這陣子被荒野強迫健身，要是從前那白斬雞似的自己，這一掉下礦洞，大概率直接往生了。\n(j)MD.名字(/j)氣喘吁吁地坐在洞緣，視線卻緊緊追隨著礦洞。\n底下似乎有不少秘辛，說不定有幫助自己逃出荒野的辦法。\n再說，也不能拋著三具白骨在那邊變成化石啊，做為人，看到了實在無法不管。\n再帶些石料和木頭過來搭個梯子，下礦坑探索吧。\n體力減少20點，失去一條麻繩。\n打造木梯大概需要5塊硬木與10個石頭，別忘了帶上槌子。\n=:MD.用時-=1,MD.體-=20,MD.麻繩=0,MD.礦坑=1\n跳：住處", "下礦": "=:if(MD.硬<5||MD.石<10||MD.槌<1)game_jumpto(\"下礦不足\")\n憑藉記憶，(j)MD.名字(/j)找到了上次跌落的礦坑。\n這次工具準備齊全，直接開工吧。\n(j)MD.名字(/j)在現場把建材組合起來，沿著礦坑的洞口，往下蓋了一個穩固的木梯。\n好……非常完美，這下就能順利通行了。\n最後，(j)MD.名字(/j)沒忘了把三具白骨埋起來，雖不知他們地下有知會不會安慰，但(j)MD.名字(/j)內心好受了些。\n（(j)MD.名字(/j)太累了，探勘的事等下次吧。）\n體力減少20點，失去5塊硬木、10份石料。\n開放了礦洞的通行。\n=:MD.用時-=1,MD.體-=20,MD.硬-=5,MD.石-=10,MD.礦坑=2\n跳：住處", "下礦不足": "(j)MD.名字(/j)不小心走回上次跌落的礦坑。\n只是造木梯的材料還未齊全，也只能空手離開。\n體力減少5點。\n=:MD.用時-=1,MD.體-=5\n跳：住處", "礦坑": "憑藉記憶，(j)MD.名字(/j)找到了礦坑。\n(j)MD.名字(/j)爬下木梯，跳入廢棄的礦洞。\n(m)https://i.imgur.com/5BjaZg9.jpg(/m)\n<hr>(b)1(/b)(b)2(/b)(b)3(/b)\n选:探索礦坑\n选:離開礦坑\n选:下礦規則", "離開礦坑": "今天感覺不太好，(j)MD.名字(/j)匆匆離去。\n體力減少5點。\n=:MD.用時-=1,MD.體-=5\n跳：住處", "下礦規則": "每次進入礦坑，需要一塊油脂充當燃油來照亮前路。\n礦坑探索不耗費時間，但體力會隨著探索逐漸減少。\n礦洞內的環境相當惡劣，請衡量自身安全後再行動。\n(b)1(/b)(b)2(/b)\n选:探索礦坑\n选:離開礦坑", "探索礦坑": "=:if(MD.油<1)game_jumpto(\"不能下礦\")\n(j)MD.名字(/j)將油脂放入燃油燈中，取起燈，向前行。\n=:MD.油-=1", "探索點": "=:if(MD.體<=0)game_jumpto(\"累死\")\n=:if(MD.電池北+MD.電池西+MD.電池東+MD.電池南+MD.電池驗證==4)game_jumpto('發現機組室')\n當前體力─(j)MD.體(/j)點。\n<hr>(b)1(/b)\n(b)2(/b)(b)3(/b)(b)4(/b)\n(b)5(/b)\n选:北路\n选:西路\n选:離開礦洞\n选:東路\n选:南路", "發現機組室": "……\n在礦坑裡收集了1號到4號的電池，卻一直找不到用途，(j)MD.名字(/j)百思不得其解。\n無奈之下，(j)MD.名字(/j)回到礦坑口，把先前掩埋好的三具白骨再挖出來。\n「真對不起，我一定會遭天譴吧。」\n咬著牙，一不作二不休的(j)MD.名字(/j)把白骨身上的工作服徹底翻了遍。\n前兩套都是很普通的男性工裝，正當(j)MD.名字(/j)感到失望時，竟真從第三人的上衣口袋中，摸出了一張「IC身分卡」和一張荒島「地圖」。\n從荒島地圖上發現了電力機組室的位置！\n獲得了機組室通行證！\n嗯？地圖的邊緣似乎寫著某個名字。", "夥伴": "=:function获取(){MD.夥伴=document.getElementById(\"z\").value}\n讀出的名字是……\n<inputid=\"z\"size=\"10\"style=\"border-radius:15px\"maxlength=\"10\">\n(b)1(/b)\n选：就是這個名字。", "就是這個名字": "=:获取()\n(j)MD.名字(/j)精神一振，緊緊把文件握在手裡。\n先回住處稍作休養，就往神秘的機組室出發吧。\n=:MD.電池驗證=1\n跳：住處", "北路": "=:MD.ran=random_int(1,8)\n=:if(MD.ran==1)game_jumpto(\"黑炭\")\n=:if(MD.ran==2)game_jumpto(\"壁畫北\")\n=:if(MD.ran==3)game_jumpto(\"恢復點\")\n=:if(MD.ran==4)game_jumpto(\"臭氣\")\n=:if(MD.ran==5)game_jumpto(\"電池北\")\n=:if(MD.ran==6)game_jumpto(\"爬行怪\")\n=:if(MD.ran==7)game_jumpto(\"壁畫北\")\n=:if(MD.ran==8)game_jumpto(\"恢復點\")", "西路": "=:MD.ran=random_int(1,8)\n=:if(MD.ran==1)game_jumpto(\"爬行怪\")\n=:if(MD.ran==2)game_jumpto(\"壁畫西\")\n=:if(MD.ran==3)game_jumpto(\"電池西\")\n=:if(MD.ran==4)game_jumpto(\"蝙蝠\")\n=:if(MD.ran==5)game_jumpto(\"無事\")\n=:if(MD.ran==6)game_jumpto(\"好色植物\")\n=:if(MD.ran==7)game_jumpto(\"爬行怪\")\n=:if(MD.ran==8)game_jumpto(\"蝙蝠\")", "東路": "=:MD.ran=random_int(1,8)\n=:if(MD.ran==1)game_jumpto(\"劇毒縫隙\")\n=:if(MD.ran==2)game_jumpto(\"壁畫東\")\n=:if(MD.ran==3)game_jumpto(\"恢復點\")\n=:if(MD.ran==4)game_jumpto(\"電池東\")\n=:if(MD.ran==5)game_jumpto(\"無事\")\n=:if(MD.ran==6)game_jumpto(\"好色植物\")\n=:if(MD.ran==7)game_jumpto(\"恢復點\")\n=:if(MD.ran==8)game_jumpto(\"好色植物\")", "南路": "=:MD.ran=random_int(1,8)\n=:if(MD.ran==1)game_jumpto(\"好色植物\")\n=:if(MD.ran==2)game_jumpto(\"壁畫南\")\n=:if(MD.ran==3)game_jumpto(\"電池南\")\n=:if(MD.ran==4)game_jumpto(\"劇毒縫隙\")\n=:if(MD.ran==5)game_jumpto(\"蝙蝠\")\n=:if(MD.ran==6)game_jumpto(\"臭氣\")\n=:if(MD.ran==7)game_jumpto(\"爬行怪\")\n=:if(MD.ran==8)game_jumpto(\"黑炭\")", "離開": "(j)MD.名字(/j)離開了適合釣魚的海岸。\n跳：住處", "不能下礦": "(j)MD.名字(/j)沒有足夠的燃油探索礦洞，只好悻悻而歸。\n體力減少5點。\n=:MD.用時-=1,MD.體-=5\n跳：住處", "壁畫北": "(j)MD.名字(/j)在往北方的礦道牆壁上，看到一幅神秘的壁畫。\n(m)https://i.imgur.com/TEFVKtC.jpg(/m)\n好神奇的壁畫，上面的生物不會是熊吧？\n發現了奇妙的數字「6」。\n體力減少3點。\n=:MD.壁畫北=1,MD.體-=3\n跳：探索點", "壁畫西": "(j)MD.名字(/j)在往西方的礦道牆壁上，看到一幅神秘的壁畫。\n(m)https://i.imgur.com/cOCK23e.jpg(/m)\n這絕對是在描繪那可惡的鱷魚。\n發現了奇妙的數字「2」。\n體力減少3點。\n=:MD.壁畫西=1,MD.體-=3\n跳：探索點", "壁畫東": "(j)MD.名字(/j)在往東方的礦道牆壁上，看到一幅神秘的壁畫。\n(m)https://i.imgur.com/dyle7sE.jpg(/m)\n畫上有人乘著一艘木筏，這座島上，有這樣的船嗎？\n發現了奇妙的數字「7」。\n體力減少3點。\n=:MD.壁畫東=1,MD.體-=3\n跳：探索點", "壁畫南": "(j)MD.名字(/j)在往南方的礦道牆壁上，看到一幅神秘的壁畫。\n(m)https://i.imgur.com/PByBzda.jpg(/m)\n那是什麼？一隻鳥、或是一支紙飛機？\n發現了奇妙的數字「9」。\n體力減少3點。\n=:MD.壁畫南=1,MD.體-=3\n跳：探索點", "電池北": "=:if(MD.電池北==1)game_jumpto(\"北路\")\n(j)MD.名字(/j)撿到了上頭寫著【1號】的機組電池。\n(m)https://i.imgur.com/2TTtGWr.png(/m)\n或許……還有其他編號的電池？\n體力減少6點。\n=:MD.電池北=1,MD.體-=6\n跳：探索點", "電池西": "=:if(MD.電池西==1)game_jumpto(\"西路\")\n(j)MD.名字(/j)撿到了上頭寫著【2號】的機組電池。\n(m)https://i.imgur.com/2TTtGWr.png(/m)\n或許……還有其他編號的電池？\n體力減少6點。\n=:MD.電池西=1,MD.體-=6\n跳：探索點", "電池東": "=:if(MD.電池東==1)game_jumpto(\"東路\")\n(j)MD.名字(/j)撿到了上頭寫著【3號】的機組電池。\n(m)https://i.imgur.com/2TTtGWr.png(/m)\n或許……還有其他編號的電池？\n體力減少6點。\n=:MD.電池東=1,MD.體-=6\n跳：探索點", "電池南": "=:if(MD.電池南==1)game_jumpto(\"南路\")\n(j)MD.名字(/j)撿到了上頭寫著【4號】的機組電池。\n(m)https://i.imgur.com/2TTtGWr.png(/m)\n或許……還有其他編號的電池？\n體力減少6點。\n=:MD.電池南=1,MD.體-=6\n跳：探索點", "黑炭": "神秘的黑嚕嚕出現了！\n(m)https://i.imgur.com/sJb86WN.jpg(/m)\n黑炭精咧開大嘴巴，笑的略顯邪惡。\n他要求(j)MD.名字(/j)立刻交出40塊木頭，如果做不到，他恐怕會非常生氣。\n(b)1(/b)\n选:給他木頭", "給他木頭": "=:if(MD.木<40)game_jumpto(\"不給木頭\")\n(j)MD.名字(/j)別無他法，只好把40塊木頭交給黑炭精。\n不過，他這是要拿木頭當零食吃嗎？\n體力減少5點，失去40塊木頭。\n=:MD.體-=5,MD.木-=40\n跳：探索點", "不給木頭": "(j)MD.名字(/j)嘆了口氣，自己窮得連十塊木頭都沒有，怎麼滿足黑炭精的要求？\n見狀，對方果然十分生氣，不由分說的用大胖身體撞了過來──\n媽呀！\n被黑炭精攻擊了！體力減少40點。\n=:MD.體-=40\n跳：探索點", "恢復點": "(j)MD.名字(/j)找到一處廢棄的礦工休息室，稍稍恢復了體力。\n體力上升15點。\n=:MD.體+=15\n=:if(MD.體>=100)MD.體=100\n跳：探索點", "臭氣": "唔，這是什麼味道，好臭啊。\n從前方傳來濃厚的臭雞蛋味，薰的(j)MD.名字(/j)是淚眼直流，無法再前進。\n體力減少8點。\n=:MD.體-=8\n跳：探索點", "爬行怪": "謎樣的爬行怪出現了！\n(m)https://i.imgur.com/WToFJ4u.jpg(/m)\n仔細一看，他其實是仰躺在地上的姿勢。\n=:MD.ran=random_int(1,2)\n=:if(MD.ran==1)game_jumpto(\"爬行怪咬人\")\n=:if(MD.ran==2)game_jumpto(\"爬行怪溫和\")", "爬行怪咬人": "(j)MD.名字(/j)還在觀察他的姿勢，爬行怪居然用極快的速度爬了過來。\n還不講武德的用力啃了(j)MD.名字(/j)一口！\n痛痛痛──\n憤怒的(j)MD.名字(/j)抬腳把爬行怪踢開了！\n被爬行怪攻擊，體力減少20點。\n=:MD.體-=20\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"礦坑掉繩\")\n跳：探索點", "爬行怪溫和": "這隻爬行怪相當溫和，只在和(j)MD.名字(/j)差肩而過的時候發出了呼嚕聲，便自行滾走了。\n怎麼會這麼療癒。\n體力增加了5點。\n=:MD.體+=5\n=:if(MD.體>=100)MD.體=100\n跳：探索點", "蝙蝠": "洞穴裡的蝙蝠被(j)MD.名字(/j)驚動了！\n(m)https://i.imgur.com/elCH8ho.jpg(/m)\n目盲的他們在感測到活人的存在後開始大肆俯衝，想驅走這不速之客。\n(j)MD.名字(/j)只能抱頭蹲低，等蝙蝠們自己冷靜下來，十分無助可憐。\n體力減少5點。\n=:MD.體-=5\n跳：探索點", "劇毒縫隙": "好燙！\n(m)https://i.imgur.com/W5K6jdK.jpg(/m)\n不小心一手摸在冒著有毒氣體的牆縫上，(j)MD.名字(/j)的手被灼傷了。\n體力減少12點。\n=:MD.體-=12\n跳：探索點", "好色植物": "一株讓人十分不舒服的詭異植物出現在礦道中。\n(m)https://i.imgur.com/tYFJGHS.jpg(/m)\n(j)MD.名字(/j)還來不及退開，它的觸手就已經不知廉恥的摸了過來，竄進(j)MD.名字(/j)的褲腳內。\n啊啊啊啊啊啊──\n=:MD.ran=random_int(1,2)\n=:if(MD.ran==1)game_jumpto(\"被花欺侮\")", "欺侮花": "=:if(MD.刀<1)game_jumpto(\"被花欺侮\")\n(j)MD.名字(/j)被這猥瑣的植物激怒了，抽出身上的小刀，手刀起手刀落，直接把觸手連同花剁個稀巴爛！\n氣勢正好，體力恢復了7點！\n=:MD.體+=7\n=:if(MD.體>=100)MD.體=100\n跳：探索點", "被花欺侮": "沒想過花也有這麼變態的！\n(j)MD.名字(/j)身上沒有可以反擊的武器，只能以腳踩爛觸手後，落荒而逃。\n體力減少10點。\n=:MD.體-=10\n跳：探索點", "無事": "(j)MD.名字(/j)什麼都沒有發現。\n跳：探索點", "發現龜蛋": "(j)MD.名字(/j)在沙灘十分隱密的角落發現了一窩龜蛋。\n(m)https://i.imgur.com/pUoQlLR.jpg(/m)\n=:MD.ran=random_int(1,3)\n=:if(MD.ran==1)game_jumpto('烏龜孵化')\n<imgsrc=\"https://i.imgur.com/eUFgMCE.png\">(j)if(MD.用時==4)'<span style=\"color:#f0d080;font-style:italic;\">在清晨陽光的恩賜中，發現了比往常更多的資源。</span>'(/j)\n=:if(MD.用時==4)MD.ran+=5\n(j)MD.名字(/j)伸手撿了(j)MD.ran(/j)顆蛋，海龜已經瀕臨絕種，做人不要太貪心。\n體力減少5點。\n=:MD.蛋+=MD.ran,MD.體-=5,MD.用時-=1\n跳：住處", "烏龜孵化": "大喜過望的(j)MD.名字(/j)伸手想撿，卻聽到細微的破裂聲。\n咦？\n(m)https://i.imgur.com/E7FyZ2H.jpg(/m)\n不好啦，海龜蛋全孵化了！\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "找到巨木": "(j)MD.名字(/j)在山林深處發現了一棵參天巨木的樹根。\n(m)https://i.imgur.com/Tr8n1OH.jpg(/m)\n這些樹根非常結實，若能鋸下一些硬木，必定大有用處。\n=:if(MD.鋸<1)game_jumpto('巨木無鋸')\n=:if(MD.武<100)game_jumpto('巨木無力')\n(j)MD.名字(/j)使出吃奶的力氣，以粗劣的鋸子切割著巨木。\n=:MD.ran=random_int(1,2)\n……好累，終於鋸下了(j)MD.ran(/j)塊硬木。\n(m)https://i.imgur.com/wZGs5E9.jpg(/m)\n=:MD.硬+=MD.ran,MD.體-=10,MD.用時-=1\n體力減少了10點。\n=:MD.ran=random_int(1,15)\n=:if(MD.ran==3)game_jumpto('巨木壞鋸')\n跳：住處", "巨木壞鋸": "糟糕，鋸子被這樣折騰，石刃缺了一道大口子，瞬間報廢了。\n=:MD.鋸=0\n跳：住處", "巨木無鋸": "(j)MD.名字(/j)沒有做出鋸子，真是太可惜了。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "巨木無力": "(j)MD.名字(/j)的身體鍛鍊不足，根本鋸不動巨木。\n枉費工具在手，也只能仰天長\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "發現鴿子": "=:MD.ran=random_int(1,10)\n=:if(MD.ran<=9)game_jumpto(\"原野\")\n=:if(MD.熊>=1||MD.鹿>=1||MD.兔>=1)game_jumpto(\"草原\")\n=:if(MD.鴿>=1)game_jumpto(\"草原\")\n走在林間，(j)MD.名字(/j)突然聽到翅膀撲扇的聲響。\n轉頭一看，遠處居然有隻凶狠的白鴿追趕著明顯虛弱的鴿子。\n(m)https://i.imgur.com/UFUArtT.jpg(/m)\n古道熱腸的(j)MD.名字(/j)往鴿子們趨近了幾步，作勢將白鴿給威嚇走了。\n原以為虛弱鴿子會趁機離開，但鴿子卻停在原地，對(j)MD.名字(/j)發出咕咕聲。\n嗯？怎麼回事。\n(j)MD.名字(/j)慢慢蹲下來，對鴿子招手，想不到他竟然真的靠近了。\n就在這時候，(j)MD.名字(/j)看到鴿子左側羽翼有一大片的損傷，甚至可以從灰色的羽毛下看出變暗的血跡。\n奪筍啊！這不會是被其他鴿子霸凌了吧？\n還是在山裡遇到老鷹，被當作獵物盯上了？\n(j)MD.名字(/j)讓可憐的鴿子騎到手腕上，這才發現這隻鴿子帶著腳環，原本是有主人的。\n說起來，鴿子身體裡有自動導航，更有著無論多遠都能返家的習性……\n如果把這隻鴿子養好了，讓他帶著寫有求救信的紙條飛回去找主人，自己不就有機會得救了嗎！\n(j)MD.名字(/j)大喜過往，感謝老天爺派了這麼一個使者來拯救自己。\n鴿子轉動腦袋，不解地看著欣喜的人類。\n「既然你是灰色的，就叫你灰咕咕吧。」\n走吧，灰咕咕，要暫時綁架你啦。\n體力減少5點，得到受傷的信鴿「灰咕咕」。\n=:MD.體-=5,MD.用時-=1,MD.鴿=1,MD.心+=5,MD.咕愛=0,MD.寵肚=3,MD.寵物=(\"灰咕咕\")\n跳：住處", "採集小麥": "=:MD.ran=random_int(2,5)\n(j)MD.名字(/j)在山區發現了幾株熟透的小麥。\n(m)https://i.imgur.com/5rBVNXN.jpg(/m)\n<imgsrc=\"https://i.imgur.com/vEjOnz1.png\">(j)if(MD.用時==2)'<span style=\"color:#f0d080;font-style:italic;\">在夕陽溫柔的擁護中，得以收穫比往常更多的資源。</span>'(/j)\n=:if(MD.用時==2)MD.ran+=5\n徒手採收了(j)MD.ran(/j)束麥穗，有這些麥子就能做出各式麵點了。\n體力減少5點。\n=:MD.麥+=MD.ran,MD.體-=5,MD.用時-=1\n跳：住處", "採集木材": "=:if(MD.斧>0)game_jumpto(\"砍樹\")\n=:MD.ran=random_int(3,4)\n(j)MD.名字(/j)在荒野四處逛了逛。\n撿到了(j)MD.ran(/j)塊木頭。\n(m)https://i.imgur.com/h7YbXE9.jpg(/m)\n=:MD.木+=MD.ran,MD.體-=5,MD.用時-=1\n體力減少5點。\n跳：住處", "砍樹": "=:MD.ran=random_int(5,6)\n(j)MD.名字(/j)在荒野四處逛了逛。\n不久發現了一片樹林，(j)MD.名字(/j)利用斧子大力劈砍，得到了(j)MD.ran(/j)塊木頭。\n(m)https://i.imgur.com/h7YbXE9.jpg(/m)\n=:MD.木+=MD.ran,MD.體-=5,MD.用時-=1\n體力減少5點。\n跳：住處", "採集石頭": "=:if(MD.槌>0)game_jumpto(\"捶石\")\n河邊有許多上游沖刷下來的石頭。\n(m)https://i.imgur.com/bMPzjSi.jpg(/m)\n=:MD.ran=random_int(3,4)\n(j)MD.名字(/j)仔細挑選，帶回了(j)MD.ran(/j)塊大小適中的石頭。\n體力減少5點。\n=:MD.石+=MD.ran,MD.體-=5,MD.用時-=1\n跳：住處", "捶石": "河邊有許多上游沖刷下來的石頭。\n(m)https://i.imgur.com/bMPzjSi.jpg(/m)\n=:MD.ran=random_int(5,6)\n但(j)MD.名字(/j)鎖定那些還未被磨去稜角的頑石，利用槌子將石頭分解，最後得到了(j)MD.ran(/j)塊品質優良的石料。\n體力減少5點。\n=:MD.石+=MD.ran,MD.體-=5,MD.用時-=1\n跳：住處", "遭遇野豬": "=:MD.用時-=1\n走在山林間，一隻小野豬突然出現在前方，好奇的看著(j)MD.名字(/j)。\n(m)https://i.imgur.com/Ode5e5y.jpg(/m)\n(b)1(/b)(b)2(/b)\n选:殺死野豬\n选:和野豬玩", "殺死野豬": "=:if(MD.刀==0)game_jumpto(\"野豬無刀\")\n=:MD.ran=random_int(1,3)\n=:if(MD.ran==3)game_jumpto(\"野豬逃跑\")\n雖然覺得野豬可愛，對這樣純真的動物下手有些不忍。\n但……仁慈便無法填飽肚子。\n(j)MD.名字(/j)緩緩地走上前，趁野豬專心打量人類的鞋子時，一刀把小野豬的脖子抹了。\n體力減少5點，得到一塊生肉<imgsrc=\"https://i.imgur.com/cvfdlGC.png\">。\n=:MD.體-=5,MD.豬友-=5,MD.肉+=1\n跳：住處", "野豬逃跑": "查覺到(j)MD.名字(/j)來者不善，野豬一溜煙的跑了。\n體力減少5點。\n=:MD.體-=5,MD.豬友-=2\n跳：住處", "野豬無刀": "沒有利刃在手，(j)MD.名字(/j)也拿野豬沒辦法。\n小野豬哼唧了兩聲，轉身跑了。\n體力減少5點。\n=:MD.體-=5,MD.豬友-=3\n跳：住處", "和野豬玩": "(j)MD.名字(/j)友好的上前，讓小野豬靠近自己。\n野豬用豬鼻子拱了拱(j)MD.名字(/j)的腿。\n彼此都覺得很高興。\n體力提升5點，心情變好了。\n=:MD.體+=5,MD.心+=3,MD.豬友+=3\n跳：住處", "遭遇棕熊": "=:MD.用時-=1,MD.遇熊數+=1\n(j)MD.名字(/j)在發現野獸足跡的道路上多逗留了一會，身後立刻傳來低沉的吼聲。\n(m)https://i.imgur.com/WpELB14.jpg(/m)\n(b)1(/b)(b)2(/b)\n选:拔刀對抗\n选:對熊吹箭\n<:if(MD.吹箭===0){curBtn=null};if(MD.鴿==1){curBtn=null};if(MD.屋<3){curBtn=null};if(MD.兔>=1){curBtn=null};if(MD.熊>=1){curBtn=null};if(MD.鹿>=1){curBtn=null}", "拔刀對抗": "=:if(MD.刀>=1)game_jumpto(\"熊有刀\")\n=:if(MD.刀==0)game_jumpto(\"熊無刀\")", "熊無刀": "(j)MD.名字(/j)哪有什麼刀！\n來不及躲藏，直接被撲過來的棕熊打飛了。\n=:if(MD.天數>=100)game_jumpto(\"熊無刀100\")\n=:MD.容貌-=3,MD.心-=2\n……超級痛啊。\n=:if(MD.大衣>=1)game_jumpto(\"大衣熊無刀\")\n體力減少25點，身上還留了疤。\n=:MD.體-=25\n=:if(MD.體<=0)game_jumpto(\"熊死\")\n=:MD.ran=random_int(1,10)\n=:if(MD.ran==5)game_jumpto(\"得到撕裂傷\")\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"逃跑掉繩\")\n跳：住處", "熊無刀100": "……山上的熊好像越來越強了。\n=:MD.容貌-=3,MD.心-=1\n=:if(MD.大衣>=1)game_jumpto(\"大衣熊百無刀\")\n體力減少50點，在身上留了疤。\n=:MD.體-=50\n=:if(MD.體<=0)game_jumpto(\"熊死\")\n=:MD.ran=random_int(1,5)\n=:if(MD.ran==3)game_jumpto(\"得到撕裂傷\")\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"逃跑掉繩\")\n跳：住處", "熊有刀": "(j)MD.名字(/j)立刻拔出武器，緩緩回頭，與出現在眼前的棕熊對峙。\n=:if(MD.天數>=100)game_jumpto(\"熊有刀100\")\n=:if(MD.武>30)game_jumpto(\"比熊強\")\n=:if(MD.武<=30)game_jumpto(\"比熊弱\")", "熊有刀100": "=:if(MD.武>160)game_jumpto(\"比熊強\")\n=:if(MD.武<=160)game_jumpto(\"比熊弱\")", "比熊強": "=:MD.ran=random_int(1,5)\n=:if(MD.ran==3)game_jumpto(\"意外輸給熊\")\n這些日子的磨練讓人長足體能與信心，(j)MD.名字(/j)手起刀落，將這噬人惡獸給解決了。\n=:MD.ran=random_int(1,3)\n=:MD.ran2=random_int(1,3)\n拿到(j)MD.ran(/j)塊生肉<imgsrc=\"https://i.imgur.com/cvfdlGC.png\">、(j)MD.ran2(/j)塊油脂<imgsrc=\"https://i.imgur.com/1ckcZ3p.png\">。\n體力減少5點，武力增加3點。\n=:MD.肉+=MD.ran,MD.體-=5,MD.心+=2,MD.油+=MD.ran2,MD.武+=3\n=:if(MD.遇熊數>30)game_jumpto(\"學會肉排\")\n跳：住處", "意外輸給熊": "可惡，今天狀態不佳的(j)MD.名字(/j)面對熊掌只能瘋狂閃躲，狼狽之間還受了點輕傷。\n=:MD.心-=1\n=:MD.體-=10\n體力減少10點。\n=:MD.ran=random_int(1,15)\n=:if(MD.ran==6)game_jumpto(\"輸熊撕裂傷\")\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"逃跑掉繩\")\n跳：住處", "輸熊撕裂傷": "咦，傷口比想像的大點……\n跳：得到撕裂傷", "比熊弱": "=:if(MD.天數>=100)game_jumpto(\"比熊弱100\")\n(j)MD.名字(/j)力氣不夠，持著刀勉強從熊掌下逃脫，卻一無所獲。\n=:MD.心-=1\n=:if(MD.大衣>=1)game_jumpto(\"大衣熊弱\")\n=:MD.體-=15\n體力減少15點。\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"逃跑掉繩\")\n跳：住處", "比熊弱100": "熊也變得好強，只能勉強從熊掌下逃脫，不但一無所獲，還受了重傷。\n=:MD.心-=2,MD.容貌-=2\n=:if(MD.大衣>=1)game_jumpto(\"大衣熊百弱\")\n體力減少30點。\n=:MD.體-=30\n=:if(MD.體<=0)game_jumpto(\"熊死\")\n=:MD.ran=random_int(1,10)\n=:if(MD.ran==5)game_jumpto(\"得到撕裂傷\")\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"逃跑掉繩\")\n跳：住處", "對熊吹箭": "=:if(MD.麻醉藥<1)game_jumpto(\"熊吹不足\")\n=:MD.麻醉藥-=1\n(j)MD.名字(/j)摸出放在口袋裡的吹箭，趁著大熊發出低吼的警告時吹出麻醉短針。\n咻──\n=:MD.ran=random_int(1,2)\n=:if(MD.ran==1)game_jumpto(\"熊吹不中\")\n毒針射進熊毛茸茸的前肢中，熊立刻搖搖晃晃起來。\n不一會，麻醉針完全生效，被激怒的熊還來不及撲過來，就已經正面倒地。\n(b)1(/b)(b)2(/b)\n选：現剝熊皮\n<:if(MD.刀<1){curBtn=null}\n选：帶熊回家", "現剝熊皮": "(j)MD.名字(/j)瞇起眼，心一橫的把熊給殺了。\n忍著血淋淋的氣味，(j)MD.名字(/j)拿著不算鋒利的刀子，開始了剝皮工作。\n=:MD.ran=random_int(1,2)\n=:MD.ran2=random_int(1,2)\n拿到(j)MD.ran(/j)塊生肉<imgsrc=\"https://i.imgur.com/cvfdlGC.png\">、(j)MD.ran2(/j)塊油脂<imgsrc=\"https://i.imgur.com/1ckcZ3p.png\">。\n得到了一件皮草。\n體力減少25點。\n=:MD.體-=25,MD.用時-=1,MD.皮草+=1,MD.肉+=MD.ran,MD.油+=MD.ran2\n跳：住處", "帶熊回家": "(j)MD.名字(/j)使用吃奶的力量，將熊五花大綁，拖回飼育屋。\n=:function获取(){MD.寵物=document.getElementById(\"z\").value}\n幫他取個名字。\n<inputid=\"z\"size=\"10\"style=\"border-radius:15px\"maxlength=\"10\">\n(b)1(/b)\n选：取好了", "取好了": "=:获取()\n失去了一管麻醉藥。\n體力減少25點。\n=:MD.體-=25,MD.用時-=1,MD.心+=2,MD.熊+=1,MD.寵肚=4,MD.寵愛=0\n跳：住處", "熊吹不中": "可惡，吹箭竟然射偏了，白白浪費了一管麻醉藥。\n不、現在重要的不是這個──\n跳：熊無刀", "熊吹不足": "糟糕！忘記麻醉藥已經沒有了。\n跳：熊無刀", "採集野草": "(j)MD.名字(/j)勤奮的在森林裡蒐集可用的植物。\n=:if(MD.刀>=1)game_jumpto(\"草有刀\")\n=:if(MD.刀==0)game_jumpto(\"草無刀\")", "草無刀": "沒有趁手的工具，(j)MD.名字(/j)一無所獲。\n(m)https://i.imgur.com/EMfS5ji.jpg(/m)\n體力減少5點。\n=:MD.體-=5,MD.心-=1,MD.用時-=1\n跳：住處", "草有刀": "用小刀俐落的劈砍草堆。\n(m)https://i.imgur.com/JW9RAfC.jpg(/m)\n=:MD.ran=random_int(5,8)\n<imgsrc=\"https://i.imgur.com/vEjOnz1.png\">(j)if(MD.用時==1)'<span style=\"color:#f0d080;font-style:italic;\">在午夜月光的臨沐中，發現了比往常更多的資源。</span>'(/j)\n=:if(MD.用時==1)MD.ran+=5\n終於蒐集到(j)MD.ran(/j)塊纖維。\n=:MD.草+=MD.ran,MD.體-=5,MD.用時-=1\n=:MD.ran=random_int(1,20)\n=:if(MD.ran==13)game_jumpto(\"發現鳳梨\")\n體力減少5點。\n跳：住處", "發現鳳梨": "在除完草的地面，(j)MD.ran(/j)發現了有著奇怪髮型的植物。\n(m)https://i.imgur.com/MFg95Gh.jpg(/m)\n是鳳梨！\n這種酸酸甜甜的水果滋味最棒了。\n(j)MD.ran(/j)小心的採下了1顆鳳梨。\n=:MD.鳳梨+=1\n體力減少5點。\n跳：住處", "撿拾小刀": "=:if(MD.刀>=1)game_jumpto(\"有刀\")\n=:if(MD.刀==0)game_jumpto(\"無刀\")", "有刀": "(j)MD.名字(/j)看到一把小刀插在獸穴邊。\n(m)https://i.imgur.com/nVN7v5H.jpg(/m)\n太危險了，(j)MD.名字(/j)最後決定放棄它。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "無刀": "(j)MD.名字(/j)在草叢中發現一個閃閃發光的物件。\n(m)https://i.imgur.com/eRS4aEw.jpg(/m)\n伸手一拔，獲得一把鋒利小刀。\n體力減少5點。\n=:MD.刀=1,MD.體-=5,MD.用時-=1,MD.心+=1\n跳：住處", "鍛鍊體能": "為了收集材料，(j)MD.名字(/j)在外東奔西跑。\n不知不覺中，身體的強度增加了。\n(m)https://i.imgur.com/mEdntGa.jpg(/m)\n=:MD.ran=random_int(3,4)\n武力值上升了(j)MD.ran(/j)點。\n體力減少5點。\n=:MD.武+=MD.ran,MD.體-=5,MD.用時-=1,MD.心+=1\n跳：住處", "食用野果": "(j)MD.名字(/j)發現了一株野生果樹。\n(m)https://i.imgur.com/lZS2Rk9.jpg(/m)\n=:MD.ran=random_int(2,4)\n<imgsrc=\"https://i.imgur.com/uWVYWEU.png\">(j)if(MD.用時==4)'<span style=\"color:#f0d080;font-style:italic;\">在清晨陽光的恩賜中，發現了比往常更多的資源。</span>'(/j)\n=:if(MD.用時==4)MD.ran+=5\n樹上的香甜果實引人垂涎，(j)MD.名字(/j)將完熟的(j)MD.ran(/j)顆果子往包包裡塞。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.果+=MD.ran\n跳：住處", "發現鳥蛋": "幸運地，(j)MD.名字(/j)在附近河邊發現了野禽的家，裡面有一些鳥蛋。\n(m)https://i.imgur.com/BLyJB6I.jpg(/m)\n=:MD.ran=random_int(3,4)\n<imgsrc=\"https://i.imgur.com/eUFgMCE.png\">(j)if(MD.用時==4)'<span style=\"color:#f0d080;font-style:italic;\">在清晨陽光的恩賜中，發現了比往常更多的資源。</span>'(/j)\n=:if(MD.用時==4)MD.ran+=5\n(j)MD.名字(/j)撿走了(j)MD.ran(/j)顆蛋，將其餘的部分留給鳥媽媽。\n=:MD.蛋+=MD.ran,MD.體-=5,MD.用時-=1\n=:MD.ran=random_int(1,20)\n=:if(MD.ran==12)game_jumpto(\"偶遇野鳥\")\n體力減少5點。\n跳：住處", "偶遇野鳥": "雖然他自認自己很是仁慈，但頭一抬，卻看到當事人正在一旁狠狠地盯著自己。\n(m)https://i.imgur.com/FCrXoAU.jpg(/m)\n=:if(MD.網>0)game_jumpto(\"抓住野鳥\")\n野鳥看起來真的很生氣啊，還是快走吧。\n跳：住處", "抓住野鳥": "被看得惱羞成怒的(j)MD.名字(/j)高舉蟲網，發出啊——的聲音朝鳥媽媽撲去！\n=:MD.ran=random_int(1,2)\n=:if(MD.ran==2)game_jumpto(\"抓鳥失敗\")\n網子罩住了鳥兒，憤怒又委屈的野鳥被(j)MD.名字(/j)給抓住處決了。\n獲得1塊珍貴的野鳥肉。\n=:MD.野鳥+=1\n跳：住處", "抓鳥失敗": "鳥媽媽一個拍翅，就從笨拙的(j)MD.名字(/j)身邊飛起，還嘲笑般的在他頭頂盤旋。\n噗的一聲，一坨溫熱的鳥大便就這樣掉在(j)MD.名字(/j)腦袋上。\n啊啊啊——氣死人了！\n跳：住處", "河邊釣魚": "=:MD.體-=5,MD.用時-=1\n因為人煙罕至，小河看上去很清澈。\n(m)https://i.imgur.com/QYKHy8g.jpg(/m)\n(b)1(/b)(b)2(/b)\n选:河邊拋竿\n选:下水探險", "河邊拋竿": "=:if(MD.釣竿==0)game_jumpto('釣竿無')\n跳：河邊釣竿有", "河邊釣竿有": "=:if(MD.餌==0)game_jumpto('魚餌無')\n(j)MD.名字(/j)在釣線上綁好魚餌，臨水拋竿垂釣。\n(m)https://i.imgur.com/PCFp4mq.jpg(/m)\n等:2|釣魚中。\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==2)game_jumpto('河邊釣魚失敗')\n=:if(MD.ran==6)game_jumpto('發現瓶中菜譜')\n=:MD.ran=random_int(1,2)\n<imgsrc=\"https://i.imgur.com/vEjOnz1.png\">(j)if(MD.用時==1)'<span style=\"color:#f0d080;font-style:italic;\">在午夜月光的臨沐中，釣到了比往常更多的魚獲。</span>'(/j)\n=:if(MD.用時==1)MD.ran+=3\n上鉤了！\n(j)MD.名字(/j)開心地把魚綁好，今晚加菜囉！\n=:MD.魚+=MD.ran,MD.心+=1,MD.餌-=1\n獲得鮮魚(j)MD.ran(/j)條。\n體力減少5點。\n跳：住處", "釣竿有": "=:if(MD.香餌==0)game_jumpto('香餌無')\n=:MD.香餌-=1\n勾上特製的魚餌，借助海風的力量把釣線遠遠的拋了出去。\n(m)https://i.imgur.com/PCFp4mq.jpg(/m)\n(j)game_createmsg(\"釣魚中。\",\"3\",\"left\",3)(/j)\n等:2|海面蕩漾。", "河邊釣魚失敗": "=:MD.心-=1,MD.餌-=1\n(j)MD.名字(/j)等了許久，魚兒遲遲沒有上鉤，只好放棄。\n體力減少5點。\n跳：住處", "釣竿無": "(j)MD.名字(/j)沒有釣竿。\n只能望著水面發愁。\n體力減少5點。\n跳：住處", "魚餌無": "要有魚餌才能釣魚。\n沒準備魚餌的(j)MD.名字(/j)，只能眼巴巴看著魚兒自在地泅水。\n體力減少5點。\n跳：住處", "下水探險": "(j)MD.名字(/j)大膽走進水深及膝的河中，彎腰摸索著河裡的寶藏。\n=:MD.ran=random_int(1,10)\n<marqueedirection=\"center\"scrollamount=\"7\">尋寶中。</marquee>\n等:2|真令人期待。\n=:if(MD.ran==1)game_jumpto('遇到鱷魚')\n=:if(MD.ran==2)game_jumpto('發現河蚌')\n=:if(MD.ran==3)game_jumpto('湖中女神')\n=:if(MD.ran==4)game_jumpto('發現河蚌')\n=:if(MD.ran==5)game_jumpto('遇到鱷魚')\n什麼都沒發現。\n=:MD.ran=random_int(1,15)\n=:if(MD.ran==10)game_jumpto(\"得到感冒\")\n跳：住處", "湖中女神": "水面化開一層蕩漾，一抹人影隨著輕煙從湖中浮現。\n(m)https://i.imgur.com/eN5P3ky.png(/m)\n「吾本是棲息在湖中的仙靈……擾了吾的安寧，便得獻上供品。」\n看著出現在眼前的女神，(j)MD.名字(/j)眼睛瞪大了。\n(b)1(/b)\n选:跪地求饒", "跪地求饒": "(j)MD.名字(/j)撲騰一跪表示自己無意冒犯。\n女神並沒有輕易放過他，神性的目光掃過(j)MD.名字(/j)渾身上下，幽幽地道。\n「此次便可饒恕你。但吾有試煉交付，你可願辦？」\n(j)MD.名字(/j)舉起雙手，信誓旦旦的表示一定遵從女神命令。\n(m)https://i.imgur.com/mfS4hYQ.png(/m)\n「……有趣的孩子。」\n女神唇邊露出淺淺的笑容，似乎接受了(j)MD.名字(/j)的誠心道歉。\n隨之沉入水底。\n……怎麼回事？\n=:MD.心+=1\n跳：住處", "鱷魚吃蜥": "=:MD.ran=random_int(1,2)\n=:if(MD.ran==2)game_jumpto(\"返鱷判\")\n(j)MD.名字(/j)想起自己身上帶著蜥蜴，抓起誘餌就往鱷魚臉上投去！\n視力不好的巨獸一口咬住了蜥蜴，也不再追擊(j)MD.名字(/j)！\n(j)MD.名字(/j)趁機回頭往岸上爬。\n──雖然嗆了點水，能逃出生天已經夠幸運了。\n體力減少15點，失去了1尾蜥蜴，智力加3點。\n=:MD.體-=10,MD.蜥蜴-=1,MD.心+=1,MD.智+=3\n跳：住處", "遇到鱷魚": "(j)MD.名字(/j)看見遠處水面上一雙閃著森冷寒光的眼睛正瞪著自己，還不及細想，那道森光已經疾速朝自己游來。\n=:MD.遇鱷數+=1\n那是一隻河鱷！\n(m)https://i.imgur.com/SMl0lSK.jpg(/m)\n(j)MD.名字(/j)使盡吃奶之力往岸邊逃竄，一時間水花四濺，河鱷張開血盆大口咬了過來！\n=:if(MD.矛>0)game_jumpto(\"鱷魚有矛\")\n=:if(MD.蜥蜴>=1)game_jumpto(\"鱷魚吃蜥\")", "返鱷判": "──！\n屁股被狠狠咬了一口，(j)MD.名字(/j)狼狽地上了岸。\n=:MD.容貌-=5,MD.心-=4\n=:if(MD.大衣>=1)game_jumpto(\"大衣鱷魚\")\n體力減少55點，身上恐怕會留下一道醜疤。\n=:MD.體-=50\n=:if(MD.體<=0)game_jumpto(\"河鱷死\")\n=:MD.ran=random_int(1,5)\n=:if(MD.ran==3)game_jumpto(\"得到撕裂傷\")\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"鱷魚掉繩\")\n跳：住處", "鱷魚有矛": "猶豫就會敗北！\n(j)MD.名字(/j)立刻舉起手中長矛，狠狠往鱷魚喉間刺去！\n──！\n=:MD.ran=random_int(1,3)\n=:if(MD.ran<2)game_jumpto(\"輸給鱷魚\")", "打敗鱷魚": "電光石火之間，鋒利的長矛穿透鱷魚柔軟的內臟，鱷魚掙扎著翻滾了幾圈，終於沉沒了。\n=:MD.心+=3\n=:if(MD.刀==0)game_jumpto(\"沒有鱷皮\")\n(j)MD.名字(/j)使勁吃奶的力氣，抓住鱷魚尾巴將牠拖上岸邊。\n確認鱷魚完全沒了氣息，(j)MD.名字(/j)便用小刀將鱷魚皮小心翼翼的割了下來。\n拿到1塊完整的鱷魚皮。\n(m)https://i.imgur.com/YFiBJxL.jpg(/m)\n=:MD.鱷皮+=1\n連帶取得了1塊珍貴的鱷魚肉(/5。\n體力減少5點，武力增加5點。\n=:MD.鱷魚+=1,MD.武+=5\n跳：住處", "沒有鱷皮": "(j)MD.名字(/j)沒有刀具，無法剝下珍貴的鱷魚皮。\n體力減少5點。\n跳：住處", "輸給鱷魚": "(j)MD.名字(/j)失誤了，刺出的長矛被鱷魚躲開！\n喀擦！鱷魚咬斷了長矛的棍身，眼看就要再發動攻擊！\n(j)MD.名字(/j)顧不得分出勝負，連滾帶爬的往岸邊衝。\n逃的夠快，只被咬了一小口，但消耗了大量的體力。\n=:MD.矛=0,MD.心-=2,MD.容貌-=1\n失去了長矛。\n=:if(MD.大衣>=1)game_jumpto(\"大衣鱷矛斷\")\n體力減少35點。\n=:MD.體-=30\n=:if(MD.體<=0)game_jumpto(\"河鱷死\")\n=:MD.ran=random_int(1,5)\n=:if(MD.ran==3)game_jumpto(\"得到撕裂傷\")\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"鱷魚掉繩\")\n跳：住處", "發現河蚌": "手中傳來堅硬的觸感，(j)MD.名字(/j)從河裡舉起戰利品。\n(m)https://i.imgur.com/KugP37Z.png(/m)\n是個超大的河蚌，不知道裡面會不會有珍珠？\n體力減少5點。\n=:MD.心+=1,MD.貝+=1\n跳：住處", "發現瓶中菜譜": "釣竿傳來沉重的觸感，(j)MD.名字(/j)從河裡拉起戰利品。\n(m)https://i.imgur.com/gh004p2.jpg(/m)\n是一只瓶中信！\n=:if(MD.智<=50)game_jumpto(\"看不懂瓶中菜譜\")", "瓶中菜譜判斷": "=:MD.ran=random_int(1,20)\n=:if(MD.ran==8)game_jumpto(\"學會蝦球\")\n=:if(MD.ran==10)game_jumpto(\"學會綠飲\")\n跳：看不懂瓶中菜譜", "看不懂瓶中菜譜": "瓶口的木塞已腐化，河水滲進了瓶中。\n任憑(j)MD.名字(/j)怎麼看，也看不懂那些泡糊的文字。\n體力減少5點。\n跳：住處", "發現野菇": "因為前個雨季的澆灌，鄰近的林間草地長出了一朵朵各色野菇。\n(m)https://i.imgur.com/WKQVY8m.jpg(/m)\n=:if(MD.智<=10)game_jumpto('失智香菇')\n=:MD.ran=random_int(2,4)\n<imgsrc=\"https://i.imgur.com/6iK6Hvm.png\">(j)if(MD.用時==4)'<span style=\"color:#f0d080;font-style:italic;\">在清晨陽光的恩賜中，發現了比往常更多的資源。</span>'(/j)\n=:if(MD.用時==4)MD.ran+=5\n憑著這些日子疊加的經驗，仔細揀選出可食用的(j)MD.ran(/j)朵草菇，放進簍子裡。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.菇+=MD.ran\n跳：住處", "失智香菇": "(j)MD.名字(/j)沒有辦法辨認出哪些香菇有毒、哪些可以食用，只好暫時撤退。\n得想辦法增加辨別的能力了。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "發現野蕨": "一大片野蕨出現在(j)MD.名字(/j)的視野中。\n(m)https://i.imgur.com/qFEeZFx.jpg(/m)\n=:MD.ran=random_int(1,2)\n<imgsrc=\"https://i.imgur.com/NWcSIHq.png\">(j)if(MD.用時==2)'<span style=\"color:#f0d080;font-style:italic;\">在夕陽溫柔的擁護中，發現了比往常更多的資源。</span>'(/j)\n=:if(MD.用時==2)MD.ran+=5\n抱著珍惜的心採下可食用的(j)MD.ran(/j)份嫩蕨，可以吃得更健康了。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.蕨+=MD.ran\n跳：住處", "發現蜂巢": "(j)MD.名字(/j)發現了一座蜂巢。\n(m)https://i.imgur.com/hDWXd8Q.jpg(/m)\n只要有蜂蜜──就能替食物添加風味！\n(b)1(/b)(b)2(/b)\n选：跟他拚了\n选：暫時撤退", "跟他拚了": "=:if(MD.智<=30)game_jumpto(\"笨死蜜蜂\")\n=:MD.ran=random_int(1,3)\n=:if(MD.ran==2)game_jumpto(\"笨死蜜蜂\")\n=:if(MD.用時==3)MD.ran+=5\n「野地一千零一夜」內紀載了不挑起蜜蜂情緒的方法。\n<imgsrc=\"https://i.imgur.com/BjVNpU2.png\">(j)if(MD.用時==3)'<span style=\"color:#f0d080;font-style:italic;\">在艷陽高照的燦爛中，發現了比往常更多的資源。</span>'(/j)\n(j)MD.名字(/j)遵循古法接近蜂窩，小心翼翼地刮下了(j)MD.ran(/j)份蜂巢蜜。\n大獲成功！\n體力減少5點，智力增加2點。\n=:MD.體-=5,MD.用時-=1,MD.心+=1,MD.蜜+=MD.ran,MD.智+=2\n=:MD.ran=random_int(1,20)\n=:if(MD.ran==17)game_jumpto(\"蜂霜藥方\")\n=:MD.ran=random_int(1,25)\n=:if(MD.ran==10)game_jumpto(\"得到疼痛\")\n跳：住處", "笨死蜜蜂": "莽撞的靠近蜂巢，最後驚動了工蜂們。\n發現大事不妙的(j)MD.名字(/j)拚命往河邊跑，在千鈞一髮之際跳入河裡。\n終於躲過蜜蜂了，但一番折騰下耗費了大量力氣。\n體力減少25點。\n=:MD.體-=25,MD.用時-=1,MD.心-=1\n=:MD.ran=random_int(1,10)\n=:if(MD.ran==5)game_jumpto(\"得到疼痛\")\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"河流掉繩\")\n跳：住處", "暫時撤退": "(j)MD.名字(/j)沒有把握戰勝蜜蜂，只得暫時撤退。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "發現螃蟹": "(j)MD.名字(/j)在海邊遇到一群神態囂張的螃蟹。\n(m)https://i.imgur.com/iBunqCN.jpg(/m)\n=:if(MD.智<=15)game_jumpto('失智螃蟹')\n=:MD.ran=random_int(1,3)\n=:if(MD.ran==2)game_jumpto('失智螃蟹')\n<imgsrc=\"https://i.imgur.com/vEjOnz1.png\">(j)if(MD.用時==3)'<span style=\"color:#f0d080;font-style:italic;\">在艷陽高照的燦爛中，發現了比往常更多的資源。</span>'(/j)\n=:if(MD.用時==3)MD.ran+=5\n哼，論氣勢也是不會輸的！\n(j)MD.名字(/j)以迅雷不及掩耳的速度抓住了(j)MD.ran(/j)隻螃蟹，要把他們帶回家好好調教。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.蟹+=MD.ran\n跳：住處", "失智螃蟹": "(j)MD.名字(/j)無法預料螃蟹的動向，硬生生讓螃蟹們從眼皮子底下溜了。\n真丟臉。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "採集海草": "今天的目標是搜尋海藻和海菜。\n(m)https://i.imgur.com/UOcNoZC.jpg(/m)\n=:if(MD.刀>=1)game_jumpto(\"海草有刀\")\n=:if(MD.刀==0)game_jumpto(\"海草無刀\")", "海草無刀": "為了採收滑溜溜的海帶，需要銳利的刀具來輔助。(j)MD.名字(/j)做的準備不夠充分，只好空手而歸。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "海草有刀": "(j)MD.名字(/j)的腳浸在沁涼的海水中，十分舒心。\n=:MD.ran=random_int(1,3)\n<imgsrc=\"https://i.imgur.com/vEjOnz1.png\">(j)if(MD.用時==1)'<span style=\"color:#f0d080;font-style:italic;\">在午夜月光的臨沐中，發現了比往常更多的資源。</span>'(/j)\n=:if(MD.用時==1)MD.ran+=5\n勤快的勞動下，很快就採到了(j)MD.ran(/j)份海草。\n(m)https://i.imgur.com/mjLnVJ5.jpg(/m)\n因為很涼快，並不怎麼費體力。\n=:MD.用時-=1,MD.藻+=MD.ran\n跳：住處", "海邊釣魚": "=:MD.體-=5,MD.用時-=1\n帶著鹹味的海風呼呼吹來，讓人精神一振。\n(m)https://i.imgur.com/tkdviCL.jpg(/m)\n(b)1(/b)(b)2(/b)\n选:拋竿\n选:離開", "拋竿": "=:if(MD.釣竿==0)game_jumpto('釣竿無')\n跳：釣竿有", "釣魚中": "=:MD.ran=random_int(1,20)\n=:if(MD.ran==20)game_jumpto('水母上鉤')\n=:if(MD.ran==19)game_jumpto('人魚上鉤')\n=:if(MD.ran==18)game_jumpto('河豚上鉤')\n=:if(MD.ran==17)game_jumpto('巨魚上鉤')\n=:if(MD.ran>=13)game_jumpto('鮮蝦上鉤')\n=:if(MD.ran==12)game_jumpto('魚人上鉤')\n=:if(MD.ran>=10)game_jumpto('破鞋上鉤')\n=:if(MD.ran==6)game_jumpto('海邊釣魚失敗')\n=:MD.ran=random_int(3,5)\n上鉤了！\n收穫頗豐，一次釣上了(j)MD.ran(/j)尾魚，心情美孜孜呢。\n(m)https://i.imgur.com/ETALH43.jpg(/m)\n=:MD.心+=1,MD.魚+=MD.ran\n獲得鮮魚(j)MD.ran(/j)條。\n體力減少5點。\n跳：住處", "鮮蝦上鉤": "這是什麼？重量不太像魚……居然釣上了蝦子！\n(m)https://i.imgur.com/zVNJMpf.jpg(/m)\n好吧。偶爾換換口味，嚐嚐蝦味鮮也不錯。\n=:MD.ran=random_int(2,3)\n=:MD.蝦+=MD.ran\n獲得鮮蝦(j)MD.ran(/j)隻。\n體力減少5點。\n跳：住處", "魚人上鉤": "=:if(MD.魔鍊<1)game_jumpto(\"釣魚中\")\n「喂……人類……」\n(j)MD.名字(/j)被突然浮出水面的臉給嚇著了。\n(m)https://i.imgur.com/jkuLHWB.jpg(/m)\n那張臉像魚又像人，看上去非常詭異。\n「真好啊，長的真美啊，居然有那麼美麗的項鍊呢，是人魚給你的吧……」\n這個半人半魚的生物面露凶光，帶蹼的手指攀在了沿岸。\n「真的好羨慕啊──」\n(j)MD.名字(/j)覺得不大對勁，這個生物跟先前的人魚完全不同，帶著滿滿的惡意。\n在對方張開血盆大口拉著釣線攀上沿岸之前，(j)MD.名字(/j)果斷的切斷釣線，拔腿就跑。\n「嘎嘎嘎嘎嘎嘎──」\n魚人的利齒在身後發出劇烈的咬合聲，要是(j)MD.名字(/j)逃得慢了點，恐怕就要被撕碎了。\n=:MD.體-=15,MD.釣竿-=1\n被魚人嚇得倉皇逃生，消耗了15點體力，釣竿也壞掉了。\n今日不宜釣魚！\n跳：住處", "人魚上鉤": "=:if(MD.珍珠<50)game_jumpto(\"釣魚中\")\n=:if(MD.魔鍊==1)game_jumpto(\"釣魚中\")\n「嗚嗚嗚……好痛……」\n(j)MD.名字(/j)聽見水面下傳來屬於人類的哭聲，不禁大吃一驚。\n(m)https://i.imgur.com/NFgIDX9.jpg(/m)\n只見一頭燦金長髮的少年在水中載浮載沉，再往海中望去，對方的下半身居然是魚尾！\n「因為我太貪吃，才會被銳利的魚鉤勾住了尾巴。」\n原本僅存於童話中的美人魚，正露出委屈兮兮的表情瞧著(j)MD.名字(/j)，模樣相當可憐。\n「人類啊，能不能讓我回家呢，作為交換，我把我最寶貝的東西送給你。」\n(j)MD.名字(/j)不經多想便點了點頭。這尾活人魚釣上來也不可能吃掉，本來就要放歸海中的。\n小心翼翼把人魚尾巴上的魚鉤給取下，不再疼痛的人魚少年快樂地眨巴著眼睛，伏在石頭上看著(j)MD.名字(/j)。\n「好心的人類，這是給你的回禮。」\n人魚伸出手，彷彿早知道(j)MD.名字(/j)口袋放滿了珍珠似的逕自取出了一把。\n接著他拔下一根金色髮絲，將珍珠串成了一條美麗的項鍊，並用絲滑柔嫩的手將項鍊撫過，親自為(j)MD.名字(/j)戴上。\n「這條項鍊將讓你永保青春美麗，這是我們人魚族的魔法。」\n(j)MD.名字(/j)驚訝地摸了摸脖子，更發現渾身的傷痕都不見了，肌膚變得跟人魚一樣白皙柔嫩。\n再趴到水面一看，水面的自己容貌出眾，光彩照人，與過去的自己有如雲泥之別。\n人魚少年和(j)MD.名字(/j)問了名字，隨即潛回了水中，接著又從不遠處的海面躍出。\n「掰掰、(j)MD.名字(/j)！」\n掰掰，別再傻呼呼被釣上岸了。\n=:MD.容貌=5555,MD.魔鍊=1,MD.珍珠-=50\n(j)MD.名字(/j)的50顆珍珠被做成了項鍊。\n獲得了人魚的魔法項鍊，(j)MD.名字(/j)驚人的美貌將不再因為外力而褪色。\n跳：住處", "巨魚上鉤": "好沉……好大的一尾魚！\n(m)https://i.imgur.com/difMyJn.jpg(/m)\n大魚剛被捕獲，正是鮮美可口。\n(j)MD.名字(/j)趁鮮享用，就地把大魚切成嫩厚生魚片，好好地吃飽喝足了。\n=:MD.腹=100\n滿腹度達到了100點！\n體力減少5點。\n跳：住處", "破鞋上鉤": "嘿咻──呃！\n(m)https://i.imgur.com/vLltsTb.jpg(/m)\n居然釣上一隻破鞋。\n體力減少5點。\n=:MD.心-=1\n跳：住處", "河豚上鉤": "伴隨噗通一聲，一個圓滾滾的小東西被拉出海面！\n(m)https://i.imgur.com/DKhYNg1.jpg(/m)\n唔哇，居然釣到河豚了，運氣真不賴。\n河豚好好處理的話，不僅滋味鮮美，從中萃取毒液做麻醉藥更是最方便的了。\n先這樣再這樣──(j)MD.名字(/j)順利得到了一管麻醉藥！\n連帶取得了1塊珍貴的河豚肉。\n=:MD.麻醉藥+=1,MD.河豚+=1\n體力減少5點。\n跳：住處", "水母上鉤": "(j)MD.名字(/j)以手去抓釣上岸的漁獲，手掌突然一陣劇痛！\n(m)https://i.imgur.com/ywiKSvd.jpg(/m)\n原來是水母，(j)MD.名字(/j)被觸手刺到了。\n好痛……幸好，這品種的水母毒性較弱。\n(j)MD.名字(/j)因為被水母刺傷，體力減少7點。\n=:MD.體-=2,MD.心-=1\n跳：住處", "海邊釣魚失敗": "強勁的海流在魚兒上鉤之前就把香餌摧殘的一點不剩。\n(j)MD.名字(/j)很彆屈，但也無可奈何。\n體力減少5點。\n=:MD.心-=1\n跳：住處", "香餌無": "都忘了，要使用特製的香餌才能在海邊釣魚。\n(j)MD.名字(/j)的準備不夠充分，眼下還是先撤退吧。\n體力減少5點。\n跳：住處", "蜥蜴咬傷": "=:MD.ran=random_int(1,2)\n=:if(MD.ran==1)game_jumpto(\"發現蜥蜴\")\n(j)MD.名字(/j)走在小徑上，忽然被藏在草叢中的蜥蜴狠咬了一口。\n(m)https://i.imgur.com/YXKq4k6.jpg(/m)\n=:MD.ran=random_int(6,12)\n嘶，好疼啊！\n還在身上留了疤。\n體力減少(j)MD.ran(/j)點。\n=:MD.容貌-=2,MD.心-=1,MD.用時-=1,MD.體-=MD.ran,MD.遇蜥數+=1\n=:if(MD.體<=0)game_jumpto(\"蜥蜴死\")\n=:MD.ran=random_int(1,80)\n=:if(MD.ran==35)game_jumpto(\"得到感染\")\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"蜥蜴掉繩\")\n跳：住處", "發現蜥蜴": "(j)MD.名字(/j)走在小徑上，忽然發現一隻不懷好意的蜥蜴。\n(m)https://i.imgur.com/YXKq4k6.jpg(/m)\n=:if(MD.網<1)game_jumpto(\"蜥蜴沒有蟲網\")\n幸虧今天帶了蟲網出門，對付這狡猾小東西綽綽有餘。\n呼叱！\n(j)MD.名字(/j)把網子朝著草叢用力一蓋，朝著還沒反應過來的蜥蜴突擊！\n=:MD.ran=random_int(1,6)\n=:if(MD.ran==3)game_jumpto(\"蜥蜴逃跑\")\n=:MD.體-=5,MD.用時-=1,MD.蜥蜴+=1,MD.心+=3,MD.遇蜥數+=1,MD.智+=1\n好啊！這下看是誰倒楣吧。\n(m)https://i.imgur.com/xzS0eUk.png(/m)\n得到1隻蜥蜴，體力減少5點，智力增加1點。\n跳：住處", "蜥蜴逃跑": "蜥蜴也不是省油的燈，居然從蟲網和草地的縫隙中竄了出來，一瞬間就逃逸無蹤。\n啊──可惡，可惡！\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.心-=3,MD.遇蜥數+=1\n跳：住處", "蜥蜴沒有蟲網": "(j)MD.名字(/j)沒有蟲網。\n蜥蜴似乎察覺了(j)MD.名字(/j)的念頭，先下嘴為強的咬了一口！\n=:MD.ran=random_int(4,6)\n=:MD.體-=MD.ran,MD.用時-=1,MD.容貌-=1,MD.心-=4,MD.遇蜥數+=1\n可惡啊！\n(j)MD.名字(/j)身上留了疤。\n體力減少(j)MD.ran(/j)點。\n=:if(MD.體<=0)game_jumpto(\"蜥蜴死\")\n=:MD.ran=random_int(1,30)\n=:if(MD.ran==15)game_jumpto(\"得到感染\")\n跳：住處", "發現野兔": "在草原上發現了野兔的身影。\n(m)https://i.imgur.com/xxZZRaJ.jpg(/m)\n=:if(MD.設陷==1)game_jumpto(\"查看陷阱\")\n=:if(MD.陷阱==1)game_jumpto(\"設置陷阱\")\n小兔子逃竄的速度太快了，根本就追不上。\n一番折騰後，(j)MD.名字(/j)撿到了兔子遺落的糧食，2顆野果。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.果+=2\n跳：住處", "設置陷阱": "=:if(MD.設陷==1)game_jumpto(\"查看陷阱\")\n(j)MD.名字(/j)將準備好的陷阱安設在兔子窩邊，就等莽撞的小東西自投羅網。\n體力減少5點，智力增加1點。\n=:MD.體-=5,MD.用時-=1,MD.設陷=1,MD.智+=1\n跳：住處", "查看陷阱": "回到了設置兔子陷阱的位置。\n=:MD.ran=random_int(1,2)\n=:if(MD.ran==1)game_jumpto(\"陷阱空空\")\n陷阱裡有東西！\n(j)MD.名字(/j)上前拆除陷阱，果然發現了一隻毛茸茸的野兔。\n(b)1(/b)(b)2(/b)\n选:殺兔取肉\n选:帶走兔子\n<:if(MD.屋<3){curBtn=null};if(MD.鴿==1){curBtn=null};if(MD.兔>=1){curBtn=null};if(MD.熊>=1){curBtn=null};if(MD.鹿>=1){curBtn=null}", "殺兔取肉": "(j)MD.名字(/j)結束了兔子的生命，獲得2塊生肉，1塊油脂。\n體力減少5點。\n=:MD.肉+=2,MD.油+=1,MD.用時-=1,MD.設陷=0,MD.體-=5,MD.陷阱=0\n跳：住處", "帶走兔子": "暫時留著野兔吧，餵一些乾草應該就能養活了。\n(j)MD.名字(/j)把兔子綁好，放進背包裏。\n=:MD.兔+=1,MD.用時-=1,MD.設陷=0,MD.體-=5,MD.陷阱=0,MD.寵肚=4,MD.寵愛=0\n=:function获取(){MD.寵物=document.getElementById(\"j\").value}\n幫他取個名字。\n<inputid=\"j\"size=\"10\"style=\"border-radius:15px\"maxlength=\"10\">\n(b)1(/b)\n选：決定了", "決定了": "=:获取()\n體力減少5點。\n跳：住處", "陷阱空空": "裏頭居然是空的，還有被掙脫的痕跡，這個陷阱已經壞了。\n體力減少5點。\n=:MD.用時-=1,MD.設陷=0,MD.體-=5,MD.陷阱=0,MD.心-=1\n跳：住處", "吹進海裡": "海邊的風又大又猛，一時不備，(j)MD.名字(/j)整個人竟被吹下海！\n(m)https://i.imgur.com/j7FzWNj.png(/m)\n=:MD.ran=random_int(12,21)\n=:MD.用時-=1,MD.心-=2,MD.體-=MD.ran,MD.掉水數+=1\n體力減少(j)MD.ran(/j)點。\n=:MD.ran=random_int(1,10)\n=:if(MD.ran==5)game_jumpto(\"得到感冒\")\n=:if(MD.ran==8)game_jumpto(\"巡覓水中\")\n吃了好幾口海水才勉強爬上岸，渾身濕透發冷，還是趕緊離開吧。\n跳：住處", "巡覓水中": "禍福參半，被這樣甩入海中，竟發現了一處平時難以到達的海底蝕穴。\n(b)1(/b)(b)2(/b)(b)3(/b)\n选:潛入蝕穴\n选:返回住處", "潛入蝕穴": "(j)MD.名字(/j)潛入了冰冷的海中，接著……\n=:MD.ran=random_int(1,10)\n=:if(MD.ran==5)game_jumpto(\"遇到鯊魚\")\n=:if(MD.ran==8)game_jumpto(\"找到鮑魚\")\n什麼也沒發現。\n吃了好幾口海水才勉強爬上岸，渾身濕透發冷，還是趕緊離開吧。\n跳：住處", "找到鮑魚": "發現了！碩大的鮑魚正緊緊貼著一塊岩壁。\n(m)https://i.imgur.com/H5hEJDQ.jpg(/m)\n(j)MD.名字(/j)謹記生態循環的重要性，抓了一塊鮑魚便游回岸上。\n獲得了1隻珍貴的鮑魚。\n個頭倒不小，在餐廳吃上這麼一塊，恐怕所費不貲呢……\n=:MD.鮑魚+=1\n跳：住處", "遇到鯊魚": "=:MD.遇鯊數+=1\n像要和(j)MD.名字(/j)作對似的，一隻鯊魚出現在眼前。\n(m)https://i.imgur.com/vliM9q2.jpg(/m)\n(b)1(/b)(b)2(/b)(b)3(/b)\n选:奮起反抗\n<:if(MD.矛<1){curBtn=null}\n选:拼命逃脫", "奮起反抗": "(j)MD.名字(/j)高舉起矛，犀利的盯著眼前的龐然巨獸。\n電光火石之間，鯊魚率先發難，牠朝著(j)MD.名字(/j)迅猛的衝了過來！\n鍛鍊多時的(j)MD.名字(/j)可不是軟弱的沙丁魚，他順著水流避開了鯊魚的攻勢，等鯊魚回頭的時機，把矛狠狠的刺入鯊魚的眼窩中！\n鮮血快速染紅了周邊的海水，鯊魚痛苦的掙扎著，但此刻的(j)MD.名字(/j)沒有憐憫的意思。\n抽出長矛，刺入長矛！\n來回數次後，鯊魚的性命終於被終結了。\n=:if(MD.刀<1)game_jumpto(\"鯊魚無刀\")\n(j)MD.名字(/j)抽出小刀，在血水引來更多危機之前，割下了鯊魚身上可食用的部位。\n獲得1塊珍貴的鯊魚肉。\n=:MD.鯊魚+=1\n氣力用盡的(j)MD.名字(/j)勉強爬上岸，渾身濕透發冷，還是趕緊離開吧。\n跳：住處", "鯊魚無刀": "身上沒帶利器，否則就能得到鯊魚肉了。\n略感遺憾的(j)MD.名字(/j)勉強爬上岸，渾身濕透發冷，趕緊離開了。\n跳：住處", "拼命逃脫": "(j)MD.名字(/j)使出了吃奶的力量向上游，倉皇間屁股被鯊魚狠狠咬了一口！\n──媽媽！\n(j)MD.名字(/j)在劇痛中狼狽地爬上了沙灘。\n=:MD.容貌-=5,MD.心-=4\n體力減少60點，蜜桃屁上恐怕會留下一道醜疤。\n=:MD.體-=60\n=:if(MD.體<=0)game_jumpto(\"鯊魚死\")\n=:MD.ran=random_int(1,5)\n=:if(MD.ran==3)game_jumpto(\"得到撕裂傷\")\n=:MD.ran=random_int(1,7)\n=:if(MD.ran==1)game_jumpto(\"海灘掉繩\")\n跳：住處", "遇見野鹿": "(j)MD.名字(/j)在林野中悠閒地散步，一回頭，與一雙靈動的大眼睛對視了。\n(m)https://i.imgur.com/RwgmaZE.jpg(/m)\n一頭母鹿謹慎地看著(j)MD.名字(/j)，似乎在思考下一步該逃或留。\n(b)1(/b)(b)2(/b)(b)3(/b)\n选:餵食野果\n选:拔刀相對\n选:對鹿吹箭\n<:if(MD.屋<3){curBtn=null};if(MD.鴿==1){curBtn=null};if(MD.兔>=1){curBtn=null};if(MD.熊>=1){curBtn=null};if(MD.鹿>=1){curBtn=null}", "餵食野果": "=:if(MD.果<1)game_jumpto(\"野鹿無果\")\n(j)MD.名字(/j)把果子捧在手掌心，朝著母鹿伸出了手。\n母鹿的耳朵動了一下，竟異常乖順的靠了過來。\n(j)MD.名字(/j)趁母鹿忙著嚼食野果，拿出準備好的容器，跪在母鹿身前蒐集鹿奶。\n=:MD.ran=random_int(2,3)\n成功了，(j)MD.名字(/j)順利收集到(j)MD.ran(/j)份鹿乳。\n體力減少5點，智力增加1點。\n=:MD.體-=5,MD.用時-=1,MD.果-=1,MD.心+=2,MD.乳+=MD.ran,MD.智+=1\n跳：住處", "野鹿無果": "(j)MD.名字(/j)沒有足夠的果子來餵養母鹿，在猶豫之中，母鹿已經跑開了。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "拔刀相對": "=:if(MD.刀<1)game_jumpto(\"野鹿逃跑\")\n=:MD.ran=random_int(1,2)\n=:if(MD.ran==1)game_jumpto(\"野鹿閃避\")\n人不為己，天誅地滅。\n(j)MD.名字(/j)假裝把果子捧在手掌心，朝著母鹿伸出了手。\n母鹿的耳朵動了一下，竟異常乖順的靠了過來。\n(j)MD.名字(/j)趁母鹿不注意，拿出準備好的小刀，朝母鹿的頸子揮去──！\n……對不起。\n(j)MD.名字(/j)默默將取得的2份生肉<imgsrc=\"https://i.imgur.com/cvfdlGC.png\">和1份油脂<imgsrc=\"https://i.imgur.com/1ckcZ3p.png\">收進袋子裡。\n體力減少5點，武力增加1點。\n=:MD.體-=5,MD.用時-=1,MD.心-=3,MD.肉+=2,MD.油+=1,MD.武+=1\n跳：住處", "野鹿逃跑": "沒有趁手的利器，(j)MD.名字(/j)無法制服野鹿，一會兒便追得氣喘吁吁，依然讓母鹿跑了。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "野鹿閃避": "糟了，(j)MD.名字(/j)一時分神讓母鹿奪了空，從身旁跑了。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.心-=1\n跳：住處", "對鹿吹箭": "=:if(MD.吹箭<1||MD.麻醉藥<1)game_jumpto(\"鹿吹不足\")\n(j)MD.名字(/j)摸出放在口袋裡的吹箭，趁著母鹿猶豫的瞬間吹出帶有麻醉藥的短針。\n咻──\n=:MD.ran=random_int(1,2)\n=:if(MD.ran==1)game_jumpto(\"鹿吹不中\")\n毒針穩穩地射進母鹿的身體裡，母鹿暈厥了。\n(b)1(/b)(b)2(/b)\n选：現剝鹿皮\n<:if(MD.刀<1){curBtn=null}\n选：帶鹿回家", "現剝鹿皮": "想到如此靈性的生物就要葬送在自己手裡，(j)MD.名字(/j)有些於心不忍。\n都是為了生存，(j)MD.名字(/j)拿起武器給了鹿頸一刀，便開始了剝皮工作。\n得到1塊生肉<imgsrc=\"https://i.imgur.com/cvfdlGC.png\">。\n得到1件皮草。\n體力減少25點。\n=:MD.體-=25,MD.用時-=1,MD.皮草+=1,MD.肉+=1\n跳：住處", "帶鹿回家": "(j)MD.名字(/j)使用吃奶的力量，將鹿拖回飼育屋豢養起來。\n=:function获取(){MD.寵物=document.getElementById(\"y\").value}\n幫他取個名字。\n<inputid=\"y\"size=\"10\"style=\"border-radius:15px\"maxlength=\"10\">\n(b)1(/b)\n选：就這個", "就這個": "=:获取()\n失去了一管麻醉藥。\n體力減少25點。\n=:MD.體-=25,MD.用時-=1,MD.麻醉藥-=1,MD.心+=2,MD.鹿+=1,MD.寵肚=4,MD.寵愛=0\n跳：住處", "鹿吹不中": "可惡，吹箭竟然射偏了，母鹿立刻拔腿逃開。\n失去了一管麻醉藥。\n體力減少10點。\n=:MD.體-=10,MD.用時-=1,MD.麻醉藥-=1\n跳：住處", "鹿吹不足": "(j)MD.名字(/j)沒有足夠的道具來麻醉母鹿，在猶豫之中，母鹿已經跑遠了。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "發現生薑": "(j)MD.名字(/j)聞到了一股清香味。\n低下頭，原來是一株開著松果狀小花的植物。\n(m)https://i.imgur.com/7NZvyX3.jpg(/m)\n=:if(MD.智<30)game_jumpto(\"不識生薑\")\n=:if(MD.刀<1)game_jumpto(\"無刀挖薑\")\n好像在「野地一千零一夜」中讀過，這就是生薑的花吧。\n(j)MD.名字(/j)興奮地蹲了下來，用手中的小刀挖起土壤。\n皇天不負苦心人，終於讓(j)MD.名字(/j)挖到了1塊生薑。\n(m)https://i.imgur.com/s1C8nC8.jpg(/m)\n體力減少5點，智力增加1點。\n=:MD.體-=5,MD.用時-=1,MD.薑+=1,MD.智+=1\n跳：住處", "不識生薑": "看著小小的植物奮力茁壯成長，開出花來，(j)MD.名字(/j)提起精神了。\n體力增加5點。\n=:MD.體+=5,MD.用時-=1,MD.心+=3\n跳：住處", "無刀挖薑": "(j)MD.名字(/j)認出這是大名鼎鼎的薑花。\n想挖起埋在地底的塊根，卻因為沒有趁手的工具，最後失敗告終。\n體力增加5點。\n=:MD.體+=5,MD.用時-=1\n跳：住處", "發現藥草": "=:if(MD.智<50)game_jumpto(\"山區\")\n俗話說書中自有黃金屋，雖然荒原上一開始只有破屋，但(j)MD.名字(/j)靠著閱讀充實了自己的心靈，比過去更加見多識廣。\n就像現在，(j)MD.名字(/j)就認出了眼前的植物，是一種珍貴的藥草。\n(m)https://i.imgur.com/hNE70mb.jpg(/m)\n(j)MD.名字(/j)仔細挑揀著草葉，把其中雜草給撥開、未熟的部分也不採。\n最後終於採收了1份藥草。\n體力增加5點，智力增加1點。\n=:MD.體+=5,MD.用時-=1,MD.藥+=1,MD.智+=1\n跳：住處", "放置誘籠": "=:if(MD.安誘==1)game_jumpto(\"檢查誘籠\")\n(j)MD.名字(/j)在海邊發現了一處設置誘捕籠的絕佳地點。\n(m)https://i.imgur.com/TBANaCW.jpg(/m)\n=:if(MD.誘>=1)game_jumpto(\"可放誘籠\")\n(j)MD.名字(/j)尚未做出誘補籠，只好先記下路標，準備好了再過來設置。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1\n跳：住處", "可放誘籠": "太好了，先前做出的誘捕籠終於能派上用場。\n(j)MD.名字(/j)頂著透心涼的海風，攀爬到礁岩底部，將誘捕籠設置在漲潮時會被海水淹過的位置。\n(m)https://i.imgur.com/Q2RLPaU.png(/m)\n大功告成，只要偶爾回來看看，檢查獵物有沒有上鉤就可以了。\n體力減少15點。\n=:MD.體-=15,MD.用時-=1,MD.安誘=1\n跳：住處", "檢查誘籠": "=:MD.體-=5,MD.用時-=1\n(j)MD.名字(/j)回到設置誘捕籠的地點。\n(m)https://i.imgur.com/TBANaCW.jpg(/m)\n仔細檢查誘捕籠。\n等:1|檢查中……\n=:MD.ran=random_int(1,3)\n=:if(MD.ran==1)game_jumpto(\"誘籠螃蟹\")\n=:if(MD.ran==2)game_jumpto(\"誘籠未鉤\")\n=:if(MD.ran==3)game_jumpto(\"誘籠章魚\")", "誘籠螃蟹": "誘捕籠裡面有螃蟹！\n=:MD.ran=random_int(2,3)\n(j)MD.名字(/j)成功用誘捕籠拐騙了(j)MD.ran(/j)隻螃蟹！\n=:MD.心+=1,MD.蟹+=MD.ran\n=:MD.ran=random_int(1,3)\n=:if(MD.ran==3)game_jumpto(\"螃蟹好壞\")\n但這可不是(j)MD.名字(/j)的遠大目標。\n把螃蟹取出來，並把誘籠重新放回海中。耐心等待獵物，之後再來吧。\n體力減少5點。\n跳：住處", "螃蟹好壞": "噢不，壞螃蟹們的巨螯把誘捕籠給剪壞了。\n失去了現有的誘捕籠，得重新製作。\n體力減少5點。\n=:MD.安誘=0,MD.心-=4,MD.誘=0\n跳：住處", "誘籠未鉤": "誘捕籠裡面什麼都沒有。\n要更有耐心才行，之後再來吧。\n體力減少5點。\n跳：住處", "誘籠章魚": "哇哇哇哇！誘捕籠裡面有章魚！\n(m)https://i.imgur.com/WthjMHy.jpg(/m)\n=:MD.ran=random_int(1,2)\n=:MD.章+=MD.ran\n(j)MD.ran(/j)隻章魚哥為了偷吃誘捕籠裡的魚蝦，居然親自入甕，被誘捕籠給逮住了！\n(j)MD.名字(/j)非常雀躍，之後該怎麼料理呢？\n得到(j)MD.ran(/j)隻章魚。\n回收了1個誘捕籠，體力減少5點。\n=:MD.安誘=0,MD.心+=3\n跳：住處", "閱讀": "<strong>「野地一千零一夜。」</strong>\n=:if(MD.書>60)game_jumpto('導覽書完成')\n=:if(MD.書>=54)game_jumpto('導覽書7')\n=:if(MD.書>=45)game_jumpto('導覽書6')\n=:if(MD.書>=36)game_jumpto('導覽書5')\n=:if(MD.書>=27)game_jumpto('導覽書4')\n=:if(MD.書>=18)game_jumpto('導覽書3')\n=:if(MD.書>=9)game_jumpto('導覽書2')\n<imgsrc=\"https://i.imgur.com/qmnHr7M.png\"><i>閱讀中。</i>\n啊……(j)MD.名字(/j)不是很懂書上所描寫的東西。\n智力追加1點，體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.智+=1,MD.書+=1\n跳：導覽書食譜", "導覽書2": "<imgsrc=\"https://i.imgur.com/qmnHr7M.png\"><i>閱讀中。</i>\n由於導覽書上圖文並茂，閱讀起來倒也不睏。\n智力追加1點，體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.智+=1,MD.書+=1\n跳：導覽書食譜", "導覽書3": "<imgsrc=\"https://i.imgur.com/qmnHr7M.png\"><i>閱讀中。</i>\n對部分章節非常著迷，(j)MD.名字(/j)獲取了不少冷知識。\n智力追加1點，體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.智+=1,MD.書+=1\n跳：導覽書食譜", "導覽書4": "<imgsrc=\"https://i.imgur.com/qmnHr7M.png\"><i>閱讀中。</i>\n已經很輕鬆就能看懂這本導覽書了，讀起來十分順利。\n智力追加2點，體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.智+=2,MD.書+=1\n跳：導覽書食譜", "導覽書5": "<imgsrc=\"https://i.imgur.com/qmnHr7M.png\"><i>閱讀中。</i>\n(j)MD.名字(/j)在書本上寫下自己的筆記心得，正好與導覽書互相佐證。\n智力追加2點，體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.智+=2,MD.書+=1\n跳：導覽書食譜", "導覽書6": "<imgsrc=\"https://i.imgur.com/qmnHr7M.png\"><i>閱讀中。</i>\n如今不但對導覽書倒背如流，還能根據自身經驗捉出錯漏。\n智力追加2點，體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.智+=2,MD.書+=1\n跳：導覽書食譜", "導覽書7": "<imgsrc=\"https://i.imgur.com/qmnHr7M.png\"><i>閱讀中。</i>\n(j)MD.名字(/j)在書的空白處寫下了屬於自己的章節，儼然成了荒野生存專家。\n智力追加2點，體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.智+=2,MD.書+=1\n跳：導覽書食譜", "導覽書完成": "<imgsrc=\"https://i.imgur.com/qmnHr7M.png\"><i>閱讀中。</i>\n這本書已經不能給(j)MD.名字(/j)帶來任何助益了。\n跳：導覽書食譜", "導覽書食譜": "=:if(MD.書==60)game_jumpto('學會拼盤')\n=:if(MD.書==54)game_jumpto('學會鹹派')\n=:if(MD.書==48)game_jumpto('學會麵包')\n=:if(MD.書==42)game_jumpto('學會藥膳')\n=:if(MD.書==36)game_jumpto('學會沙拉')\n=:if(MD.書==30)game_jumpto('學會拌蕨')\n=:if(MD.書==24)game_jumpto('學會烤魚')\n=:if(MD.書==18)game_jumpto('學會烤肉')\n=:if(MD.書==12)game_jumpto('學會烤菇')\n=:if(MD.書==6)game_jumpto('學會果醬')\n=:if(MD.書==1)game_jumpto('學會煮蛋')\n跳：住處", "學會煮蛋": "=:MD.食譜1=1,MD.菜譜01號=(\"水煮白蛋。\"),MD.心+=1\n<b>學會了「水煮白蛋」的作法。<b>\n跳：住處", "學會果醬": "=:MD.食譜3=1,MD.菜譜02號=(\"手工果醬。\"),MD.心+=1\n<b>學會了「手工果醬」的作法。<b>\n跳：住處", "學會烤菇": "=:MD.食譜2=1,MD.菜譜03號=(\"鹽烤蕈菇。\"),MD.心+=1\n<b>學會了「鹽烤蕈菇」的作法。<b>\n跳：住處", "學會烤肉": "=:MD.食譜4=1,MD.菜譜04號=(\"噴香烤肉。\"),MD.心+=1\n<b>學會了「噴香烤肉」的作法。<b>\n跳：住處", "學會烤魚": "=:MD.食譜5=1,MD.菜譜05號=(\"香酥烤魚。\"),MD.心+=1\n<b>學會了「香酥烤魚」的作法。<b>\n跳：住處", "學會拌蕨": "=:MD.食譜8=1,MD.菜譜06號=(\"蜜拌蕨菜。\"),MD.心+=1\n<b>學會了「蜜拌蕨菜」的作法。<b>\n跳：住處", "學會沙拉": "=:MD.食譜7=1,MD.菜譜07號=(\"什錦沙拉。\"),MD.心+=1\n<b>學會了「什錦沙拉」的作法。<b>\n跳：住處", "學會藥膳": "=:MD.食譜11=1,MD.菜譜08號=(\"藥燉排骨。\"),MD.心+=1\n<b>學會了「藥燉排骨」的作法。<b>\n跳：住處", "學會麵包": "=:MD.食譜6=1,MD.菜譜09號=(\"鬆軟麵包。\"),MD.心+=1\n<b>學會了「鬆軟麵包」的作法。<b>\n跳：住處", "學會鹹派": "=:MD.食譜9=1,MD.菜譜10號=(\"野菇鹹派。\"),MD.心+=1\n<b>學會了「野菇鹹派」的作法。<b>\n跳：住處", "學會拼盤": "=:MD. MD.體(/j)點。\n跳：住處", "工藝": "包辦瑣事。\n(b)1(/b)(b)2(/b)(b)3(/b)\n(b)4(/b)(b)5(/b)(b)6(/b)(b)7(/b)\n选:升工作台\n选:製作工具\n选:升級房屋\n选:翻閱日記\n选:返回住處\n选:儲存檔案\n选:讀取檔案", "儲存檔案": "存:銘刻紀錄\n存檔完畢。\n跳：住處", "返回住處": "跳：住處", "升級房屋": "=:if(MD.屋==4)game_jumpto('房屋頂級')\n=:if(MD.屋==3)game_jumpto('升級豪墅')\n=:if(MD.屋==2)game_jumpto('升級暖屋')\n=:if(MD.屋==1)game_jumpto('升級磚屋')\n下一等級─樸實的木屋。\n升級房屋需要20根木頭與15份纖維，需要持有「槌子」工具。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：木頭(j)MD.木(/j)／纖維(j)MD.草(/j)／槌子(j)MD.槌(/j)</span>\n=:if(MD.木<20||MD.草<15||MD.槌<1)game_jumpto('升級材料不足')\n睡在木棚裡，餐風飲露的讓人很不安。\n忍不下去的(j)MD.名字(/j)挽起袖子，把收集的木材從庫房中搬出，自立自強的加固了木棚。\n雖然遇到很多阻礙，(j)MD.名字(/j)依舊不畏苦難，按照書裡的教學一步一步搭出了自己的房子！\n另外，按照「野地一千零一夜」的說明，(j)MD.名字(/j)打造出了簡易蜂房，為蜂蜜的來源打下基礎。\n這樣的程度可能還無法抵擋夜襲，但已經勝過住在廢墟太多了。\n=:MD.屋=1,MD.據點=(\"樸實的木屋\"),MD.心+=1\n☆☆☆(j)MD.據點(/j)建成了！☆☆☆\n☆☆☆附屬設施：蜂箱追加了！☆☆☆\n(m)https://i.imgur.com/2qh14qJ.jpg(/m)\n(j)MD.名字(/j)花了一整天來工作，花費25點體力。\n=:MD.體-=25,MD.用時=0,MD.木-=20,MD.草-=15\n跳:住處", "升級磚屋": "下一等級─堅固的磚屋。\n升級房屋需要30份石頭與20份木材，20份纖維，需要持有「槌子」與「斧頭」工具。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：石塊(j)MD.石(/j)／木頭(j)MD.木(/j)／纖維(j)MD.草(/j)／槌子(j)MD.槌(/j)／斧頭(j)MD.斧(/j)</span>\n=:if(MD.石<30||MD.木<20||MD.草<20||MD.槌<1||MD.斧<1)game_jumpto('升級材料不足')\n小木屋雖能遮風避雨，但依然十分簡陋。\n既然決定在荒原認真過生活，改善基本的生活條件是必要的。\n對了──能在家裡種些東西該有多好，養育一塊沃田如何呢？\n這個念頭讓(j)MD.名字(/j)振奮不已，再次挽起袖子，把木料一塊一塊從庫房中搬出，重新切割成柵欄用料。\n有了搭木屋的經驗，(j)MD.名字(/j)這次按照教學再加以改良，搭出了真的能稱得上房子的建築物。\n最後，還按照自己的心願加蓋了「農田」設施，未來可以在家種植作物了！\n=:MD.屋=2,MD.據點=(\"堅固的磚屋\")\n☆☆☆(j)MD.據點(/j)建成了！☆☆☆\n☆☆☆附屬設施：農田追加了！☆☆☆\n(m)https://i.imgur.com/ghsiUKf.jpg(/m)\n(j)MD.名字(/j)花了一整天來工作，花費25點體力。\n=:MD.體-=25,MD.用時=0,MD.石-=30,MD.木-=20,MD.草-=20,MD.心+=2\n跳:住處", "升級暖屋": "下一等級─溫馨的小屋。\n升級房屋需要50根石頭與15份硬木，20份纖維，需要持有「鋸子」與「斧頭」工具。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：石塊(j)MD.石(/j)／硬木(j)MD.硬(/j)／纖維(j)MD.草(/j)／鋸子(j)MD.鋸(/j)／斧頭(j)MD.斧(/j)</span>\n=:if(MD.石<50||MD.硬<15||MD.草<20||MD.鋸<1||MD.斧<1)game_jumpto('升級材料不足')\n住在磚屋裡很安全，每天對著石頭地板卻很無聊。\n單純活下去對野地生存大師來說已經是「Apieceofcake」了，增加生活的樂趣，似乎是首要目標。\n(j)MD.名字(/j)腦中有了個點子，養一隻能陪伴自己的寵物如何呢？\n簡直太絕妙了。\n有了目標，(j)MD.名字(/j)立刻將辛苦蒐集來的硬木一根一根整齊排好，再利用鋸子精確切割，這樣的施工水準下，住處的規模如願以償的擴大了。\n=:MD.屋=3,MD.據點=(\"溫馨的小屋\")\n☆☆☆(j)MD.據點(/j)建成了！☆☆☆\n☆☆☆附屬設施：籠屋追加了！☆☆☆\n(m)https://i.imgur.com/kygDjgZ.jpg(/m)\n(j)MD.名字(/j)花了一整天來工作，花費25點體力。\n=:MD.體-=25,MD.用時=0,MD.石-=50,MD.硬-=15,MD.草-=20,MD.心+=3\n跳:住處", "升級豪墅": "下一等級─奢華的豪墅。\n升級房屋需要50根石頭與15份硬木，50份纖維，10顆蚌，20條海草，10條鮮魚，用「鋸子」與「斧頭」工具來施工。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：石塊(j)MD.石(/j)／硬木(j)MD.硬(/j)／纖維(j)MD.草(/j)／河蚌(j)MD.貝(/j)／海草(j)MD.藻(/j)／鮮魚(j)MD.魚(/j)</span>\n=:if(MD.石<50||MD.硬<15||MD.草<50||MD.貝<10||MD.藻<20||MD.魚<10||MD.鋸<1||MD.斧<1)game_jumpto('升級材料不足')\n(j)MD.名字(/j)儼然成了這片荒原的小主人，若說有什麼困擾──那就是每次下水都有機會與鱷魚生死搏鬥。\n要解決這個問題，似乎只能在家裡「蓋一座魚池」了。\n(j)MD.名字(/j)之前存了很多魚和貝，加上一點點活化池塘的水草，要達成這個目標並不難。\n畫好設計圖後，(j)MD.名字(/j)立刻開工，駕輕就熟地把所有建材都擺在該放的位置。\n從天色尚暖到月明星稀，(j)MD.名字(/j)埋頭苦幹著，又是挖土又是造牆，好容易才把建築物按照計畫改造完成。\n現在，(j)MD.名字(/j)終於可以大聲說自己是荒原的霸主了！\n=:MD.屋=4,MD.據點=(\"奢華的豪墅\")\n☆☆☆(j)MD.據點(/j)建成了！☆☆☆\n☆☆☆附屬設施：水池追加了！☆☆☆\n(m)https://i.imgur.com/QbGriN3.jpg(/m)\n(j)MD.名字(/j)花了一整天來工作，花費30點體力。\n=:MD.體-=30,MD.用時=0,MD.石-=50,MD.硬-=30,MD.草-=50,MD.貝-=10,MD.藻-=20,MD.魚-=10,MD.心+=4\n跳:住處", "製作工具": "=:if(MD.工作台==1)game_jumpto('工作台1')\n=:if(MD.工作台==2)game_jumpto('工作台2')\n=:if(MD.工作台==3)game_jumpto('工作台3')\n(j)MD.名字(/j)沒有像樣的工作台來製作工具。\n跳：住處", "升工作台": "=:if(MD.工作台==1)game_jumpto('升進階工作台')\n=:if(MD.工作台==2)game_jumpto('升豪華工作台')\n=:if(MD.工作台==3)game_jumpto('無須再升')\n製作初級工作台需要10根木頭與10份石料。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：木頭(j)MD.木(/j)／石塊(j)MD.石(/j)</span>\n=:if(MD.木<10||MD.石<10)game_jumpto('升級材料不足')\n(j)MD.名字(/j)將收集來的木材拼好，將簡陋的小石釘嵌入幾個關鍵處，終於把初級工作台造出來了！\n耗費了20點體力。\n=:MD.工作台=1,MD.體-=20,MD.用時-=1,MD.心+=1,MD.木-=10,MD.石-=10\n跳：住處", "升進階工作台": "升級進階工作台需要15根木頭與15份石料，還需要槌子來施工。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：木頭(j)MD.木(/j)／石塊(j)MD.石(/j)／槌子(j)MD.槌(/j)</span>\n=:if(MD.木<15||MD.石<15||MD.槌<1)game_jumpto('升級材料不足')\n=:MD.木-=15,MD.石-=15,MD.工作台=2,MD.體-=20,MD.用時-=1,MD.心+=1\n原本的工作台已經無法滿足(j)MD.名字(/j)的需求。於是在初始工作台的基礎上，逐步加固加強細節，把進階工作台給造出來了！\n耗費了20點體力。\n跳：住處", "升豪華工作台": "升級豪華工作台需要20根木頭與20份石料，再加上10份纖維，需要斧頭來施工。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：木頭(j)MD.木(/j)／石塊(j)MD.石(/j)／纖維(j)MD.草(/j)／斧頭(j)MD.斧(/j)</span>\n=:if(MD.木<20||MD.石<20||MD.草<10||MD.斧<1)game_jumpto('升級材料不足')\n=:MD.木-=20,MD.石-=20,MD.草-=10,MD.心+=1,MD.工作台=3\n儼然成為荒原生活大師的(j)MD.名字(/j)，發展野人科技的企圖心不會輕易消失。\n不惜耗費大量辛苦蒐集的原料，鑽研再鑽研，終於把進階工作台改造成俱備萬全功能的豪華工作台了！\n跳：住處", "無須再升": "(j)MD.名字(/j)已經擁有最頂級的工作台了。\n跳：住處", "工作台1": "(b)1(/b)(b)2(/b)(b)3(/b)(b)4(/b)(b)5(/b)(b)6(/b)\n(b)7(/b)(b)8(/b)\n选:製作小刀\n选:製作槌子\n选:製作釣竿\n选:製作魚餌\n选:處理河蚌\n选:製作香餌\n选:製作珠蜜美容霜\n<:if(MD.蜂霜藥===0){curBtn=null};\n选:返回住處", "工作台2": "(b)1(/b)(b)2(/b)(b)3(/b)(b)4(/b)(b)5(/b)(b)6(/b)\n(b)7(/b)(b)8(/b)(b)9(/b)(b)10(/b)(b)11(/b)(b)12(/b)\n(b)13(/b)(b)14(/b)(b)15(/b)\n选:製作小刀\n选:製作槌子\n选:製作釣竿\n选:製作魚餌\n选:處理河蚌\n选:製作香餌\n选:製作藤椅\n选:製作斧頭\n选:製作蟲網\n选:製作誘籠\n选:製作陷阱\n选:製作吹箭\n选:製作大衣\n选:製作珠蜜美容霜\n<:if(MD.蜂霜藥===0){curBtn=null};\n选:返回住處", "工作台3": "(b)1(/b)(b)2(/b)(b)3(/b)(b)4(/b)(b)5(/b)(b)6(/b)\n(b)7(/b)(b)8(/b)(b)9(/b)(b)10(/b)(b)11(/b)(b)12(/b)\n(b)13(/b)(b)14(/b)(b)15(/b)(b)16(/b)(b)17(/b)\n选:製作小刀\n选:製作槌子\n选:製作釣竿\n选:製作魚餌\n选:處理河蚌\n选:製作香餌\n选:製作藤椅\n选:製作斧頭\n选:製作蟲網\n选:製作誘籠\n选:製作陷阱\n选:製作吹箭\n选:製作大衣\n选:製作長矛\n选:製作鋸子\n选:製作珠蜜美容霜\n<:if(MD.蜂霜藥===0){curBtn=null};\n选:返回住處", "製作陷阱": "=:if(MD.陷阱>=1)game_jumpto('已擁有工具')\n製作陷阱需要10份纖維。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：纖維(j)MD.草(/j)</span>\n=:if(MD.草<10)game_jumpto('製作材料不足')\n(j)MD.名字(/j)仔細地編織著纖維，把草料編成了可以困住小動物的隱蔽型陷阱。\n(m)https://i.imgur.com/jTjcATN.jpg(/m)\n體力減少5點。\n=:MD.陷阱=1,MD.體-=5,MD.用時-=1,MD.心+=1,MD.草-=10\n跳：住處", "製作吹箭": "=:if(MD.吹箭>=1)game_jumpto('已擁有工具')\n製作吹箭需要1根木頭與1份纖維，使用小刀來削製。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：木頭(j)MD.木(/j)／纖維(j)MD.草(/j)／刀具(j)MD.刀(/j)</span>\n=:if(MD.木<1||MD.草<1||MD.刀<1)game_jumpto('製作材料不足')\n(j)MD.名字(/j)專注地用小刀刨製木管，終於做出了一把吹箭。\n(m)https://i.imgur.com/t4DjV1V.jpg(/m)\n體力減少5點。\n=:MD.吹箭=1,MD.體-=5,MD.用時-=1,MD.心+=2,MD.木-=1,MD.草-=1\n跳：住處", "製作小刀": "=:if(MD.刀>=1)game_jumpto('已擁有工具')\n製作小刀需要5根木頭與2塊石頭。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：木頭(j)MD.木(/j)／石塊(j)MD.石(/j)</span>\n=:if(MD.木<5||MD.石<2)game_jumpto('製作材料不足')\n(j)MD.名字(/j)一番折騰，終於做出了一把粗劣石刀。\n(m)https://i.imgur.com/r1V94AQ.jpg(/m)\n體力減少5點。\n=:MD.刀=2,MD.體-=5,MD.用時-=1,MD.心+=1,MD.木-=5,MD.石-=2\n跳：住處", "製作槌子": "=:if(MD.槌>=1)game_jumpto('已擁有工具')\n製作槌子需要10根木頭和5份纖維、1份石頭。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：木頭(j)MD.木(/j)／纖維(j)MD.草(/j)／石塊(j)MD.石(/j)</span>\n=:if(MD.木<10||MD.草<5||MD.石<1)game_jumpto('製作材料不足')\n製作槌子需要將石頭和木頭用繩索捆縛結合，並確定部件不會滑脫。\n(j)MD.名字(/j)把成品拿在手上掂了惦，嗯，是一把優秀的槌子。\n(m)https://i.imgur.com/UKuK3Oa.jpg(/m)\n體力減少5點。\n=:MD.槌=1,MD.體-=5,MD.用時-=1,MD.心+=1,MD.木-=10,MD.草-=5,MD.石-=1\n跳：住處", "製作藤椅": "=:if(MD.藤椅>=1)game_jumpto('已擁有工具')\n製作藤椅需要20根木頭和20份纖維，並且須持有槌子。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：木頭(j)MD.木(/j)／纖維(j)MD.草(/j)／槌子(j)MD.槌(/j)</span>\n=:if(MD.木<20||MD.草<20||MD.槌<1)game_jumpto('製作材料不足')\n(j)MD.名字(/j)叮叮咚咚地以槌子把木材組好，並再三確保面料的穩固，一張舒適的藤椅就完成了！\n(m)https://i.imgur.com/62GaHeO.jpg(/m)\n=:MD.藤椅=1,MD.體-=5,MD.用時-=2,MD.心+=1,MD.木-=20,MD.草-=20\n花了很多時間來完成。\n體力減少5點。\n跳：住處", "製作釣竿": "=:if(MD.釣竿>=1)game_jumpto('已擁有工具')\n製作釣竿需要5根木頭與20份纖維，並且須持有刀具。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：木頭(j)MD.木(/j)／纖維(j)MD.草(/j)／刀具(j)MD.刀(/j)</span>\n=:if(MD.木<5||MD.草<20||MD.刀<1)game_jumpto('製作材料不足')\n將纖維細細搓揉成釣線，再用小刀把木頭削成魚鉤。\n在(j)MD.名字(/j)一雙巧手製作下，釣竿完成了！\n(m)https://i.imgur.com/HT9TNOZ.jpg(/m)\n體力減少5點。\n=:MD.釣竿=1,MD.體-=5,MD.用時-=1,MD.心+=1,MD.木-=5,MD.草-=20\n跳：住處", "製作魚餌": "製作魚餌需要2塊生肉，並持有刀具。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：生肉(j)MD.肉(/j)／刀具(j)MD.刀(/j)</span>\n=:if(MD.肉<2||MD.刀<1)game_jumpto('製作材料不足')\n(j)MD.名字(/j)把鮮紅的肉切成長條狀，放進罐子裡儲存發酵。\n=:MD.ran=random_choice_adv([5,0.5],[10,0.5])\n=:MD.餌+=MD.ran,MD.肉-=2,MD.體-=5,MD.用時-=1\n=:if(MD.ran==10)game_jumpto('高量魚餌')", "普量魚餌": "成果不錯，最後作出了(j)MD.ran(/j)塊魚餌。\n(m)https://i.imgur.com/yVGHmnt.jpg(/m)\n體力減少5點。\n跳：住處", "高量魚餌": "這次特別幸運，成功的魚餌有(j)MD.ran(/j)塊呢。\n(m)https://i.imgur.com/yVGHmnt.jpg(/m)\n體力減少5點。\n=:MD.心+=1\n跳：住處", "處理河蚌": "拆解河蚌需要用到小刀，對了，至少要擁有蚌啊。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：河蚌(j)MD.貝(/j)／刀具(j)MD.刀(/j)</span>\n=:if(MD.貝<1||MD.刀<1)game_jumpto('製作材料不足')\n=:MD.貝-=1\n(j)MD.名字(/j)將小刀插入河蚌，把富有韌性的貝柱割斷，蚌緩緩打開了。\n=:MD.ran=random_int(0,3)\n仔細撥弄了一下河蚌的肉，發現……\n=:if(MD.ran==0)game_jumpto('河蚌很窮')\n(m)https://i.imgur.com/ah3ZMfI.png(/m)\n裡面藏有(j)MD.ran(/j)顆圓潤的珍珠！\n體力減少5點。\n=:MD.珍珠+=MD.ran,MD.體-=5,MD.用時-=1,MD.心+=1\n跳：住處", "河蚌很窮": "這顆河蚌很貧瘠，他什麼都沒有。\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.心-=1\n跳：住處", "製作香餌": "製作香餌需要1塊生肉、1隻螃蟹，以及1份蜂蜜，並持有刀具。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：生肉(j)MD.肉(/j)／螃蟹(j)MD.蟹(/j)／蜂蜜(j)MD.蜜(/j)／刀具(j)MD.刀(/j)</span>\n=:if(MD.肉<1||MD.刀<1||MD.蟹<1||MD.蜜<1)game_jumpto('製作材料不足')\n=:MD.肉-=1,MD.蟹-=1,MD.蜜-=1,MD.體-=5,MD.用時-=1,MD.香餌+=5\n先做出基本的魚餌，再放入搗碎的蟹肉，與蜂蜜一起放進罐子裡醃製發酵。\n一番努力後，作出了5塊香餌。\n體力減少5點。\n跳：住處", "製作珠蜜美容霜": "製作珠蜜美容霜需要10份蜂蜜、10顆珍珠，消耗一顆石頭。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：蜂蜜(j)MD.蜜(/j)／珍珠(j)MD.珍珠(/j)／石塊(j)MD.石(/j)</span>\n=:if(MD.蜜<10||MD.珍珠<10||MD.石<1)game_jumpto('製作材料不足')\n=:MD.蜜-=10,MD.珍珠-=10,MD.石-=1,MD.體-=5,MD.用時-=1,MD.容貌+=10,MD.心+=5\n(j)MD.名字(/j)用石頭把珍珠碾碎，與蜂蜜調勻，再混和一定比例的朝露。\n得到了一份珍貴的珠蜜美容霜。\n(m)https://i.imgur.com/xClJnJ2.png(/m)\n將珠蜜美容霜均勻塗在肌膚上，(j)MD.名字(/j)感覺到自己變亮麗了。\n體力減少5點。\n跳：住處", "製作長矛": "=:if(MD.矛>=1)game_jumpto('已擁有工具')\n製作長矛需要3份纖維、5根木材，消耗一把小刀。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：纖維(j)MD.草(/j)／木頭(j)MD.木(/j)／刀具(j)MD.刀(/j)</span>\n=:if(MD.草<3||MD.木<5||MD.刀<1)game_jumpto('製作材料不足')\n(j)MD.名字(/j)把木棍與小刀用粗繩綁得牢實，拿在手中往前刺去。\n長矛劃開空氣，發出了颯爽的肅呼聲。\n得到了一支鋒利長矛。\n(m)https://i.imgur.com/cJZsocx.jpg(/m)\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.矛=1,MD.心+=1,MD.草-=3,MD.木-=5,MD.刀=0\n跳：住處", "製作蟲網": "=:if(MD.網>=1)game_jumpto('已擁有工具')\n製作蟲網需要15份纖維、5根木材。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：纖維(j)MD.草(/j)／木頭(j)MD.木(/j)</span>\n=:if(MD.草<15||MD.木<5)game_jumpto('製作材料不足')\n將纖維仔細搓成絲線，一根一根編織成網，再與木棍組合。\n得到蟲網了！\n(m)https://i.imgur.com/7uQEEKI.png(/m)\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.網=1,MD.心+=1,MD.草-=15,MD.木-=5\n跳：住處", "製作誘籠": "=:if(MD.誘>=1)game_jumpto('已擁有工具')\n製作誘籠需要10份纖維、10根木材，5個香餌，需要「槌子」工具。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：纖維(j)MD.草(/j)／木頭(j)MD.木(/j)／香餌(j)MD.香餌(/j)／槌子(j)MD.槌(/j)</span>\n=:if(MD.草<10||MD.木<10||MD.香餌<5||MD.槌<1)game_jumpto('製作材料不足')\n(j)MD.名字(/j)決定做一個誘捕籠來幫助自己獲取更多食物。\n翻遍了野地一千零一夜，改良了誘餌的種類，做出了高效率的誘捕籠。\n得到一個誘捕籠了！\n(m)https://i.imgur.com/fjGVJnz.jpg(/m)\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.誘=1,MD.心+=1,MD.草-=10,MD.木-=10,MD.香餌-=5\n跳：住處", "製作斧頭": "=:if(MD.斧>=1)game_jumpto('已擁有工具')\n製作斧頭需要2份石頭、5根木材，3份纖維，消耗一把槌子。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：石塊(j)MD.石(/j)／木頭(j)MD.木(/j)／纖維(j)MD.草(/j)／槌子(j)MD.槌(/j)</span>\n=:if(MD.石<2||MD.木<5||MD.草<3||MD.槌<1)game_jumpto('製作材料不足')\n(j)MD.名字(/j)用槌子耐心敲製石塊，把石塊打磨成鋒利的石頭厚片，再用粗繩將石片與木材綁牢。\n期間敲打的次數過多，甚至把槌子給弄壞了。\n終於得到了一把斧頭。\n(m)https://i.imgur.com/jR7JlH7.jpg(/m)\n體力減少5點。\n=:MD.體-=5,MD.用時-=1,MD.斧=1,MD.心+=1,MD.石-=2,MD.木-=5,MD.草-=3,MD.槌=0\n跳：住處", "製作鋸子": "=:if(MD.鋸>=1)game_jumpto('已擁有工具')\n製作鋸子需要5份石頭、5根木材，6份纖維，消耗一把槌子。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：石塊(j)MD.石(/j)／木頭(j)MD.木(/j)／纖維(j)MD.草(/j)／槌子(j)MD.槌(/j)</span>\n=:if(MD.石<5||MD.木<5||MD.草<6||MD.槌<1)game_jumpto('製作材料不足')\n在荒原製作鋸子真的是浩大工程，得把石塊打磨成鋒利的石片再依序組裝，極費工時。\n用槌子敲打的次數過多，甚至把槌子給弄壞了。\n(j)MD.名字(/j)好容易把鋸子做出來了。\n(m)https://i.imgur.com/sLh5NrZ.png(/m)\n體力減少15點。\n=:MD.體-=15,MD.用時-=2,MD.鋸=1,MD.心+=1,MD.石-=5,MD.木-=5,MD.草-=6,MD.槌=0\n跳：住處", "製作大衣": "=:if(MD.大衣>=1)game_jumpto('已擁有大衣')\n縫製大衣需要5條皮草與1個醫藥用針線包，以及20份纖維。\n<span style=\"color:var(--dim);font-size:.85rem;\">目前：皮草(j)MD.皮草(/j)／針線包(j)MD.傷用針線包(/j)／纖維(j)MD.草(/j)</span>\n=:if(MD.傷用針線包<1||MD.皮草<5||MD.草<20)game_jumpto('製作材料不足')\n在荒野以外的地區，穿戴皮草或許是遭人撻伐的缺德事，但在這片荒原之中，為了活下去，(j)MD.名字(/j)什麼都得嘗試。\n一條能禦寒防身的毛皮大衣，確實能在緊急時刻救人一命。\n抱著感謝的心，(j)MD.名字(/j)將纖維搓成絲，用自製的針線包把毛皮縫在一塊，做出了一件大衣！\n(m)https://i.imgur.com/CkIExhV.jpg(/m)\n=:MD.大衣=1,MD.體-=5,MD.用時-=1,MD.心+=3,MD.傷用針線包-=1,MD.皮草-=5,MD.草-=20\n(j)MD.名字(/j)將手工大衣套在身上，覺得十分舒適。\n穿上大衣後再也不會得到感冒，並對外傷有緩衝效果。\n在野外的冒險中有機率破損，請謹慎小心。\n體力減少5點。\n跳：住處", "升級材料不足": "升級材料不足。\n跳：住處", "製作材料不足": "製作材料不足。\n跳：住處", "房屋頂級": "這已經是最豪華的屋子了，莫非想要蓋出一座 (/b)(b)2(/b)\n选：繼續前行\n选：趕緊離開", "趕緊離開": "感覺不對勁，趕緊離開。\n跳：住處", "繼續前行": "想到被夥伴拋棄在荒原後，萬事不順、又餓又傷，沒有一天在安穩中度過，(j)MD.名字(/j)就悲從中來。\n(m)https://i.imgur.com/Tug1PV8.jpg(/m)\n抬頭看，荒嶺上的枯樹也那麼淒涼，(j)MD.名字(/j)覺得這條生命和枯樹也差別無幾。\n(b)1(/b)(b)2(/b)\n选:重新投胎算了\n选:生命誠可貴，不可莽撞。", "重新投胎算了": "=:if(MD.麻繩<1)game_jumpto(\"死不了\")\n(j)MD.名字(/j)將撿到的麻繩往樹頭一拋，自我了斷了。\n體力歸零。\n(m)https://i.imgur.com/Ztlmd1e.png(/m)\n跳：上吊死", "生命誠可貴，不可莽撞。": "嗯，找到蜥蜴報仇前，絕對不能死。\n跳：住處", "死不了": "唉，連他娘的麻繩都沒有，死什麼死啊。\n=:MD.體=1,MD.心=-5\n因為意志潰散，(j)MD.名字(/j)的體力掉到1點，心裏已經極度絕望。\n跳：住處", "撿到麻繩": "=:if(MD.麻繩==1)game_jumpto('住處')\n真倒楣……嗯？\n(j)MD.名字(/j)正在抱怨，忽然瞥見不遠處的地上有團東西。\n(m)https://i.imgur.com/PLCuRkf.jpg(/m)\n竟然是一圈粗麻繩。\n看著麻繩，(j)MD.名字(/j)考慮了一會，還是把它收了起來。\n=:MD.麻繩+=1\n跳：住處", "365": "=:MD.心=+5\n竟然在荒原度過了整整一年！時光飛逝，心情真是說不出的五味雜陳，但真佩服自己的能力呢。\n(j)MD.名字(/j)的體力與滿腹度達到最大了！\n得到週年賀禮「皮草」1條、「珍珠」20顆！\n=:MD.體=100,MD.腹=110,MD.皮草+=1,MD.珍珠+=20\n跳：起床", "生食獎勵": "=:MD.ran=random_int(20,40)\n不知不覺間，(j)MD.名字(/j)把荒島上所有的食物都生吃過一輪了。\n真了不起啊，是現代版神農氏嗎？\n=:MD.珍珠+=MD.ran\n(j)MD.名字(/j)獲得了(j)MD.ran(/j)顆珍珠作為達成生食制霸的獎勵！\n=:MD.生食獎勵=1\n得到成就徽章──生蝦先生。\n(j)if(MD.生食獎勵==1)'<imgsrc=\"https://i.imgur.com/gRuO3PN.png\"alt=\"生食成就徽章─生食獎勵\"title=\"生食成就徽章─生蝦先生\">'(/j)\n跳：住處", "熟食獎勵": "(j)MD.名字(/j)終於把荒島上所有的食譜都蒐集完畢，並且品嘗過一輪了。\n能有這樣的耐心與運氣，(j)MD.名字(/j)真非凡人也。\n=:MD.珍珠+=100\n(j)MD.名字(/j)獲得了100顆珍珠作為達成熟食制霸的獎勵！\n=:MD.熟食獎勵=1\n得到成就徽章──雄寶先生。\n(j)if(MD.熟食獎勵==1)'<imgsrc=\"https://i.imgur.com/vBRK8Hs.png\"alt=\"熟食成就徽章─熟食獎勵\"title=\"熟食成就徽章─熊寶先生\">'(/j)\n跳：住處", "鴿子結局機率": "=:MD.ran=random_int(1,10)\n=:if(MD.ran==3)game_jumpto('結局1')\n跳：重返早屋", "結局1": "「喂──這邊有人嗎！」\n天剛矇矇亮，一陣吵雜的喊叫聲把(j)MD.名字(/j)從床上吵起來。\n(j)MD.名字(/j)還以為自己在作夢，當意識到這不是夢，真的有人類在靠近時，(j)MD.名字(/j)立刻從床上彈起來，三步併兩步的衝出了屋外。\n「喂──我在這裡！」\n(j)MD.名字(/j)用力地揮舞雙手，想把在不遠處搜索的隊員們的注意力給拉過來。\n「發現人了！他在那邊！」\n人類還未完全反應，一道熟悉的身影在空中畫出優美的弧線，朝(j)MD.名字(/j)俯衝而來。\n這、這是什麼！\n(j)MD.名字(/j)張大了嘴，下意識地抬高手臂，讓黑影準確無比地降落在手上。\n(m)https://i.imgur.com/evBQCqH.jpg(/m)\n「灰咕咕！」\n多時不見，灰咕咕長得更健壯、也更漂亮了。\n而他，居然真的完成了這幾乎不可能的救援任務！\n(j)MD.名字(/j)的感動噎在喉嚨間，直到被救援隊包圍了，仍遲遲無法緩過來。\n救援隊把大毛毯批在(j)MD.名字(/j)身上，有人捧著一杯剛從保溫瓶倒出來的熱茶遞給(j)MD.名字(/j)。\n這闊別已久的人類的溫暖，卻比不上手中小毛球帶來的溫度。\n「想不到真的有這種事……」\n此時從人群中走出一個青年，他表明了自己是灰咕咕的主人。\n原來灰咕咕是青年的爺爺所養的賽鴿，從前並不是寵物，也沒有名字。\n灰咕咕恐怕是在上一次的比賽中被強風吹落，掉到了荒野上，恰好被(j)MD.名字(/j)撿到。\n「這太不可思議了，我看到了你的求救信，原本猶豫了很久。」\n後來，放不下心的青年終於帶著灰咕咕和求救信去找了當地的探險隊，把訊息交給專業團隊。\n青年認為(j)MD.名字(/j)應該會想和灰咕咕再見一面，就好心的帶著鳥兒，參加了搜救行動。\n「早叫爺爺不要再參加賽鴿比賽，但他堅持要再比一次，怎知這一次，我們家的鴿子會救了你。」\n青年帶著笑，輕輕撫摸在(j)MD.名字(/j)掌中仰肚的灰咕咕。\n「與其留在爺爺身邊被派出去賭命比賽，我想，他和你有這樣的緣分，你是不是願意收養他？」\n(j)MD.名字(/j)當然願意。\n於是他把灰咕咕緊緊抱在懷裡，在救援人員的簇擁下，搭上了救援用的直升機。\n「回家之後，請你吃一頓最好料的，好嗎？」\n「咕咕咕。」\n「達成結局1」──我的鳥兒，餘生請多指教。\n(m)https://i.imgur.com/KjLRGB5.jpg(/m)\n跳：荒野．旅《完》", "結局2": "「救命啊──救救我！」\n顧不得一切的尊嚴和形象，(j)MD.名字(/j)在狹小的木筏上盡可能的伸展四肢，大聲疾呼。\n只見輪船越駛越近，甲板上卻未看到半個人影。\n這樣下去……大船可能會直接撞上這艘木筏！\n「快停下來，這裡有人啊！」\n(j)MD.名字(/j)急得像熱鍋上的螞蟻，看著遠方的希望之光逐漸變成壓迫感極強的巨獸，一開始的欣喜也轉為濃厚的恐懼。\n怎會這樣，難道天要亡自己嗎。\n好不容易熬過了荒島的日子，怎麼能在這種地方，遭遇極低機率的「船禍」而喪命？\n(j)MD.名字(/j)此刻就像垂死掙扎的野獸，用盡所有的力氣發出大吼。\n「我還不想死啊────！」\n在這一瞬間，輪船忽然發出了刺耳的嗚鳴。\n(j)MD.名字(/j)抱頭彎下腰，深怕下一秒就被撞入無邊無際的大海。\n但上天似乎聽見了他的祈禱，輪船上出現幾個跑動的身影，終於發現異樣的水手在甲板上指著他，伸長了手揮舞。\n「喂！你沒事吧……」\n差點就出大事了。但(j)MD.名字(/j)把閃過腦海的話語吞回肚裡，瘋狂的以揮手回答。\n「我沒事！能不能拉我上去！」\n大船很有經驗的自動下了錨，船員們井然有序的把救生艇從輪船上放下，兩個粗曠的大叔坐在上頭，把救生艇划了過來。\n「怎麼回事，小子拍電影啊，哈哈哈哈。」\n要不是這裡是海上，他人單影隻孤立無援，(j)MD.名字(/j)還真想給這個沒神經的糙漢子來一記頭槌。\n飽受這一頓驚嚇，早就脫水的身體更加無力，(j)MD.名字(/j)只能在水手們的攙扶下爬上救生艇。\n「這小傢伙是不是嚇呆啦，喂，馬上就上船了，撐住啊。」\n「你別打他背啊，把他打殘了怎麼辦。」\n「老子哪有這麼粗魯啊……」\n(j)MD.名字(/j)被水手們平放在艇上，瞪著天空，聽著身邊人輕鬆的鬥嘴，好一會，他終於回過神來。\n──那燦爛無比的笑容終於出現在他臉上。\n「哈哈哈哈哈哈哈哈。」\n「怎麼辦，他好像真的瘋了啊。」\n「別亂說啦。」\n今天的天空，真的是非常蔚藍又美麗呢。\n「達成結局2」──從一而終的冒險家。\n(m)https://i.imgur.com/o7v3GUO.jpg(/m)\n跳：荒野．旅《完》", "荒野．旅《完》": "荒野．旅《完》\n(b)1(/b)\n选：重新開始", "機組室": "=:if(MD.電池驗證<1)game_jumpto('山區')\n=:if(MD.機密==7)game_jumpto('山區')\n=:if(MD.機密==1)game_jumpto('機組密碼')\n通過在礦坑尋到的荒島地圖，(j)MD.名字(/j)才得以窺見山中最隱密的區域。\n這片區域的入口位在乾涸溪流的上游。沒有地圖的引導，常人容易被山道上陰森叢林嚇阻，錯失入口小徑。\n(j)MD.名字(/j)用斧頭劈砍山路上的雜草，褲子黏滿了鬼針草的種子，身上被蚊蟲叮了幾個腫包，好不容易才抵達目的地──「礦工的機組室」。\n(m)https://i.imgur.com/89Jnj0Q.jpg(/m)\n入口處看起來怪陰森的，但這不阻礙(j)MD.名字(/j)尋找機密的決心。\n(j)MD.名字(/j)掏出不知名礦工的IC卡，往破舊木門上那違和感爆棚的高科技門鎖刷了過去。\n嗶嗶──\n意料之外，情理之中，看起來廢墟一般的屋子居然從內部發出了開鎖聲，大門被打開了。\n「打擾了……」\n(j)MD.名字(/j)戰 通訊員，聽見奇怪的要求，居然能瞬間冷靜並理解，(j)MD.名字(/j)感動到都要哭了。\n只是……\n「什麼編碼？這裡就是有熊有鹿，還有黑黑的黑炭精的荒原啊？」\n「我不了解您的陳述，請換個方式說明。」\n「等等，再讓我想一下。」\n(j)MD.名字(/j)快速的掃過了整間通訊室，最後終於在牆上的一塊牌匾上看到了礦區的編碼。\n「0478、對，就是0478！」\n「了解。請稍候，立刻為您聯繫相關單位。」\n經過一番艱困溝通，(j)MD.名字(/j)終於得到了泰坦企業的協助。\n他們宣告會在1小時內動員救援直升機，直升機從總部飛到荒島大概需要10個小時，只要在那之前撐住，(j)MD.名字(/j)就能得救。\n得到消息後，(j)MD.名字(/j)掛上通訊器，輕鬆的席地而坐，長吁了一口氣。\n「不過，那些礦工為什麼會……？」\n眼看電機室的設備如此高級，泰坦企業的效率更可用迅疾如雷來形容，那，為什麼會放任遇難的員工在礦區化為白骨？\n疑問的種子開始在(j)MD.名字(/j)腦海裡發芽。\n趁著救援隊還未抵達，(j)MD.名字(/j)站起身，開始在機組室的桌面和抽屜翻找資料。\n什麼都沒有。\n不死心的(j)MD.名字(/j)低下身子，幾乎趴在地面，進行地毯式搜索。\n「有了……！」\n在機器底座的縫隙裡，有本陳舊的簿子。\n(j)MD.名字(/j)用手指死命地勾拉，終於把簿子給勾了出來。\n「泰坦礦業紫星專案2xxx年紀錄簿」\n(j)MD.名字(/j)把本子拿起來翻了翻，每一頁都記錄著日期與值班人員的工作報告，都是尋常的工務紀錄。\n根據最初登記的日期，這本記錄簿至少存在五年以上了。\n翻動著簿子，(j)MD.名字(/j)逐漸發現不對勁的地方──從某一頁開始，筆記的字跡變得潦草。\n11/25\n貳組探勘員全體自礦坑返回，隊員瑪奇諾狀況異常。\n傍晚時間，隊員發生爭執。\n11/26\n今日無任務。\n醫務室使用中。\n11/27\n今日無任務。\n11/28\n今日壹組三名探勘員執行任務。\n醫務室使用中。\n11/29\n壹組執行任務中。\n醫務室已滿員。\n҉1҉1҉/҉3҉x҉\n҉x҉x҉探҉勘҉員҉x҉x҉失҉去҉x҉҉x҉敗҉。\n（本頁被損毀。）\n11/30\n壹組探勘員全體自礦坑返回，任務成功。\n҉1҉2҉/҉0҉1҉\n<i><b>他們在說謊</b></i>\n……紀錄簿到這裡就中斷了。\n(j)MD.名字(/j)感覺背後冒出冷汗。\n什麼啊……這是？\n「碰！」\n(j)MD.名字(/j)還沉靜在震驚之中，背後已上鎖的門突然發出撞擊聲。\n<i>「碰碰碰碰碰！」</i>\n=:if(MD.智>300)game_jumpto('機組分歧')\n<b>「嗚啊啊啊！」</b>\n「達成結局3」──未知的紀錄簿。\n(m)https://i.imgur.com/1ZLy0lD.jpg(/m)\n跳：荒野．旅《完》", "機組分歧": "身後的門被猛烈撞擊著，力道之大，像一頭野獸正要破門而入。\n(j)MD.名字(/j)眼光瞄到一旁矮處的收納櫃，當機立斷，整個人像貓一樣輕巧的鑽了進去。\n就在他躲進櫃子的下一秒，鋼製的密碼門竟被狠狠撞開，砰的重摔在地上。\n如果反應再慢一點……不敢去想令人膽寒的事情，(j)MD.名字(/j)連大氣都不敢喘，保持最低限度的呼吸，側耳傾聽屋內的動靜。\n空氣中飄著難聞的腐臭味，有什麼生物闖了進來，呼嗤呼嗤的喘著粗氣。\n「嘶——」\n可以感覺到，那個東西正在搜索著什麼。\n他肯定追著(j)MD.名字(/j)而來！\n這個念頭讓人發抖。\n不知過了多久，室內微弱的日光也逐漸黯淡，變得伸手不見五指。\n那東西似乎放棄了，腳步聲遠離了發訊室。\n飢餓與恐懼讓(j)MD.名字(/j)渾身發麻，他保持著疼痛的姿勢跪在狹小的儲藏櫃內，彷彿一座被詛咒的雕像。\n屋內的野獸似乎已經不在了，要出去嗎？\n(b)1(/b)(b)2(/b)\n选:離開櫥櫃\n选:繼續躲藏", "離開櫥櫃": "(j)MD.名字(/j)強打精神，從櫥櫃內連爬帶滾的出來。\n此時，他的手摸到地上一片濕潤。把手拿到鼻子前嗅聞，竟是極難聞的腐臭和血腥。\n這……究竟是？\n繼續待在這個地方，一定會沒命的。\n就在(j)MD.名字(/j)走神的片刻，門口突然傳出了聲響，(j)MD.名字(/j)抬起頭——\n=:if(MD.天數>365)game_jumpto(\"虛驚一場\")\n=:if(MD.體>60)game_jumpto(\"真實結局\")\n=:MD.ran=random_int(1,2)\n=:if(MD.ran==2)game_jumpto(\"虛驚一場\")\n「找．到．了。」\n「達成結局4」──無法逃脫。\n(m)https://i.imgur.com/If6N3Eq.jpg(/m)\n跳：荒野．旅《完》", "虛驚一場": "——\n眼前什麼也沒有，只是虛驚一場。\n受夠了這奇怪的地方，對泰坦礦業也起了疑竇。\n(j)MD.名字(/j)把紀錄本和所有東西都丟在原地，趁著那東西還沒回來，頭也不回的逃出了機組室。\n=:MD.體-=5,MD.用時-=1,MD.機密=7\n跳：住處", "繼續躲藏": "(j)MD.名字(/j)不夠勇敢，也沒有力氣從櫃子裡出來。\n在這瞬間，他寧可餓死在這裡，也不想出去面對更多狗屁倒灶的事情。\n就這樣，(j)MD.名字(/j)心如死灰，躲在狹小的儲藏櫃中等待著。\n不知過了多久——或許是十小時？\n室內傳出嘈雜的人聲與腳步聲，有人在大聲呼喊(j)MD.名字(/j)的名字，(j)MD.名字(/j)感覺嘴巴很乾，叫不出聲音。\n櫥櫃門被倏地拉開，刺眼的手電筒燈照在他眼上，直讓人睜不開眼。\n「(j)MD.名字(/j)先生，我們是泰坦礦業營救小組，已經沒事了。」\n伴隨著有力的話語，一隻手伸過來扶著狼狽的(j)MD.名字(/j)，將他拉出櫥櫃。\n睽違已久的活人出現在面前，給了(j)MD.名字(/j)一絲活著的真實感。\n他拉住幫助自己的營救組，結結巴巴地把幾個小時前的遭遇告訴對方。\n聽完這些，對方竟一點也不意外。\n十幾位泰坦礦業的人員麻利的在室內搜索——(j)MD.名字(/j)看見有人揹著來福槍走了出去——不一會兒，建築物內傳出幾聲槍響，轉瞬又歸於寂靜。\n「危機已經清除了，只是郊狼而已。(j)MD.名字(/j)先生，還有任何問題嗎？」\n聽完部下的報告，營救小組的隊長終於轉過頭，對他露出專業而溫和的笑意。\n有了合理的解釋，(j)MD.名字(/j)本該感到安心，但餘光卻恰好飄向他手裡揣著的記錄簿。\n「沒有，我很好。」\n「救援直升機已經停在室外，預計數小時內就能將您送回家。」\n救援者的真誠笑容，逐漸擴大。\n「預祝您的返航路途、一路順利。」\n「達成結局5」──泰坦礦業，至誠用心。\n(m)https://i.imgur.com/Y7S5zQo.jpg(/m)\n跳：荒野．旅《完》", "真實結局": "一個衣衫襤褸、神情極為憔悴的年輕人出現在你眼前。\n「怎麼會……怎麼會有人。」\n那個人口中喃喃自語，卻在下一秒神情緊繃的撲上前，抓住你的手。\n「快走……離開這裡。」\n(j)MD.名字(/j)被對方嚇了一大跳，但那個人的眼中卻沒有惡意，在短暫的驚慌過後，(j)MD.名字(/j)穩住了心神。\n「我、我也想離開這裡，我們快走。」\n(j)MD.名字(/j)拉著對方起身，卻發現對方的左腳踝部有著嚴重的殘疾，無法正常行走。\n對方苦澀地搖了搖頭，示意(j)MD.名字(/j)快離開。\n(j)MD.名字(/j)雖然平常很慫，但想到怪物很有可能還在機構裡遊蕩，他就生出一種使命感，無法拋下身旁的人。\n「走吧，我們一起走！」\n也許是(j)MD.名字(/j)的態度太堅定，也許是遇見了人類，讓對方重新有了求生的希望，他點點頭，拖著腳步跟上(j)MD.名字(/j)。\n(m)https://i.imgur.com/16lu8cc.jpg(/m)\n強烈的壓迫感從走廊深處傳來，(j)MD.名字(/j)感覺牙齒都在打顫。\n兩人逃向出口，卻絕望的發現大門被強大的外力弄的扭曲變形，無法通過。\n難道要死在這裡了嗎？\n此時，一直死死咬著嘴唇的青年拉住了(j)MD.名字(/j)，用唇語無聲地道。\n（跟我來。）\n青年帶著(j)MD.名字(/j)轉進附近的五號機組室，並在室內的角落找到一個通風口，大小剛好夠成年人類伏身鑽入。\n青年讓(j)MD.名字(/j)先鑽進去，接著用腳先頭後的姿勢，把通風口的擋板給裝上。\n(j)MD.名字(/j)聽話往管道裡努力的爬，狹窄的空間讓他難以呼吸，好不容易鑽到了另一個出入口，他推開眼前的擋板，整個人像條魚似的擠出管道。\n「唉唷！」\n腦袋差點撞在地上，(j)MD.名字(/j)揉揉撐住地板的手，訝異的發現管道終點居然連接著一個狹小的空間。\n這個空間堆積了許多乾糧與罐頭，還有一些四散的文件，而最顯眼的是一支像高科技電影裡才會出現的強化試管瓶，裏頭裝著一顆美麗的紫色寶石。\n(j)MD.名字(/j)情不自禁的被吸引，但手還沒摸上，就被身後趕來的青年一把攔住。\n「別碰那個。」他嚴肅地說。\n「除非你也想變成那種怪物。」\n(j)MD.名字(/j)立刻縮手，很乖的搖著腦袋。\n「我是(j)MD.夥伴(/j)，隸屬泰坦礦業探勘部，壹組隊長。」\n壹組隊長——就是記錄簿上寫到發生了內部爭執的那個隊伍！\n「我是(j)MD.名字(/j)，因為一些原因被落在島上……不說這個，其他人呢，你的隊員呢？」\n「都死了。」\n對方面色鐵青地說出這句話。\n在(j)MD.名字(/j)奇異的眼光中，(j)MD.夥伴(/j)抽出身旁的一紙文件，娓娓道來。\n紫星企劃，是泰坦礦業近年來主力發展的能源項目。\n紫星是一種高能量、高稀有度、高價值的礦石，0.1ct便要價一萬美金，主要用於高級運輸工具的替代能源、及太空科技的主力能源。\n由於紫星極其稀少，泰坦礦業便砸下重金組織了上百支探勘隊，派往世界各地進行紫星探勘。\n他們便是其中最優秀、最元老的先鋒壹組成員。\n探勘組沒有辜負公司的期待，在這個貧瘠又危險的荒野地底深處，發現了中量紫星，並進行了樣本開採工作。\n原本一切都相當順利。\n直到(j)MD.夥伴(/j)發現自己開始經常性流鼻血，向總公司彙報這個情況，卻被三言兩語安撫後，他才驚覺其中蹊蹺。\n(j)MD.夥伴(/j)通過電子郵件聯繫先前離職的探勘組前輩，想要得知眾人離去的原因，卻發現沒有一人有回音。\n於是他偷偷將紫星樣本帶回基地的實驗台，讓信得過的夥伴做了簡單分析——\n一切都真相大白。\n與能量成正比，紫星含有無比強烈的放射性與生物毒性。\n光憑現代科技造出的隔離衣，根本無法阻擋紫星的輻射。何況公司根本隱瞞了這點，為了節省成本，竟讓上百支隊伍在毫無防護或是僅穿著簡單工作服的狀態下，開採紫星。\n得知真相的(j)MD.夥伴(/j)非常憤怒，他向公司強烈要求停止任務，全員返程。\n泰坦礦業卻要求壹組完成最後的任務，或者讓二組代替執行，才能結束探勘。\n明知紫星有毒，隱瞞真相讓二組暴露於危險中，這是(j)MD.夥伴(/j)不願做的事。\n慎重考慮後，(j)MD.夥伴(/j)帶了其中兩位最信賴的隊員下礦，進行最後一次的任務。\n但他沒有想到最信賴的一位夥伴——瑪奇諾，竟因為貪婪，私藏了當天開採到的5ct大小的紫星。\n毫無防護的貼身帶著高量紫星，很快的就讓瑪奇諾身體發生不適。\n(j)MD.夥伴(/j)發現了成員的異樣，與瑪奇諾發生爭執，苦於沒有證據，只能任由瑪奇諾回休息室。\n回想起來，他恨自己，不該那麼輕易的讓對方離開。\n在隔天晚上，瑪奇諾昏倒了。\n他待在病床前守了一夜，並囑咐了眾人再也不要下礦。\n但，在清晨低頭梳洗的時候，他遭到了暗算。\n某個叛徒用鈍器攻擊了(j)MD.夥伴(/j)，讓他完全失去意識。\n等他在劇痛中清醒，已身處黑暗的礦洞。\n(j)MD.夥伴(/j)失去冷靜的在礦洞中拼命呼喊，好不容易，他在轉角處找到了伙伴們的蹤影，\n蹤影。或是壹組隊員的遺骸。\n和那散落一地的衣服，以及在四處攀爬的黑色奇異生物。\n(j)MD.夥伴(/j)看著奇異生物，生物的頭上戴著自己送給後輩的髮箍。\n(j)MD.夥伴(/j)吐了，也哭了。\n沒過多久，悲傷與恐懼，以及強烈的怒意支使他從短暫的絕望中站起。\n身為壹組隊長，他早在礦洞中做出了數個逃生點，雖然大部分的逃生口被故意毀壞了，但(j)MD.夥伴(/j)依然找到了最為隱密的那一個。\n(j)MD.夥伴(/j)從地底逃出，風塵僕僕的趕回機組室，想要找出罪魁禍首。\n更可怕的事情才要發生。\n機組室空無一人，沒有組員，沒有紫星樣本，什麼都沒有。\n他僅在三號機組室發現了那本被串改過的記錄簿，怒氣沖沖地在最後寫下了那句<i><b>他們在說謊</b></i>後，突然聽見似野獸的吼聲在走廊中響起。\n他在驚慌中把記錄簿掃進機組下方，並躲在未掩實的門後。\n從門上的倒映中他看見一個面目浮腫，四肢膨脹扭曲的「人類」，正在走廊上遊走。\n不、不，那是，那是瑪奇諾！\n已經不是人類了。(j)MD.夥伴(/j)看見嵌入對方腰際的紫星，是輻射把瑪奇諾變成了這樣的鬼東西。\n(j)MD.夥伴(/j)摀住嘴，忍住哀號。\n泰坦工業肯定已經來過了吧。除了那本不知為何遺留的記錄簿，所有證據都被湮滅。\n他們不會再回來救援自己，\n不，就算他們回來，也是來滅口的，就像把所有探勘員丟入地洞任由輻射汙染，自生自滅。\n不能讓泰坦的罪惡就這樣抹消——(j)MD.夥伴(/j)憤恨的咬牙，太過專注，沒發現危險就在身後。\n「哈——哈啊——」\n在他走神的瞬間，怪物撲進機組室，朝他發狂撕咬。\n(j)MD.夥伴(/j)用力推翻瑪起諾，卻被對方用力的咬住了腳踝。\n「啊——」\n強烈的劇痛以及肉被撕下來的感覺。\n(j)MD.夥伴(/j)忍痛用力踹了怪物一腳，噴出的血霧剛好糊住了對方的視線，他手腳並用衝出了三號機組室，藏進五號機組室。\n顯然，鎖住的門並不能阻止尚有人類智力的怪物。\n(j)MD.夥伴(/j)脫下外套，纏裹著重傷的腳踝，不讓血暴露出自己的位置。\n多虧他足夠冷靜，很快想起通風口中央的匯流區可以躲藏。\n他鑽進通風管，暫時保住了小命。\n管道內的日子無比艱難，他苦熬著養傷，趁著日間怪物不活動時，溜進
